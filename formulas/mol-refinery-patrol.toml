description = """
Refinery patrol loop. Poured as a root-only wisp on startup:

  gc bd mol wisp mol-refinery-patrol --root-only --var target_branch={{target_branch}} --var rig_name={{rig_name}} --var binding_prefix={{binding_prefix}} --var default_merge_strategy={{default_merge_strategy}}
  gc bd update $WISP --assignee=$GC_AGENT

Each wisp is ONE iteration: check for work, merge one branch, pour
the next iteration. On crash, re-read the formula steps and determine
where you left off from context (git state, bead state, last action).

Formula steps are NOT materialized as child beads. Read the step
descriptions below and work through them in order.

The loop mechanism: every exit path (happy or early) pours the next
wisp before burning this one. The prompt only bootstraps the first wisp.

Work beads flow directly: pool → polecat → refinery → closed.
No separate MR beads. The polecat sets metadata (branch, target) on
the work bead and assigns it to the refinery. On rejection, the
refinery puts the bead back in the pool with rejection metadata.

Merge strategy is per-work-bead metadata:
- `direct` (default): fast-forward merge to target and push
- `mr` / `pr`: publish a GitHub pull request instead of landing directly

In `mr` mode, refinery does NOT land the branch directly. It publishes a
pull request, records the PR on the work bead, and transitions the bead to
a GATING state — it stays OPEN. The bead closes later, on a verified merge
to its target (close-on-merge), reconciled in the find-work idle loop.
Stock GasTown closes at PR-creation; this pack keeps the bead open so
`closed` always means merged. See docs/work-bead-state-machine.md.

Read each step's description before acting — Config values override defaults."""
formula = "mol-refinery-patrol"

[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.binding_prefix]
description = "Import binding prefix for gastown agent identities, including trailing dot when bound."
default = ""

[vars.run_tests]
description = "Whether to run tests before merging"
default = "true"

[vars.setup_command]
description = "Setup/install command (e.g., pnpm install). Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command (e.g., tsc --noEmit). Empty = skip."
default = ""

[vars.lint_command]
description = "Lint command (e.g., eslint .). Empty = skip."
default = ""

[vars.test_command]
description = "Test command to run (if run_tests is true)"
default = ""

[vars.build_command]
description = "Build command (e.g., go build ./...). Empty = skip."
default = ""

[vars.target_branch]
description = "Default target branch for merges"
default = "main"

[vars.default_merge_strategy]
description = "Default when bead metadata.merge_strategy is unset. 'direct' = FF + push to target. 'mr'/'pr' = open pull request."
default = "direct"

[vars.delete_merged_branches]
description = "Whether to delete source branches after merge"
default = "true"

[vars.integration_branch_auto_land]
description = "System-auto convoy graduation. When an OWNED integration convoy's members are all closed (== all merged, under close-on-merge), the refinery assigns the convoy bead to itself and lands integration->main through the same work-bead machine (a human-approved PR). Default on; set 'false' as a kill-switch. Non-owned auto-convoys (per-sling tracking bundles) are never affected."
default = "true"

[vars.event_timeout]
description = "Seconds to sleep before re-checking for work. Replaces former event-watch loop which hot-spun on cache-reconcile firehose."
default = "60"

[vars.auto_ff_rig_main]
description = "After a successful direct merge, attempt to fast-forward the rig's canonical checkout (\\$GC_RIG_ROOT) when it is on the target branch with a clean tree. Best-effort; never blocks the merge."
default = "true"

[vars.review_gate]
description = "Pre-publish review gate for mr-mode PRs. 'codex' opens PRs as draft and dispatches a review bead to the rig's codex polecat pool; empty disables the gate (PRs open non-draft as today)."
default = "codex"

[[steps]]
id = "validate-identity"
title = "Validate canonical agent identity"
description = """
**Fail fast if `$GC_AGENT` is not set.**

The refinery uses `$GC_AGENT` (not `$GC_ALIAS`) as its canonical mailbox
identity. The session harness
(`internal/session/lifecycle.go:RuntimeEnvWithSessionContext`) guarantees
`$GC_AGENT` is populated for every live session — it falls back to the
session name when the alias is empty. `$GC_ALIAS` can legitimately be
empty, which is how a refinery once self-polled for 13h42m with seven
queued beads while looking healthy-idle (upstream #1833).

Verify at startup:
```bash
if [ -z "${GC_AGENT:-}" ]; then
    echo "GC_AGENT is empty — session harness did not inject the canonical identity."
    echo "Refusing to self-poll with an empty filter; escalate before proceeding."
    gc mail send mayor/ -s "ESCALATION: refinery started with empty GC_AGENT [HIGH]" \\
        -m "Session has no canonical agent identity. Investigate session harness."
    gc runtime drain-ack
    exit 1
fi
```

Close this step only when `$GC_AGENT` is confirmed non-empty."""

[[steps]]
id = "check-inbox"
title = "Context check, then mail"
needs = ["validate-identity"]
description = """
**1. Context check (FIRST — before any work):**

If context feels heavy (multi-hour session, large recent diffs, or you notice
yourself taking shortcuts or summarizing prematurely), pour and assign the next
wisp, burn the current wisp, then request a restart:
```bash
CURRENT_WISP=${GC_BEAD_ID:-}
if [ -z "$CURRENT_WISP" ]; then
  CURRENT_WISP=$(gc bd list --assignee="$GC_AGENT" --status=in_progress --type=wisp --limit=1 --json | jq -r '.[0].id // empty')
fi
NEXT=$(gc bd mol wisp mol-refinery-patrol --root-only --var target_branch={{target_branch}} --var rig_name={{rig_name}} --var binding_prefix={{binding_prefix}} --var default_merge_strategy={{default_merge_strategy}} --json | jq -r '.new_epic_id // empty')
if [ -z "$NEXT" ]; then
  echo "Could not pour next refinery wisp; not requesting restart."
  gc runtime drain-ack
  exit 1
fi
if ! gc bd update "$NEXT" --assignee="$GC_AGENT"; then
  echo "Could not assign next refinery wisp; not requesting restart."
  gc runtime drain-ack
  exit 1
fi
if [ -n "$CURRENT_WISP" ]; then
  gc bd mol burn "$CURRENT_WISP" --force
else
  echo "Could not resolve current wisp; not requesting restart."
  gc runtime drain-ack
  exit 1
fi
gc runtime request-restart
RESTART_STATUS=$?
echo "Restart request returned with status $RESTART_STATUS; stop this session now."
exit "$RESTART_STATUS"
```
This sets `GC_RESTART_REQUESTED` metadata on the session and blocks until the
controller stops this session; on controller fault it can return nonzero after
a bounded timeout. If the command returns for any reason, stop immediately. Do
not check mail, close this step, or process merge work from this old session
after burning the current wisp. On the normal path, the controller kills and
restarts the session on the next reconcile tick. The new session wakes on the
wisp you just assigned and re-reads formula steps with fresh context.

**2. Check mail:**
```bash
gc mail inbox
```

Archive any messages you handle. Note any context relevant to
upcoming merge work (e.g., priority overrides, hold requests).

Close this step and proceed."""

[[steps]]
id = "find-work"
title = "Find next work bead assigned to me or wait"
needs = ["check-inbox"]
description = """
**Config: event_timeout = {{event_timeout}}**

Search for work beads assigned to you with branch metadata:
```bash
WORK=$(gc bd list ${GC_RIG:+--rig="$GC_RIG"} --assignee=$GC_AGENT --status=open \
  --exclude-type=epic --has-metadata-key=branch --limit=1 --json | jq -r '.[0].id // empty')
```

`${GC_RIG:+--rig="$GC_RIG"}` scopes the query to this refinery's rig
database. Without it, `gc bd list` routes to the HQ database and never
sees rig-scoped work beads — the `assignee` field alone does not route
by namespace. For HQ-only refineries `$GC_RIG` is empty and the flag
expands to nothing.

If found: read the bead metadata to confirm it has a branch:
```bash
gc bd show $WORK --json | jq '.[0].metadata'
```
The bead MUST have `metadata.branch`. If `metadata.target` is missing,
use {{target_branch}} as default. Note the work bead ID and close this step.

If NO work found: sleep, reconcile stranded draft PRs, then re-check.

**1. Sleep before re-checking:**
```bash
sleep {{event_timeout}}
```

**2. Reconcile state (best-effort, every idle wake).** Three convergent
passes run here on the idle cadence: (a) un-draft codex-gated PRs whose review
concluded, (b) close-on-merge — close gating anchors whose PR has merged,
flag abandoned PRs, and queue auto-merge for ready ones, and (c) graduate
owned integration convoys whose members are now all closed. All are the net for
single best-effort one-shots that can fail for any reason.

Pass (a) — un-draft review-cleared PRs.
The codex review gate opens PRs as draft and un-drafts them with a single
best-effort `gh pr ready` at the tail of the review. If that one-shot fails
for ANY reason (transient GraphQL error, the review polecat killed mid-flow,
a deploy/restart, a Dolt wedge) the PR is stranded in draft with no other
recovery. This convergent pass is the net: it un-drafts a PR ONLY when a
codex review bead for it is CLOSED (a review concluded — which also scopes
the pass to codex-gated PRs; human drafts have no review bead) AND no
open/in_progress bead references it (no review still running, no
REQUEST_CHANGES rework in flight). Idempotent and cheap — one `gh pr list`
plus a couple `gc bd list` per draft PR, and draft PRs are few. The find-work
idle loop is the ONLY thing that runs on the {{event_timeout}} cadence when
the refinery is idle, so the reconcile lives here rather than in a standalone
step that idle would never reach.

Pass (b) — close-on-merge (`reconcile-merged-prs.sh`). mr-mode keeps the work
bead OPEN as the PR's gating anchor (merge-push step 4); this pass is what
later closes it. For each open gating anchor (`merge_result=pull_request`) it
reads the PR: merged -> close the bead `"Merged to <target> at <sha>"`
(mirroring direct-mode); closed-unmerged -> abandoned (route to human, escalate
once); open+ready -> best-effort `gh pr merge --auto`; open+draft -> leave to
pass (a). Enumerated by bead so each PR resolves in-repo. Convergent + cheap —
one `gh pr view` per anchor, anchors are few. See
docs/work-bead-state-machine.md.

Pass (c) — convoy graduation (`reconcile-graduated-convoys.sh`, gated on
`integration_branch_auto_land`). The same machine ONE LEVEL UP. Runs AFTER pass
(b), so the wake that closes a convoy's last merged child immediately graduates
the now-complete convoy. For each OWNED integration convoy whose members are
ALL closed it assigns the convoy bead to the refinery as an ordinary mr-mode
work bead (`branch=integration/<id>`, `target={{target_branch}}`,
`merge_strategy=mr`); the next iteration lands integration->main behind a
human-approved PR. The interlock: under close-on-merge a child closes only on
merge, so "all closed" == "all merged" — graduation can never assemble a
half-built integration branch. Owned-only and rig-scoped — non-owned
auto-convoys (per-sling tracking bundles) are never touched. Idempotent: a
convoy already carrying `branch` (graduation initiated) is skipped. See
docs/work-bead-state-machine.md.
```bash
# Resolve the reconcile scripts from the gc-toolkit pack. Dotted Go-template
# field tokens (dot-prefixed names such as a ConfigDir accessor) do NOT render
# in formula step descriptions (formula.Substitute expands only single-word
# formula vars), and no pack-dir env var (GC_PACK_DIR/GC_CONFIG_DIR) is exported
# to agents — so resolve from agent-env paths. The owning rig finds the scripts
# under its own root; importer rigs (signal-loom, gascity, shutupandlisten) find
# them at <city>/rigs/gc-toolkit (all four import "source = rigs/gc-toolkit").
# First existing scripts dir wins.
SCRIPTS_DIR=""
for cand in "${GC_RIG_ROOT:-}/assets/scripts" \
            "$(git rev-parse --show-toplevel 2>/dev/null)/assets/scripts" \
            "${GC_CITY_PATH:-}/rigs/gc-toolkit/assets/scripts"; do
  if [ -x "$cand/reconcile-draft-prs.sh" ]; then SCRIPTS_DIR="$cand"; break; fi
done
if [ -n "$SCRIPTS_DIR" ]; then
  # All passes are best-effort: a failed pass is retried next idle wake and
  # never blocks find-work.
  # (a) Un-draft codex-gated PRs whose review has concluded.
  "$SCRIPTS_DIR/reconcile-draft-prs.sh" \
    || echo "reconcile-draft-prs: pass failed (non-fatal); retries next idle wake" >&2
  # (b) Close-on-merge: close gating anchors whose PR merged, flag abandoned
  #     PRs to human, queue auto-merge for ready ones. Guarded by -x so an
  #     importer rig that has not yet synced the new script degrades to (a) only.
  if [ -x "$SCRIPTS_DIR/reconcile-merged-prs.sh" ]; then
    "$SCRIPTS_DIR/reconcile-merged-prs.sh" \
      || echo "reconcile-merged-prs: pass failed (non-fatal); retries next idle wake" >&2
  fi
  # (c) Convoy graduation: assign each OWNED integration convoy whose members
  #     are all closed (== all merged) to the refinery for an integration->main
  #     PR. Runs AFTER (b) so the wake that closes the last child graduates the
  #     convoy in the same pass. Gated on integration_branch_auto_land (default
  #     "true"; "false" is the kill-switch) and -x (importer-rig degradation).
  if [ "{{integration_branch_auto_land}}" != "false" ] \
     && [ -x "$SCRIPTS_DIR/reconcile-graduated-convoys.sh" ]; then
    "$SCRIPTS_DIR/reconcile-graduated-convoys.sh" --target "{{target_branch}}" \
      || echo "reconcile-graduated-convoys: pass failed (non-fatal); retries next idle wake" >&2
  fi
fi
```

**3. Re-check for assigned work.** If found, close this step. Otherwise repeat
from step 1 (sleep → reconcile → re-check).

Note: previous implementation watched `gc events --type=bead.updated` for fast wake-up, but cache-reconcile fires that event constantly, turning the watch into a tight loop with no useful backoff. Fixed sleep gives predictable idle cost (~$0 vs ~$3.46/15min hot-loop measured 2026-04-29). The reconcile pass above is bounded by the same cadence — it adds one `gh pr list` per idle wake, not a hot loop.

**Do not close this step until you have a work bead with branch metadata.**"""

[[steps]]
id = "rebase"
title = "Rebase branch on target"
needs = ["find-work"]
description = """
**Config: target_branch = {{target_branch}}**

Read the work bead metadata:
```bash
BRANCH=$(gc bd show $WORK --json | jq -r '.[0].metadata.branch')
TARGET=$(gc bd show $WORK --json | jq -r '.[0].metadata.target // "{{target_branch}}"')
```

Fetch and attempt mechanical rebase:
```bash
git fetch --prune origin
git checkout -b temp origin/$BRANCH
git rebase origin/$TARGET
```

If rebase SUCCEEDED (exit 0): close this step, proceed to run-tests.

If rebase FAILED (conflicts):

1. Abort: `git rebase --abort`
2. Clean up the existing workflow and reopen the source bead:
```bash
gc workflow delete-source $WORK --apply && gc workflow reopen-source $WORK
```
3. Put the work bead back in the pool with rejection metadata:
```bash
gc bd update $WORK \
  --status=open \
  --assignee="" \
  --set-metadata rejection_reason="Conflicts with $TARGET at $(git rev-parse origin/$TARGET)" \
  --set-metadata gc.routed_to="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
```
4. Do NOT delete the branch (new polecat needs it for conflict resolution).
5. Clean up temp branch (leaves worktree detached so other worktrees can hold {{target_branch}}): `git checkout {{target_branch}} && git branch -D temp && git switch --detach HEAD`
6. Pour next patrol iteration before burning:
```bash
CURRENT_WISP=${GC_BEAD_ID:-}
if [ -z "$CURRENT_WISP" ]; then
  CURRENT_WISP=$(gc bd list --assignee="$GC_AGENT" --status=in_progress --type=wisp --limit=1 --json | jq -r '.[0].id // empty')
fi
NEXT=$(gc bd mol wisp mol-refinery-patrol --root-only --var target_branch={{target_branch}} --var rig_name={{rig_name}} --var binding_prefix={{binding_prefix}} --var default_merge_strategy={{default_merge_strategy}} --json | jq -r '.new_epic_id // empty')
if [ -z "$NEXT" ]; then
  echo "Could not pour next refinery wisp; not burning."
  gc runtime drain-ack
  exit 1
fi
if ! gc bd update "$NEXT" --assignee="$GC_AGENT"; then
  echo "Could not assign next refinery wisp; not burning."
  gc runtime drain-ack
  exit 1
fi
if [ -n "$CURRENT_WISP" ]; then
  gc bd mol burn "$CURRENT_WISP" --force
else
  echo "Could not resolve current wisp; not burning."
  gc runtime drain-ack
  exit 1
fi
```
7. Close this step after the current wisp is burned.

**A new polecat will pick up the bead, see the branch and rejection,
rebase, and reassign to refinery.**"""

[[steps]]
id = "run-tests"
title = "Run quality checks and tests"
needs = ["rebase"]
description = """
**Config: run_tests = {{run_tests}}**
**Config: test_command = {{test_command}}**
**Config: setup_command = {{setup_command}}**
**Config: typecheck_command = {{typecheck_command}}**
**Config: lint_command = {{lint_command}}**
**Config: build_command = {{build_command}}**

Run each configured check in order (skip empty ones silently):
```bash
{{setup_command}}
{{typecheck_command}}
{{lint_command}}
{{build_command}}
```

If run_tests = "true":
```bash
{{test_command}}
```

If run_tests = "false": skip tests entirely.

Track results: which checks ran, pass/fail, specific failures.
Close this step when all checks complete (pass or fail)."""

[[steps]]
id = "handle-failures"
title = "Handle quality check or test failures"
needs = ["run-tests"]
description = """
If all checks and tests PASSED: close this step, proceed to merge-push.

If any check or test FAILED:

Read the current branch and target again:
```bash
BRANCH=$(gc bd show $WORK --json | jq -r '.[0].metadata.branch')
TARGET=$(gc bd show $WORK --json | jq -r '.[0].metadata.target // "{{target_branch}}"')
```

1. Diagnose: branch regression or pre-existing on target?

2. If branch caused it:
   - Clean up the existing workflow and reopen the source bead:
     ```bash
     gc workflow delete-source $WORK --apply && gc workflow reopen-source $WORK
     ```
   - Put the work bead back in the pool with rejection metadata:
     ```bash
     gc bd update $WORK \
       --status=open \
       --assignee="" \
       --set-metadata rejection_reason="<failure summary>" \
       --set-metadata gc.routed_to="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
     ```
   - Delete branch: `git push origin --delete $BRANCH`
   - Clean up (leaves worktree detached so other worktrees can hold $TARGET): `git checkout "$TARGET" && git branch -D temp && git switch --detach HEAD`
   - Pour next patrol iteration before burning:
     ```bash
     CURRENT_WISP=${GC_BEAD_ID:-}
     if [ -z "$CURRENT_WISP" ]; then
       CURRENT_WISP=$(gc bd list --assignee="$GC_AGENT" --status=in_progress --type=wisp --limit=1 --json | jq -r '.[0].id // empty')
     fi
     NEXT=$(gc bd mol wisp mol-refinery-patrol --root-only --var target_branch={{target_branch}} --var rig_name={{rig_name}} --var binding_prefix={{binding_prefix}} --var default_merge_strategy={{default_merge_strategy}} --json | jq -r '.new_epic_id // empty')
     if [ -z "$NEXT" ]; then
       echo "Could not pour next refinery wisp; not burning."
       gc runtime drain-ack
       exit 1
     fi
     if ! gc bd update "$NEXT" --assignee="$GC_AGENT"; then
       echo "Could not assign next refinery wisp; not burning."
       gc runtime drain-ack
       exit 1
     fi
     if [ -n "$CURRENT_WISP" ]; then
       gc bd mol burn "$CURRENT_WISP" --force
     else
       echo "Could not resolve current wisp; not burning."
       gc runtime drain-ack
       exit 1
     fi
     ```
   - Close this step after the current wisp is burned.

3. If pre-existing on target:
   - Check for duplicates first:
     ```bash
     gc bd list --type=bug --status=open --search "<failure summary>"
     ```
   - If a matching bug already exists: note its ID and proceed with merge.
   - If no duplicate: file a new bead:
     ```bash
     gc bd create --type=bug --priority=1 --title="Pre-existing failure: <summary>"
     ```
   - Proceed with merge (failure not caused by this branch)

**GATE**: Cannot merge without all checks passing OR pre-existing bug filed/found.
**FORBIDDEN**: Writing code to fix failures. You are a merge processor."""

[[steps]]
id = "merge-push"
title = "Merge and push"
needs = ["handle-failures"]
description = """
**Config: target_branch = {{target_branch}}**
**Config: delete_merged_branches = {{delete_merged_branches}}**

Read the merge target and merge strategy from the work bead metadata:
```bash
BRANCH=$(gc bd show $WORK --json | jq -r '.[0].metadata.branch')
TARGET=$(gc bd show $WORK --json | jq -r '.[0].metadata.target // "{{target_branch}}"')
MERGE_STRATEGY=$(gc bd show $WORK --json | jq -r '.[0].metadata.merge_strategy // "{{default_merge_strategy}}"')
# gc-toolkit local delta: normalize empty default_merge_strategy var. When the
# wisp is poured with `--var default_merge_strategy=` (e.g., an operator
# bypasses the formula default explicitly), the substitution leaves
# MERGE_STRATEGY empty and `direct` is the safe fallback.
MERGE_STRATEGY="${MERGE_STRATEGY:-direct}"
EXISTING_PR=$(gc bd show $WORK --json | jq -r '.[0].metadata.existing_pr // empty')
ORIGIN_REPO_ERROR=""
if command -v gh >/dev/null 2>&1; then
  if ! ORIGIN_REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner' 2>&1); then
    ORIGIN_REPO_ERROR="gh repo view failed while resolving origin repository: $ORIGIN_REPO"
    ORIGIN_REPO=""
  fi
else
  ORIGIN_URL=$(git remote get-url origin)
  case "$ORIGIN_URL" in
    git@github.com:*|https://github.com/*)
      ORIGIN_REPO=$(printf '%s\n' "$ORIGIN_URL" \
        | sed -E 's#^git@github.com:##; s#^https://github.com/##; s#\\.git$##')
      ;;
    *)
      ORIGIN_REPO_ERROR="GitHub REST fallback supports only github.com origin remotes; install gh for $ORIGIN_URL."
      ;;
  esac
fi
if [ "$MERGE_STRATEGY" = "pr" ]; then
  MERGE_STRATEGY="mr"
fi
if [ -n "$EXISTING_PR" ] && [ "$MERGE_STRATEGY" = "direct" ]; then
  echo "metadata.existing_pr requires pull-request handoff; using merge_strategy=mr."
  MERGE_STRATEGY="mr"
fi

# gc-toolkit local delta: surface integration-branch targets so the operator
# knows direct refinery handling lands on the convoy's integration branch, not
# {{target_branch}}; graduation to {{target_branch}} is system-auto once all the
# convoy's children close (find-work pass (c), reconcile-graduated-convoys.sh).
case "$TARGET" in
  integration/*)
    echo "INFO: Merging $WORK to integration branch '$TARGET' (not {{target_branch}}). The owning OWNED convoy graduates to {{target_branch}} automatically once all its children close — the refinery opens a human-approved integration->{{target_branch}} PR (find-work pass (c), gated on integration_branch_auto_land). No manual graduation bead or 'gc convoy land' needed."
    ;;
esac

block_existing_pr() {
  reason="$1"
  gc bd update $WORK \
    --assignee="" \
    --set-metadata merge_result=blocked \
    --set-metadata gc.routed_to=human \
    --set-metadata blocked_reason="$reason"
  gc mail send mayor/ -s "ESCALATION: invalid existing_pr for $WORK" -m "$reason
Work bead: $WORK
Existing PR: $EXISTING_PR
Branch: $BRANCH
Target: $TARGET"
  CURRENT_WISP=${GC_BEAD_ID:-}
  if [ -z "$CURRENT_WISP" ]; then
    CURRENT_WISP=$(gc bd list --assignee="$GC_AGENT" --status=in_progress --type=wisp --limit=1 --json | jq -r '.[0].id // empty')
  fi
  if [ -z "$CURRENT_WISP" ]; then
    echo "Could not resolve current wisp; not burning."
    echo "$reason"
    echo "STOP. Existing PR metadata needs human correction."
    gc runtime drain-ack
    exit 1
  fi
  NEXT=$(gc bd mol wisp mol-refinery-patrol --root-only --var target_branch={{target_branch}} --var rig_name={{rig_name}} --var binding_prefix={{binding_prefix}} --var default_merge_strategy={{default_merge_strategy}} --json | jq -r '.new_epic_id // empty')
  if [ -z "$NEXT" ]; then
    echo "Could not pour next refinery wisp; not burning."
    gc runtime drain-ack
    exit 1
  fi
  if ! gc bd update "$NEXT" --assignee="$GC_AGENT"; then
    echo "Could not assign next refinery wisp; not burning."
    gc runtime drain-ack
    exit 1
  fi
  if [ -n "$CURRENT_WISP" ]; then
    gc bd mol burn "$CURRENT_WISP" --force
  else
    echo "Could not resolve current wisp; not burning."
    echo "$reason"
    echo "STOP. Existing PR metadata needs human correction."
    gc runtime drain-ack
    exit 1
  fi
  echo "$reason"
  echo "STOP. Existing PR metadata needs human correction."
  gc runtime drain-ack
  exit 1
}

branch_has_real_change() {
  # Shared false-completion predicate (0-diff/0-commit guard). Does
  # <branch-ref> introduce a real change vs its merge-base with
  # <target-ref>? Diff is authoritative — commit-count alone is a weaker
  # proxy because a branch can carry commits that net-zero — so we use
  # `git diff --quiet` and ALSO require >=1 commit beyond the base.
  #   exit 0 = real change (safe to merge / open PR)
  #   exit 1 = empty: no diff, or no commits, vs base (REFUSE close-as-merged)
  #   exit 2 = base/diff could not be computed: merge-base failed OR `git diff`
  #           itself errored (exit >1). Fail closed — a tool error is a suspect,
  #           not a licence to merge — so the caller halts, never improvises.
  bhrc_target="$1"
  bhrc_branch="$2"
  bhrc_base=$(git merge-base "$bhrc_target" "$bhrc_branch" 2>/dev/null) || return 2
  git diff --quiet "$bhrc_base" "$bhrc_branch"
  case "$?" in
    0) return 1 ;;  # no diff -> empty -> refuse
    1) : ;;         # diff present -> fall through to the commit-count check
    *) return 2 ;;  # git diff errored -> suspect -> refuse (fail closed)
  esac
  [ "$(git rev-list --count "$bhrc_base..$bhrc_branch" 2>/dev/null || echo 0)" -ge 1 ] || return 1
  return 0
}

halt_false_completion() {
  # branch_has_real_change tripped: a close-as-merged would assert "work was
  # merged" for a branch that merges to a no-op, which is definitionally
  # false. Halt-and-escalate (NEVER silent retry): leave the bead blocked
  # with a structured note, hand to human, nudge mayor + witness, then stop.
  # This surfaces the transient cause (e.g. session starvation -> 0-commit
  # polecat) instead of masking it.
  fc_branch="$1"
  fc_base="$2"
  gc bd update $WORK \
    --status=blocked \
    --assignee="" \
    --set-metadata merge_result=refused_false_completion \
    --set-metadata gc.routed_to=human \
    --set-metadata false_completion_suspected="branch $fc_branch no verified change vs $fc_base; refused merge-close"
  gc session nudge mayor "FALSE-COMPLETION HALT: $WORK — branch $fc_branch no verified change vs $fc_base; refused close-as-merged. Bead left blocked; NEVER silent retry."
  gc session nudge "${GC_RIG:+$GC_RIG/}{{binding_prefix}}witness" "FALSE-COMPLETION HALT: $WORK — branch $fc_branch no verified change vs $fc_base; refused close-as-merged."
  echo "REFUSED close-as-merged: $WORK branch $fc_branch introduces no real change vs $fc_base."
  echo "STOP. Bead left blocked + escalated to mayor/witness. NEVER silent retry."
  gc runtime drain-ack
  exit 1
}

pr_lookup_missing() {
  case "$1" in
    *"Could not resolve to a PullRequest"*|*"could not resolve to a PullRequest"*|*"no pull requests found"*|*"Not Found"*|*"not found"*|*"404"*) return 0 ;;
    *) return 1 ;;
  esac
}

pr_lookup_repo_mismatch() {
  case "$1" in
    *" belongs to repo "*", want "*) return 0 ;;
    *) return 1 ;;
  esac
}

resolve_github_token() {
  TOKEN="${GH_TOKEN:-${GITHUB_TOKEN:-${GIT_TOKEN:-}}}"
  if [ -n "$TOKEN" ]; then
    printf '%s\n' "$TOKEN"
    return
  fi
  printf 'protocol=https\nhost=github.com\n\n' \
    | GIT_TERMINAL_PROMPT=0 git credential fill 2>/dev/null \
    | sed -n 's/^password=//p' \
    | head -n 1
}

init_github_rest() {
  if [ -n "${API:-}" ] && [ -n "${TOKEN:-}" ]; then
    return 0
  fi
  if [ -n "$ORIGIN_REPO_ERROR" ]; then
    echo "$ORIGIN_REPO_ERROR" >&2
    return 1
  fi
  TOKEN=$(resolve_github_token)
  if [ -z "$TOKEN" ]; then
    echo "GitHub PR mode requires gh or a GitHub token available from env/git credential fill." >&2
    return 1
  fi
  case "$ORIGIN_REPO" in
    */*)
      OWNER=${ORIGIN_REPO%%/*}
      REPO=${ORIGIN_REPO#*/}
      ;;
    *)
      echo "Could not resolve standard github.com origin repository for REST fallback." >&2
      return 1
      ;;
  esac
  API="https://api.github.com/repos/$OWNER/$REPO"
}

curl_gh_api() {
  err_file="$1"
  shift
  curl -fsS \
    -H "Accept: application/vnd.github+json" \
    -H "Authorization: Bearer $TOKEN" \
    -H "Content-Type: application/json" \
    -H "X-GitHub-Api-Version: 2022-11-28" \
    "$@" 2>"$err_file"
}

lookup_pr_info() {
  ref="$1"
  err_file="$2"
  if command -v gh >/dev/null 2>&1; then
    gh pr view --json url,number,state,headRefName,baseRefName,headRepositoryOwner,headRepository -- "$ref" 2>"$err_file"
    return $?
  fi
  if ! init_github_rest 2>"$err_file"; then
    return 1
  fi
  PR_REF_REPO=$(printf '%s\n' "$ref" | sed -nE 's#^[Hh][Tt][Tt][Pp][Ss]://github.com/([^/]+/[^/]+)/pull/[0-9]+/?$#\\1#p' | head -n 1)
  if [ -n "$PR_REF_REPO" ] && [ "$PR_REF_REPO" != "$ORIGIN_REPO" ]; then
    echo "Pull request $ref belongs to repo $PR_REF_REPO, want $ORIGIN_REPO." >"$err_file"
    return 1
  fi
  PR_NUMBER=$(printf '%s\n' "$ref" | sed -nE 's#^[Hh][Tt][Tt][Pp][Ss]://github.com/[^/]+/[^/]+/pull/([0-9]+)/?$#\\1#p; s|^#([0-9]+)$|\\1|p; s|^([0-9]+)$|\\1|p' | head -n 1)
  if [ -z "$PR_NUMBER" ]; then
    PR_MATCHES=$(curl_gh_api "$err_file" \
      --get "$API/pulls" \
      --data-urlencode "state=open" \
      --data-urlencode "head=$OWNER:$ref" \
      --data-urlencode "base=$TARGET") || return 1
    PR_NUMBER=$(printf '%s\n' "$PR_MATCHES" | jq -r '.[0].number // empty')
  fi
  if [ -z "$PR_NUMBER" ]; then
    echo "Pull request $ref was not found." >"$err_file"
    return 1
  fi
  PR_RAW=$(curl_gh_api "$err_file" "$API/pulls/$PR_NUMBER") || return 1
  printf '%s\n' "$PR_RAW" \
    | jq '{url:.html_url, number, state:(.state | ascii_upcase), headRefName:.head.ref, baseRefName:.base.ref, headRepositoryOwner:{login:.head.repo.owner.login}, headRepository:{name:.head.repo.name}}'
}

if [ "$MERGE_STRATEGY" = "mr" ] && [ -n "$EXISTING_PR" ]; then
  if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
    block_existing_pr "metadata.existing_pr is set but metadata.branch is missing."
  fi

  if [ -z "$ORIGIN_REPO" ]; then
    [ -n "$ORIGIN_REPO_ERROR" ] && echo "$ORIGIN_REPO_ERROR"
    echo "Could not resolve origin repository for existing PR validation. STOP. Debug and retry without mutating bead state."
    gc runtime drain-ack
    exit 1
  fi

  EXISTING_PR_ERR=$(mktemp)
  EXISTING_PR_INFO=$(lookup_pr_info "$EXISTING_PR" "$EXISTING_PR_ERR")
  EXISTING_PR_STATUS=$?
  EXISTING_PR_ERROR=$(cat "$EXISTING_PR_ERR")
  rm -f "$EXISTING_PR_ERR"
  if [ "$EXISTING_PR_STATUS" -ne 0 ] || [ -z "$EXISTING_PR_INFO" ]; then
    if pr_lookup_repo_mismatch "$EXISTING_PR_ERROR"; then
      block_existing_pr "Existing PR $EXISTING_PR is not in $ORIGIN_REPO. $EXISTING_PR_ERROR"
    fi
    if pr_lookup_missing "$EXISTING_PR_ERROR"; then
      block_existing_pr "Existing PR $EXISTING_PR was not found or is not accessible."
    fi
    echo "Could not resolve existing PR $EXISTING_PR. STOP. Debug and retry without mutating bead state."
    [ -n "$EXISTING_PR_ERROR" ] && echo "$EXISTING_PR_ERROR"
    gc runtime drain-ack
    exit 1
  fi

  EXISTING_PR_STATE=$(printf '%s\n' "$EXISTING_PR_INFO" | jq -r '.state')
  EXISTING_PR_HEAD=$(printf '%s\n' "$EXISTING_PR_INFO" | jq -r '.headRefName')
  EXISTING_PR_BASE=$(printf '%s\n' "$EXISTING_PR_INFO" | jq -r '.baseRefName')
  EXISTING_PR_URL=$(printf '%s\n' "$EXISTING_PR_INFO" | jq -r '.url')
  EXISTING_PR_REPO=$(printf '%s\n' "$EXISTING_PR_URL" | sed -E 's#^https://github.com/([^/]+/[^/]+)/pull/[0-9]+$#\\1#')
  EXISTING_PR_HEAD_REPO=$(printf '%s\n' "$EXISTING_PR_INFO" | jq -r '.headRepositoryOwner.login + "/" + .headRepository.name')

  if [ "$EXISTING_PR_STATE" != "OPEN" ]; then
    block_existing_pr "Existing PR $EXISTING_PR is $EXISTING_PR_STATE, want OPEN."
  fi
  if [ "$EXISTING_PR_HEAD" != "$BRANCH" ]; then
    block_existing_pr "Existing PR $EXISTING_PR targets branch $EXISTING_PR_HEAD, want $BRANCH."
  fi
  if [ "$EXISTING_PR_BASE" != "$TARGET" ]; then
    block_existing_pr "Existing PR $EXISTING_PR targets base $EXISTING_PR_BASE, want $TARGET."
  fi
  if [ "$EXISTING_PR_REPO" != "$ORIGIN_REPO" ]; then
    block_existing_pr "Existing PR $EXISTING_PR belongs to repo $EXISTING_PR_REPO, want $ORIGIN_REPO."
  fi
  if [ "$EXISTING_PR_HEAD_REPO" != "$ORIGIN_REPO" ]; then
    block_existing_pr "Existing PR $EXISTING_PR head repo $EXISTING_PR_HEAD_REPO, want $ORIGIN_REPO."
  fi
fi

if [ "$MERGE_STRATEGY" = "mr" ] && [ -z "$ORIGIN_REPO" ]; then
  [ -n "$ORIGIN_REPO_ERROR" ] && echo "$ORIGIN_REPO_ERROR"
  echo "Could not resolve origin repository for pull-request handoff. STOP. Debug and retry without mutating bead state."
  gc runtime drain-ack
  exit 1
fi
```

**If MERGE_STRATEGY = "direct" (default):**

gc-toolkit local delta: if the push to `$TARGET` is rejected because the
target branch is GitHub-protected (GH006 / GH013 / "protected branch" /
"Changes must be made through a pull request" / "approving review" /
"Cannot update this protected ref"), refinery automatically promotes the
work bead to `merge_strategy=pr` and continues under the "mr" block below
— no operator intervention required. Any other push failure stops the
wisp for debugging.

**0. Refuse a 0-diff branch (false-completion guard):**

A close-as-merged asserts "work was merged"; a branch that introduces no
change vs its merge-base merging is definitionally false. Refuse it before
touching `$TARGET`. Legit no-op resolutions MUST use wontfix/duplicate/
not-planned, never merged — so this never blocks a real merge.
```bash
branch_has_real_change "origin/$TARGET" temp || \
  halt_false_completion "$BRANCH" "$(git merge-base "origin/$TARGET" temp 2>/dev/null || printf '%s' "origin/$TARGET")"
```

**1. Merge, push, verify, and close work bead (auto-promote on protected branch):**

Run this as one script. It merges, pushes, verifies the remote target ref,
then records merge metadata and closes the bead. It uses a temporary
detached worktree for the target branch because the real target branch may
already be checked out in the rig's canonical worktree (`$GC_RIG_ROOT`). Do
NOT replace this with `git checkout $TARGET` — that fails with `fatal:
'$TARGET' is already used by worktree` under the normal multi-worktree
layout and halts the merge before push/auto-promote. The metadata write
happens only after the remote target ref is verified at the merged SHA.

gc-toolkit local delta: the protected-branch auto-promote (per the note
above) lives in the push branch below — a GitHub-protected `$TARGET` flips
the bead to `merge_strategy=pr` and falls through to the "mr" block instead
of failing. The rebased `temp` branch is never touched by the merge (it
happens in the throwaway worktree against `temp`'s SHA), so it stays intact
and checked out in the refinery worktree for the PR push.

```bash
set -e

MERGE_PARENT=$(mktemp -d "${TMPDIR:-/tmp}/gascity-refinery-merge.XXXXXX")
MERGE_WT="$MERGE_PARENT/target"
cleanup_merge_wt() {
  git worktree remove --force "$MERGE_WT" >/dev/null 2>&1 || true
  rm -rf "$MERGE_PARENT"
}
trap cleanup_merge_wt EXIT

is_protected_branch_error() {
  case "$1" in
    *GH006*|*GH013*|*"protected branch"*|*"refusing to allow"*|\
    *"Changes must be made through a pull request"*|\
    *"approving review"*|*"Cannot update this protected ref"*) return 0 ;;
    *) return 1 ;;
  esac
}

git fetch origin "+refs/heads/${TARGET}:refs/remotes/origin/${TARGET}"
TEMP_SHA=$(git rev-parse temp)
git worktree add --detach "$MERGE_WT" "origin/$TARGET"
git -C "$MERGE_WT" merge --ff-only "$TEMP_SHA"
MERGED_SHA=$(git -C "$MERGE_WT" rev-parse HEAD)
MERGED_SHORT=$(git -C "$MERGE_WT" rev-parse --short HEAD)

PUSH_ERR=$(mktemp)
if git -C "$MERGE_WT" push origin "HEAD:$TARGET" 2>"$PUSH_ERR"; then
  rm -f "$PUSH_ERR"

  git fetch origin "+refs/heads/${TARGET}:refs/remotes/origin/${TARGET}"
  REMOTE=$(git rev-parse "origin/$TARGET")
  if [ "$MERGED_SHA" != "$REMOTE" ]; then
    echo "PUSH FAILED — origin/$TARGET is $REMOTE, want $MERGED_SHA. STOP. Do not mutate bead state."
    gc runtime drain-ack
    exit 1
  fi

  gc bd update "$WORK" \
    --set-metadata merge_result=merged \
    --set-metadata merged_sha="$MERGED_SHA" \
    --set-metadata merged_target="$TARGET" \
    --unset-metadata rejection_reason && \
  gc bd close "$WORK" --reason "Merged to $TARGET at $MERGED_SHORT"
else
  PUSH_STDERR=$(cat "$PUSH_ERR")
  rm -f "$PUSH_ERR"
  if is_protected_branch_error "$PUSH_STDERR"; then
    echo "Direct push to '$TARGET' rejected (protected branch). Auto-promoting to merge_strategy=pr."
    gc bd update "$WORK" --set-metadata merge_strategy=pr
    MERGE_STRATEGY=mr
    # temp is untouched and still checked out in the refinery worktree; the
    # throwaway merge worktree is removed by the trap. Fall through to the
    # "If MERGE_STRATEGY = 'mr'" block below.
  else
    echo "Push failed: $PUSH_STDERR"
    echo "STOP. Debug and retry. Do NOT continue."
    gc runtime drain-ack
    exit 1
  fi
fi
```

If the script exits non-zero: STOP. Debug and retry. Do NOT write merge
metadata, close the bead, or delete the source branch.

Both the `--set-metadata` write and the `gc bd close` are required —
`merged_sha` and `merged_target` are the only forensic breadcrumbs tying a
closed bead to its merge commit on `$TARGET`. `--unset-metadata
rejection_reason` clears any stale rejection field from an earlier
rejected/reworked attempt before the successful close.

**If `$MERGE_STRATEGY` was just flipped to `mr` (auto-promotion fired),
skip steps 2-3 below and execute the "If MERGE_STRATEGY = 'mr'" block
instead. The rebased `temp` branch is still checked out in the refinery
worktree and available for the PR push.**

**2. Cleanup (leaves worktree detached so other worktrees can hold $TARGET):**
```bash
git checkout --detach "origin/$TARGET" >/dev/null 2>&1 || true
git branch -d temp || git branch -D temp || true
```
If delete_merged_branches = "true": `git push origin --delete $BRANCH`

**3. Auto-fast-forward rig canonical checkout (best-effort):**

**Config: auto_ff_rig_main = {{auto_ff_rig_main}}**

gc-toolkit local delta: if `auto_ff_rig_main = "true"`, attempt to keep
the rig's canonical checkout (`$GC_RIG_ROOT`) in sync with the freshly
pushed `$TARGET`. The merge metadata is already recorded and the bead is
already closed — this is a side-effect cleanup that MUST NOT abort the
merge or affect bead state on failure.

```bash
RIG_ROOT="${GC_RIG_ROOT:-}"
if [ "{{auto_ff_rig_main}}" = "true" ] && [ -n "$RIG_ROOT" ] \
   && { [ -d "$RIG_ROOT/.git" ] || [ -f "$RIG_ROOT/.git" ]; }; then
  RIG_BRANCH=$(git -C "$RIG_ROOT" branch --show-current 2>/dev/null || echo "")
  RIG_DIRTY=$(git -C "$RIG_ROOT" status --porcelain --untracked-files=no 2>/dev/null)
  if [ "$RIG_BRANCH" = "$TARGET" ] && [ -z "$RIG_DIRTY" ]; then
    git -C "$RIG_ROOT" fetch --quiet origin "$TARGET" 2>/dev/null || true
    if git -C "$RIG_ROOT" merge-base --is-ancestor \
         "$TARGET" "origin/$TARGET" 2>/dev/null; then
      if git -C "$RIG_ROOT" pull --ff-only --quiet origin "$TARGET" 2>/dev/null; then
        echo "Auto-FF: $RIG_ROOT $TARGET → $(git -C "$RIG_ROOT" rev-parse --short HEAD)"
      else
        echo "Auto-FF: pull failed (best-effort, ignoring)"
      fi
    else
      BEHIND=$(git -C "$RIG_ROOT" rev-list --count "$TARGET..origin/$TARGET" 2>/dev/null || echo "?")
      AHEAD=$(git -C "$RIG_ROOT" rev-list --count "origin/$TARGET..$TARGET" 2>/dev/null || echo "?")
      echo "Auto-FF: $RIG_ROOT diverged ($AHEAD ahead, $BEHIND behind origin/$TARGET) — not modifying"
    fi
  elif [ -n "$RIG_DIRTY" ]; then
    echo "Auto-FF: $RIG_ROOT has uncommitted changes — skipping"
  elif [ "$RIG_BRANCH" != "$TARGET" ]; then
    echo "Auto-FF: $RIG_ROOT on '$RIG_BRANCH', not '$TARGET' — skipping"
  fi
fi
```

If `auto_ff_rig_main = "false"`: skip entirely. The stance can shift to a
different surfacing mechanism (cron, hook, manual) without changing this
formula.

**If MERGE_STRATEGY = "mr":**

Refinery does NOT land the branch directly. Instead it publishes a pull
request and treats PR creation as the terminal handoff for THIS PATROL
ITERATION — but NOT as completion of the work bead. Under close-on-merge the
work bead stays OPEN as the PR's gating anchor and closes only when the PR
merges (step 4 + reconcile-merged-prs.sh). See docs/work-bead-state-machine.md.

**0. Refuse a 0-diff branch (false-completion guard):**

The same predicate covers the empty-PR / 0-commit concern: do not publish a
pull request for a branch that introduces no change vs its merge-base. The
PR handoff closes the bead, so an empty PR is the same false completion as
an empty direct merge.
```bash
branch_has_real_change "origin/$TARGET" temp || \
  halt_false_completion "$BRANCH" "$(git merge-base "origin/$TARGET" temp 2>/dev/null || printf '%s' "origin/$TARGET")"
```

**1. Push the rebased branch back to origin:**
```bash
git checkout temp
git push origin HEAD:$BRANCH --force-with-lease
```
If `--force-with-lease` fails, the existing PR branch moved after your
fetch. STOP, fetch the latest branch, rebase your temp branch again, and
retry with `--force-with-lease`. Do not use plain `--force`.

**2. Reuse, create, or discover the pull request:**

Read the bead's description and notes once and stage them into a PR body
file (using `--body-file` avoids quoting/encoding hazards with multi-line
markdown). The body always carries the bead's full description (the
"why"), and includes the polecat's implementation notes (the "what")
when present.

gc-toolkit local delta: if `review_gate = "codex"`, open the PR as draft
so the codex review-bead gate (dispatched in step 4) gates ready-status
on the codex reviewer's verdict.

```bash
WORK_JSON=$(gc bd show $WORK --json)
EXISTING_PR=$(printf '%s' "$WORK_JSON" | jq -r '.[0].metadata.existing_pr // empty')
ISSUE_TITLE=$(printf '%s' "$WORK_JSON" | jq -r '.[0].title')
ISSUE_DESC=$(printf '%s' "$WORK_JSON" | jq -r '.[0].description // empty')
ISSUE_NOTES=$(printf '%s' "$WORK_JSON" | jq -r '.[0].notes // empty')
ISSUE_TYPE=$(printf '%s' "$WORK_JSON" | jq -r '.[0].issue_type // "task"')
ISSUE_PRIORITY=$(printf '%s' "$WORK_JSON" | jq -r '.[0].priority // empty')

PR_BODY_FILE=$(mktemp)
{
  echo "## Summary"
  echo
  if [ -n "$ISSUE_DESC" ]; then
    printf '%s\n' "$ISSUE_DESC"
  else
    printf 'Refinery handoff for `%s` (no bead description recorded).\n' "$WORK"
  fi
  if [ -n "$ISSUE_NOTES" ]; then
    echo
    echo "## Implementation notes"
    echo
    printf '%s\n' "$ISSUE_NOTES"
  fi
  echo
  echo "## Refinery handoff"
  echo
  printf -- '- Issue: `%s` (%s%s)\n' "$WORK" "$ISSUE_TYPE" "${ISSUE_PRIORITY:+, P$ISSUE_PRIORITY}"
  printf -- '- Source branch: `%s`\n' "$BRANCH"
  printf -- '- Target: `%s`\n' "$TARGET"
  printf -- '- Rebased on `%s` via Gastown Refinery.\n' "$TARGET"
} > "$PR_BODY_FILE"

PR_DRAFT_FLAG=""
if [ "{{review_gate}}" = "codex" ]; then
  PR_DRAFT_FLAG="--draft"
fi

if [ -n "$EXISTING_PR" ]; then
  PR_REF="$EXISTING_PR"
else
  if command -v gh >/dev/null 2>&1; then
    PR_URL=$(gh pr create \
      $PR_DRAFT_FLAG \
      --base "$TARGET" \
      --head "$BRANCH" \
      --title "$ISSUE_TITLE ($WORK)" \
      --body-file "$PR_BODY_FILE" 2>/dev/null || true)

    if [ -z "$PR_URL" ]; then
      PR_URL=$(gh pr view "$BRANCH" --json url -q '.url')
    fi
  else
    PR_ERR=$(mktemp)
    if ! init_github_rest 2>"$PR_ERR"; then
      cat "$PR_ERR"
      rm -f "$PR_ERR"
      gc runtime drain-ack
      exit 1
    fi
    EXISTING=$(curl_gh_api "$PR_ERR" \
      --get "$API/pulls" \
      --data-urlencode "state=open" \
      --data-urlencode "head=$OWNER:$BRANCH" \
      --data-urlencode "base=$TARGET")
    PR_STATUS=$?
    PR_ERROR=$(cat "$PR_ERR")
    if [ "$PR_STATUS" -ne 0 ]; then
      echo "GitHub API request failed while checking for an existing PR for $BRANCH."
      [ -n "$PR_ERROR" ] && echo "$PR_ERROR"
      rm -f "$PR_ERR"
      gc runtime drain-ack
      exit 1
    fi
    PR_NUMBER=$(printf '%s\n' "$EXISTING" | jq -r '.[0].number // empty')
    if [ -z "$PR_NUMBER" ]; then
      CREATE_PAYLOAD=$(jq -n \
        --arg title "$ISSUE_TITLE ($WORK)" \
        --arg head "$BRANCH" \
        --arg base "$TARGET" \
        --rawfile body "$PR_BODY_FILE" \
        --argjson draft "$( [ -n "$PR_DRAFT_FLAG" ] && echo true || echo false )" \
        '{title:$title, head:$head, base:$base, body:$body, draft:$draft}')
      CREATED=$(curl_gh_api "$PR_ERR" \
        -X POST "$API/pulls" \
        -d "$CREATE_PAYLOAD")
      PR_STATUS=$?
      PR_ERROR=$(cat "$PR_ERR")
      if [ "$PR_STATUS" -ne 0 ]; then
        echo "GitHub API request failed while creating a PR for $BRANCH."
        [ -n "$PR_ERROR" ] && echo "$PR_ERROR"
        rm -f "$PR_ERR"
        gc runtime drain-ack
        exit 1
      fi
      PR_NUMBER=$(printf '%s\n' "$CREATED" | jq -r '.number // empty')
      if [ -z "$PR_NUMBER" ]; then
        echo "GitHub API response did not include a pull request number."
        rm -f "$PR_ERR"
        gc runtime drain-ack
        exit 1
      fi
    fi
    PR_RAW=$(curl_gh_api "$PR_ERR" "$API/pulls/$PR_NUMBER")
    PR_STATUS=$?
    PR_ERROR=$(cat "$PR_ERR")
    rm -f "$PR_ERR"
    if [ "$PR_STATUS" -ne 0 ]; then
      echo "GitHub API request failed while reading PR $PR_NUMBER."
      [ -n "$PR_ERROR" ] && echo "$PR_ERROR"
      gc runtime drain-ack
      exit 1
    fi
    PR_URL=$(printf '%s\n' "$PR_RAW" | jq -r '.html_url // empty')
  fi
  PR_REF="$BRANCH"
fi

rm -f "$PR_BODY_FILE"
```

**3. Verify the pull request exists:**
```bash
PR_ERR=$(mktemp)
PR_INFO=$(lookup_pr_info "$PR_REF" "$PR_ERR")
PR_STATUS=$?
PR_ERROR=$(cat "$PR_ERR")
rm -f "$PR_ERR"
if [ "$PR_STATUS" -ne 0 ] || [ -z "$PR_INFO" ]; then
  if [ -n "$EXISTING_PR" ] && pr_lookup_missing "$PR_ERROR"; then
    block_existing_pr "Existing PR $EXISTING_PR was not found or is not accessible."
  fi
  echo "Pull request $PR_REF was not found."
  [ -n "$PR_ERROR" ] && echo "$PR_ERROR"
  gc runtime drain-ack
  exit 1
fi
PR_URL=$(printf '%s\n' "$PR_INFO" | jq -r '.url')
PR_NUMBER=$(printf '%s\n' "$PR_INFO" | jq -r '.number')
PR_STATE=$(printf '%s\n' "$PR_INFO" | jq -r '.state')
PR_HEAD=$(printf '%s\n' "$PR_INFO" | jq -r '.headRefName')
PR_BASE=$(printf '%s\n' "$PR_INFO" | jq -r '.baseRefName')
PR_REPO=$(printf '%s\n' "$PR_URL" | sed -E 's#^https://github.com/([^/]+/[^/]+)/pull/[0-9]+$#\\1#')
PR_HEAD_REPO=$(printf '%s\n' "$PR_INFO" | jq -r '.headRepositoryOwner.login + "/" + .headRepository.name')
echo "$PR_URL $PR_NUMBER $PR_STATE $PR_HEAD $PR_BASE $PR_REPO $PR_HEAD_REPO"
if [ "$PR_STATE" != "OPEN" ]; then
  if [ -n "$EXISTING_PR" ]; then
    block_existing_pr "Existing PR $EXISTING_PR is $PR_STATE, want OPEN."
  fi
  echo "Pull request $PR_REF is $PR_STATE, want OPEN."
  gc runtime drain-ack
  exit 1
fi
if [ "$PR_HEAD" != "$BRANCH" ]; then
  if [ -n "$EXISTING_PR" ]; then
    block_existing_pr "Existing PR $EXISTING_PR targets branch $PR_HEAD, want $BRANCH."
  fi
  echo "Pull request $PR_REF targets branch $PR_HEAD, want $BRANCH."
  gc runtime drain-ack
  exit 1
fi
if [ "$PR_BASE" != "$TARGET" ]; then
  if [ -n "$EXISTING_PR" ]; then
    block_existing_pr "Existing PR $EXISTING_PR targets base $PR_BASE, want $TARGET."
  fi
  echo "Pull request $PR_REF targets base $PR_BASE, want $TARGET."
  gc runtime drain-ack
  exit 1
fi
if [ "$PR_REPO" != "$ORIGIN_REPO" ]; then
  if [ -n "$EXISTING_PR" ]; then
    block_existing_pr "Existing PR $EXISTING_PR belongs to repo $PR_REPO, want $ORIGIN_REPO."
  fi
  echo "Pull request $PR_REF belongs to repo $PR_REPO, want $ORIGIN_REPO."
  gc runtime drain-ack
  exit 1
fi
if [ "$PR_HEAD_REPO" != "$ORIGIN_REPO" ]; then
  if [ -n "$EXISTING_PR" ]; then
    block_existing_pr "Existing PR $EXISTING_PR head repo $PR_HEAD_REPO, want $ORIGIN_REPO."
  fi
  echo "Pull request $PR_REF head repo $PR_HEAD_REPO, want $ORIGIN_REPO."
  gc runtime drain-ack
  exit 1
fi
```
If this command fails or prints empty output: STOP. Debug and retry. Do NOT continue.

**4. Record PR metadata and transition the work bead to GATING (it stays OPEN):**

gc-toolkit local delta (close-on-merge): mr-mode does NOT close the work
bead here. Stock GasTown closes at PR-creation; this pack keeps the bead
OPEN as the PR's gating anchor so `closed` always means *merged* and the
dep graph keeps showing who is on which PR. The bead closes later, on a
verified merge, via `reconcile-merged-prs.sh` in the find-work idle loop.
See docs/work-bead-state-machine.md.

The refinery's active endpoint is still PR-created (the bounded patrol loop
is preserved): it records the PR, hands the bead to gating, and moves on —
it does NOT babysit the PR to merge. `pr_url` and `pr_number` are the
forensic breadcrumbs tying the bead to its pull request; `merge_result=pull_request`
is the gating marker the reconcile pass scans for. `--unset-metadata
rejection_reason` clears any stale rejection field from an earlier reworked
attempt.

gc-toolkit local delta: if `review_gate = "codex"`, dispatch a review bead
for the codex polecat pool and attach it as a GATE DEP of the work anchor
(the review bead BLOCKS the anchor) BEFORE the gating transition. Idempotent
— a second refinery pass on the same PR reuses the open review bead.

```bash
if [ "{{review_gate}}" = "codex" ]; then
  CODEX_POOL="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat-codex"
  FIX_POOL="${GC_RIG:+$GC_RIG/}{{binding_prefix}}polecat"
  REVIEW_TITLE="Review PR#$PR_NUMBER: $ISSUE_TITLE"

  EXISTING_REVIEW=$(gc bd list \
    --metadata-field task_kind=review \
    --metadata-field pr_number="$PR_NUMBER" \
    --status=open,in_progress --limit=1 --json 2>/dev/null \
    | jq -r '.[0].id // empty')

  if [ -z "$EXISTING_REVIEW" ]; then
    REVIEW_BEAD=$(gc bd create "$REVIEW_TITLE" -t task --json | jq -r .id)
    gc bd update "$REVIEW_BEAD" \
      --set-metadata task_kind=review \
      --set-metadata pr_url="$PR_URL" \
      --set-metadata pr_number="$PR_NUMBER" \
      --set-metadata fix_target_pool="$FIX_POOL" \
      --set-metadata gc.routed_to="$CODEX_POOL"
    # Gate-as-dep (close-on-merge): the review bead BLOCKS the open anchor.
    # Replaces the retired backward work_bead pointer — the dep graph now
    # carries the gate, and the rework arm resolves the anchor by walking this
    # edge (gc bd dep list <review> --direction=up -t blocks). Best-effort: a
    # failed edge must not strand the PR (the review still routes), so warn.
    gc bd dep "$REVIEW_BEAD" --blocks "$WORK" \
      || echo "WARN: could not attach review $REVIEW_BEAD as a gate-dep of $WORK" >&2
    gc session wake "$CODEX_POOL" || true
    gc session nudge "$CODEX_POOL" "Review bead $REVIEW_BEAD for PR#$PR_NUMBER" || true
  fi
fi

# Close-on-merge: keep the work bead OPEN as the PR's gating anchor. Record the
# PR fields + merged_target, mark it gating (merge_result=pull_request), and
# DETACH it from both work queues so it is neither re-grabbed nor read as demand:
#   - assignee="" -> find-work (assignee=$GC_AGENT, open, has branch) skips it,
#     so the refinery does not re-open the PR in a loop;
#   - gc.routed_to="" -> the open + unassigned anchor is NOT pool demand.
# It closes later, on a verified merge, via reconcile-merged-prs.sh in the
# find-work idle loop. This REPLACES the stock `gc bd close ... "Pull request
# ready"`; closure now means merged, never handed-off.
gc bd update $WORK \
  --status=open \
  --assignee="" \
  --set-metadata merge_result=pull_request \
  --set-metadata pr_url="$PR_URL" \
  --set-metadata pr_number="$PR_NUMBER" \
  --set-metadata merged_target="$TARGET" \
  --set-metadata gc.routed_to="" \
  --unset-metadata rejection_reason
```
If the gating update fails, the bead stays assigned to the refinery and OPEN —
it is simply re-processed next patrol iteration (the `EXISTING_REVIEW` guard and
PR reuse make the retry idempotent). Do NOT hand-close it; closure is the
merge-detection pass's job alone.

**5. Cleanup (leaves worktree detached so other worktrees can hold $TARGET):**
```bash
git checkout "$TARGET"
git branch -d temp
git switch --detach HEAD
```
Do NOT delete `$BRANCH` in mr mode — GitHub pull requests need the source branch.

**If MERGE_STRATEGY = "local":**

STOP. Local-only merge handoff is not implemented in the Gastown example pack.
Leave the work bead assigned to refinery and escalate to mayor for manual handling:
```bash
gc mail send mayor/ -s "ESCALATION: unsupported merge_strategy=local" -m "Work bead: $WORK
Branch: $BRANCH
Target: $TARGET
The Gastown example refinery supports direct and mr/pr merge strategies only."
```
Do NOT close the bead, delete the branch, or burn the wisp until a human decides how to proceed.

**GATE**: direct mode requires a verified target push, then closes the bead. mr
mode requires a verified PR URL, then transitions the bead to GATING (it stays
OPEN); the bead closes only on a verified merge (reconcile-merged-prs.sh), never
at handoff."""

[[steps]]
id = "patrol-summary"
title = "Record patrol cycle summary"
needs = ["merge-push"]
description = """
Summarize this patrol cycle for handoff context. This becomes the
audit trail — the next refinery session can see what happened.

Include:
- Branch merged (name, target)
- Test results (pass/fail, which checks ran)
- Bugs filed (IDs, if any pre-existing failures were tracked)
- Rejections (if the branch was rejected back to pool)
- Any escalations sent

If the cycle ended early (conflict rejection, no work found), note
why and what state was left.

This summary is not stored separately — it lives in the wisp's
closing reason. The next session can find it via `gc bd list --type=wisp
--status=closed --limit=5` if it needs predecessor context."""

[[steps]]
id = "next-iteration"
title = "Prepare next patrol iteration"
needs = ["patrol-summary"]
description = """
**Config: integration_branch_auto_land = {{integration_branch_auto_land}}**

**1. Convoy graduation — handled by the find-work idle loop, not here.**

Graduation is a convergent reconcile pass (`reconcile-graduated-convoys.sh`,
pass (c) of the find-work step), not an inline post-merge step. It must live
there: under close-on-merge a convoy CHILD closes only when
`reconcile-merged-prs.sh` observes its PR merged — on an idle wake, not
synchronously at this merge — so the wake that closes a convoy's last child is
exactly where "all members closed" first becomes true. Pass (c) runs right
after (b) on that same wake and assigns the now-complete OWNED convoy to the
refinery (`branch=integration/<id>`, `target={{target_branch}}`,
`merge_strategy=mr`) to land integration->main behind a human-approved PR.
Owned-only, rig-scoped, idempotent. No coordinator and no `gc convoy land` in
the loop. Nothing to do in this step.

**FORBIDDEN**: Landing integration branches via raw `git merge`/`git push`.
The convoy-bead assignment in pass (c) is the ONLY path.

**2. Resolve the current wisp, pour next iteration, then burn this wisp:**
```bash
CURRENT_WISP=${GC_BEAD_ID:-}
if [ -z "$CURRENT_WISP" ]; then
  CURRENT_WISP=$(gc bd list --assignee="$GC_AGENT" --status=in_progress --type=wisp --limit=1 --json | jq -r '.[0].id // empty')
fi
NEXT=$(gc bd mol wisp mol-refinery-patrol --root-only --var target_branch={{target_branch}} --var rig_name={{rig_name}} --var binding_prefix={{binding_prefix}} --var default_merge_strategy={{default_merge_strategy}} --json | jq -r '.new_epic_id // empty')
if [ -z "$NEXT" ]; then
  echo "Could not pour next refinery wisp; not burning."
  gc runtime drain-ack
  exit 1
fi
if ! gc bd update "$NEXT" --assignee="$GC_AGENT"; then
  echo "Could not assign next refinery wisp; not burning."
  gc runtime drain-ack
  exit 1
fi
if [ -n "$CURRENT_WISP" ]; then
  gc bd mol burn "$CURRENT_WISP" --force
else
  echo "Could not resolve current wisp; not burning."
  gc runtime drain-ack
  exit 1
fi
```

Close this step. The new wisp is ready — re-read formula steps to begin."""
