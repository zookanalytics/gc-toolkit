description = """
Rebase the gascity rig's `origin/main` onto `upstream/main`, drop already-
landed-or-supplanted local commits, run tests, install, push, and notify the
operator. Autonomous through push: completion is either an "everything is up
to date" mail to the operator or an "I've been mailed to take action" mail.

Extends `mol-polecat-base` for the standard polecat lifecycle entry points
(load-context, workspace-setup) but uses its own gating steps in place of
the implement / self-review pair — the work isn't a feature implementation,
it's a controlled rebase with a verdict-keeping survey.

## Variables

| Variable | Default | Description |
|----------|---------|-------------|
| upstream_remote | upstream | Git remote name pointing at gastownhall/gascity |
| origin_remote | origin | Git remote name pointing at the city's fork |
| upstream_branch | main | Branch to rebase onto and push back to |
| test_command | make test | Test command run after rebase |
| install_command | make install | Local rebuild of `gc` into `$INSTALL_DIR` |
| notify_recipient | human | Mail target on completion / abort |
| requesting_keeper | (empty) | Keeper address for the rework-dispatch handback; falls back to notify_recipient if unset |

## Conflict handling: dispatch a rework polecat per kept-commit conflict

Our fork commits represent goals/intents, not literal implementations.
When `git rebase` halts on a kept commit because upstream shifted the
surrounding code, the rebase polecat:

1. Captures the conflict context (kept commit body, conflicted file
   status + markers, upstream's recent diffs touching the same files).
2. Files a rework bead (parent-child to the rebase bead) and dispatches
   a focused rework polecat under `mol-upstream-gc-rebase-rework`, which
   shares this worktree and the in-progress rebase state.
3. Sets `metadata.rebase_in_progress=true` and `metadata.pending_rework`
   on the rebase bead, reassigns it to the requesting keeper, drains.
4. On re-entry (keeper re-pours after the rework polecat closes its
   bead), reads the rework's classification and routes:
   - **mechanical** — `git rebase --continue` (rework polecat already
     committed); log an audit entry.
   - **dropped-absorbed** — `git rebase --skip`; log an audit entry.
   - **judgment-required** — file a review bead, sling a review polecat
     against the rework commit; on approve, `git rebase --continue`; on
     reject, file a follow-up rework bead with the rejection reason and
     drain again.
   - **infeasible** — hand the rebase bead back to the keeper with the
     rework's `infeasible_reason` surfaced via `metadata.conflict_questions`
     so the operator can intervene.
5. The audit log `metadata.conflict_resolutions` accumulates one entry
   per resolved conflict.

This replaces the v6 upstream-wins/`--ours` mechanism (tk-gzat2),
which silently dropped local hunks. The rework-polecat path treats
each conflict as a small, focused rework with classification-driven
routing — no silent drops, no auto-resolution.

## Failure modes

| Step | Failure handling |
|------|------------------|
| survey | LLM judgment can be wrong; record verdicts on the bead and proceed — the rebase step's patch-id check is the safety net for `drop-merged-upstream` |
| rebase | Conflicts dispatch a rework polecat per conflicted kept commit. The post-rebase `test` step is the safety net for "we accepted a rework that broke the kept set." `metadata.backup_ref` keeps any state recoverable. |
| test | Bead handback (`aborted_at=test`) lands first; mail with failure tail is best-effort. Bead stays open so a fix can resume. |
| install | Bead handback (`aborted_at=install`) first; mail best-effort. Bead stays open. |
| push | `--force-with-lease` rejection means a parallel push raced us — do NOT retry. Bead handback (`aborted_at=push`) first; mail best-effort. |

The post-survey **abort** paths (test, install, push) share the same
shape: lock in the bead handback (`aborted_at`, status=open, reassignment
to `notify_recipient`) **before** sending mail. The keeper's prime sweep
catches `aborted_at` beads on next operator engagement, so even a silent
mail failure surfaces the abort within one operator engagement cycle.

The rebase **rework-dispatch handback** is a different shape: bead
handback uses `metadata.rebase_in_progress=true` + `metadata.pending_rework`
+ reassignment to `metadata.requesting_keeper`, with the worktree kept
mid-rebase so the next polecat can resume cheaply. The keeper's prime
sweep matches `rebase_in_progress=true` as a peer predicate to
`aborted_at` and `conflict_questions`.

The rebase **infeasible handback** (rework polecat reported infeasible)
uses the legacy `metadata.conflict_questions` shape so the keeper's
existing operator conversation handles it without bespoke flow."""
formula = "mol-upstream-gc-rebase"
extends = ["mol-polecat-base"]
version = 7

[vars]
[vars.upstream_remote]
description = "Git remote name pointing at the upstream gascity repository"
default = "upstream"

[vars.origin_remote]
description = "Git remote name pointing at the city's fork"
default = "origin"

[vars.upstream_branch]
description = "Branch to rebase onto and push back to"
default = "main"

[vars.test_command]
description = "Command run after rebase to verify correctness"
default = "make test"

[vars.install_command]
description = "Command that rebuilds and installs the gc binary locally"
default = "make install"

[vars.notify_recipient]
description = "Mail target for completion and abort notifications"
default = "human"

[vars.requesting_keeper]
description = "Keeper agent address (e.g., gascity/gascity-keeper) for the rework-dispatch handback. Optional; the rebase step falls back to notify_recipient if unset, but a keeper-aware operator should stamp metadata.requesting_keeper at dispatch so the cooperative-handback path lands cleanly."
default = ""

[[steps]]
id = "workspace-setup"
title = "Set up gascity worktree, fetch upstream, write safety backup ref"
needs = ["load-context"]
description = """
Establish a clean worktree on the gascity rig at `{{origin_remote}}/{{upstream_branch}}`,
fetch the upstream remote, and write a backup ref so the rebase is recoverable.

**1. Locate the gascity rig:**
The keeper dispatches this mol from the gascity rig's bead store. The rig
checkout is at `$GC_RIG_ROOT` (when running rig-scoped) or you can resolve
via `gc rig list --json` from the city root (top-level `.rigs[]` array
with `.name` and `.path` keys).

**2. Reuse or create the worktree:**

Check `metadata.work_dir` first:
```bash
WORKTREE=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.work_dir // empty')
```

If it points to an existing directory, `cd` there and skip to step 3.

Otherwise, create one scoped to this bead:
```bash
RIG_ROOT=$(gc rig list --json | jq -r '.rigs[] | select(.name=="gascity") | .path')
WORKTREE_PATH="$(pwd)/worktrees/{{issue}}"
git -C "$RIG_ROOT" fetch --prune {{origin_remote}}
git -C "$RIG_ROOT" worktree add "$WORKTREE_PATH" -b "rebase/{{issue}}" "{{origin_remote}}/{{upstream_branch}}"
cd "$WORKTREE_PATH"
gc bd update {{issue}} --set-metadata work_dir="$WORKTREE_PATH" --set-metadata branch="rebase/{{issue}}"
```

The local working branch (`rebase/{{issue}}`) lets us rebase without touching
`{{upstream_branch}}` until the push step. The bead's branch metadata records
the working branch, not the destination — the destination is `{{upstream_branch}}`
on `{{origin_remote}}` and the push step writes there with `--force-with-lease`.

**3. Fetch the upstream remote:**
```bash
git fetch {{upstream_remote}} --prune
```

**4. Write (or reuse) the safety backup ref:**

The backup ref must always point at the pre-rebase tip of
`{{origin_remote}}/{{upstream_branch}}`. On a fresh run, mint one. On a
resume after a mid-rebase crash (worktree exists, HEAD has already moved
off the upstream tip) we MUST NOT mint a new ref — it would point at the
post-rebase HEAD and silently destroy the rollback target.

```bash
EXISTING_BACKUP=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref // empty')

if [ -n "$EXISTING_BACKUP" ] && \
        git rev-parse --verify "${EXISTING_BACKUP}^{commit}" >/dev/null 2>&1; then
    BACKUP_REF="$EXISTING_BACKUP"
    echo "Reusing existing backup ref: $BACKUP_REF -> $(git rev-parse --short "$BACKUP_REF")"
else
    PRE_REBASE_TIP=$(git rev-parse --verify "{{origin_remote}}/{{upstream_branch}}")
    HEAD_SHA=$(git rev-parse HEAD)
    if [ "$HEAD_SHA" != "$PRE_REBASE_TIP" ]; then
        echo "ERROR: HEAD ($HEAD_SHA) does not match {{origin_remote}}/{{upstream_branch}}" >&2
        echo "       tip ($PRE_REBASE_TIP). Refusing to mint a new backup_ref —" >&2
        echo "       a new ref here would point at post-rebase state." >&2
        echo "       Recover the pre-rebase tip into HEAD, or set metadata.backup_ref" >&2
        echo "       by hand if you know the prior rollback target." >&2
        gc bd update {{issue}} \
            --set-metadata aborted_at=workspace-setup \
            --status=open \
            --assignee="{{notify_recipient}}" \
            --set-metadata gc.routed_to="{{notify_recipient}}" \
            --notes "Refused to mint backup_ref: HEAD ($HEAD_SHA) does not match {{origin_remote}}/{{upstream_branch}} ($PRE_REBASE_TIP). Resume requires manual recovery."
        gc runtime drain-ack
        exit 1
    fi
    BACKUP_TS=$(date -u +%Y%m%dT%H%M%SZ)
    BACKUP_REF="refs/backups/main-pre-rebase-$BACKUP_TS"
    git update-ref "$BACKUP_REF" "$PRE_REBASE_TIP"
    gc bd update {{issue}} \
        --set-metadata backup_ref="$BACKUP_REF" \
        --set-metadata pre_rebase_tip="$PRE_REBASE_TIP"
fi
```

The backup ref points at the pre-rebase tip of `{{origin_remote}}/{{upstream_branch}}`.
If the rebase has to be unwound, `git reset --hard $BACKUP_REF` restores the
pre-rebase state, and the ref is included in the operator's completion mail.
`metadata.pre_rebase_tip` records the same sha for cross-check, so a future
operator can verify the backup ref hasn't been silently overwritten.

**Exit criteria:** worktree exists at `metadata.work_dir`; HEAD matches the
pre-rebase tip of `{{origin_remote}}/{{upstream_branch}}` on a fresh run (or
the backup ref already validates on a resume); `metadata.backup_ref` is
recorded; `{{upstream_remote}}` has been fetched."""

[[steps]]
id = "preflight-tests"
title = "Skip — rebase variant uses its own gates"
needs = ["workspace-setup"]
description = """
This formula replaces the standard polecat preflight/implement/self-review
sequence with `survey → rebase → test → install → push → notify-and-close`.
There is no preflight to run on `{{upstream_branch}}` for this variant —
the rebase step's patch-id checks plus the post-rebase test gate cover what
preflight would have caught.

Close this step and proceed."""

[[steps]]
id = "implement"
title = "Skip — replaced by survey + rebase steps"
needs = ["preflight-tests"]
description = """
The implementation work for this formula lives in the `survey` and `rebase`
steps below. Close this step and proceed."""

[[steps]]
id = "self-review"
title = "Skip — replaced by test + install steps"
needs = ["implement"]
description = """
The post-rebase verification work for this formula lives in the `test` and
`install` steps below. Close this step and proceed."""

[[steps]]
id = "survey"
title = "Classify each divergent commit as drop-merged-upstream / drop-supplanted / keep"
needs = ["self-review"]
description = """
Build a verdict table for every commit on `{{origin_remote}}/{{upstream_branch}}`
that is not on `{{upstream_remote}}/{{upstream_branch}}`. The verdicts feed
the rebase step (drop-supplanted commits get rewritten away; drop-merged-upstream
commits are dropped automatically by patch-id matching).

**Skip this step on resume** if `metadata.commit_verdicts` is already set.
The verdicts don't change mid-rebase; re-running the survey would burn
context for no gain.

```bash
if [ "$(gc bd show {{issue}} --json | jq -r '.[0].metadata.commit_verdicts // empty')" != "" ]; then
    echo "commit_verdicts already set; skipping survey on resume."
else
```

**1. Compute the divergent set:**
```bash
git range-diff {{upstream_remote}}/{{upstream_branch}}...{{origin_remote}}/{{upstream_branch}}
git log --oneline {{upstream_remote}}/{{upstream_branch}}..{{origin_remote}}/{{upstream_branch}}
```

`range-diff` shows whether each origin commit has a patch-id match upstream
(`=`), a fuzzy match (`~`), or no match (`>`). Use this as input to the
verdicts but don't blindly trust it — read each commit.

**2. Classify each origin commit:**

For each commit (oldest → newest), pick exactly one verdict:

- **drop-merged-upstream** — Patch-id-equal (or trivially-equal) to a commit
  on `{{upstream_remote}}/{{upstream_branch}}`. The rebase will drop it
  automatically.
- **drop-supplanted** — Upstream solves the same problem differently
  (different patch-id; same root cause). LLM judgment: read the upstream
  log around `{{upstream_remote}}/{{upstream_branch}}` for adjacent fixes.
  This commit must be rewritten out via `git rebase -i` in the next step.
- **keep** — Local-only patch with no upstream equivalent. The rebase
  carries it forward.

**3. Persist the verdicts (markdown to bead notes, JSON to metadata):**

Markdown table for `gc bd update --notes`:
```
| sha | subject | verdict | rationale |
|-----|---------|---------|-----------|
| abc1234 | <subject> | drop-merged-upstream | matches upstream <upstream-sha> by patch-id |
| def5678 | <subject> | drop-supplanted | superseded by upstream <upstream-sha> (different approach) |
| ...     | ...     | keep | local-only fix, no upstream equivalent |
```

JSON for `metadata.commit_verdicts` (one entry per origin commit):
```json
[
  {"sha": "abc1234", "subject": "...", "verdict": "drop-merged-upstream", "rationale": "..."},
  {"sha": "def5678", "subject": "...", "verdict": "drop-supplanted", "rationale": "...", "upstream_ref": "..."},
  {"sha": "ghi9abc", "subject": "...", "verdict": "keep", "rationale": "..."}
]
```

Write both:
```bash
gc bd update {{issue}} --notes "<markdown table here>"
gc bd update {{issue}} --set-metadata commit_verdicts='<json string>'
fi  # end of resume-skip guard
```

**Exit criteria:** every divergent commit has a verdict on the bead; the
`metadata.commit_verdicts` JSON is parseable and the markdown table is
readable in the bead notes."""

[[steps]]
id = "rebase"
title = "Rebase onto upstream; dispatch rework polecat per kept-commit conflict"
needs = ["survey"]
description = """
Run a single scripted `git rebase -i` that drops `drop-supplanted` commits
up front via a sequence-editor script. Patch-id matching still drops
`drop-merged-upstream` commits automatically. Remaining `keep` commits
replay onto upstream.

A conflict on a `keep` commit is *not* a failure — it is the dispatch
point for a focused rework polecat that re-implements the commit's
intent on the new upstream layer.

**1. Handle a resume that's mid-rebase with pending_rework or pending_review.**

If `metadata.pending_rework` is set, a prior polecat dispatched a rework
polecat and drained. Read the rework bead's classification and route.

If `metadata.pending_review` is set, a prior polecat dispatched a review
polecat after a `judgment-required` rework. Read the review verdict and
route.

```bash
PENDING_REWORK=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.pending_rework // empty')
PENDING_REVIEW=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.pending_review // empty')
REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper // empty')
[ -z "$REQUESTING_KEEPER" ] && REQUESTING_KEEPER="{{notify_recipient}}"
STUCK=0
REDISPATCH_AFTER_REJECT=0
REDISPATCH_REJECT_REASON=""
REDISPATCH_PRIOR_REWORK=""
DISPATCH_REVIEW=0
VERDICT_PATH=""
```

**1a. If pending_review is set, handle the review verdict first.**

```bash
if [ -n "$PENDING_REVIEW" ]; then
    REVIEW_STATUS=$(gc bd show "$PENDING_REVIEW" --json | jq -r '.[0].status // empty')
    if [ "$REVIEW_STATUS" != "closed" ]; then
        echo "ERROR: pending_review $PENDING_REVIEW is not closed yet; cannot proceed." >&2
        echo "Keeper re-poured prematurely. Drain and let the keeper re-pour when review closes." >&2
        gc runtime drain-ack
        exit 1
    fi
    VERDICT=$(gc bd show "$PENDING_REVIEW" --json | jq -r '.[0].metadata.verdict // empty')
    if [ "$VERDICT" = "approve" ]; then
        gc bd update {{issue}} --unset-metadata pending_review
        VERDICT_PATH="approve"
    elif [ "$VERDICT" = "reject" ]; then
        REJECT_REASON=$(gc bd show "$PENDING_REVIEW" --json | jq -r '.[0].metadata.reject_reason // "review rejected the rework"')
        # Reset the rejected rework commit off HEAD so we're back to the
        # mid-rebase conflict state. The rework polecat's commit was the
        # last commit; HEAD~1 is the pre-rework rebase HEAD.
        if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
            git reset --hard HEAD~1
        fi
        gc bd update {{issue}} --unset-metadata pending_review
        REDISPATCH_AFTER_REJECT=1
        REDISPATCH_REJECT_REASON="$REJECT_REASON"
        REDISPATCH_PRIOR_REWORK="$PENDING_REWORK"
    else
        echo "WARN: review bead $PENDING_REVIEW closed without metadata.verdict; treating as reject for safety." >&2
        if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
            git reset --hard HEAD~1
        fi
        gc bd update {{issue}} --unset-metadata pending_review
        REDISPATCH_AFTER_REJECT=1
        REDISPATCH_REJECT_REASON="review closed without verdict metadata"
        REDISPATCH_PRIOR_REWORK="$PENDING_REWORK"
    fi
fi
```

**1b. If pending_rework is set (and we didn't just reject), handle the
classification.**

```bash
if [ -n "$PENDING_REWORK" ] && [ "$REDISPATCH_AFTER_REJECT" != "1" ]; then
    REWORK_STATUS=$(gc bd show "$PENDING_REWORK" --json | jq -r '.[0].status // empty')
    if [ "$REWORK_STATUS" != "closed" ]; then
        echo "ERROR: pending_rework $PENDING_REWORK is not closed yet; cannot proceed." >&2
        gc runtime drain-ack
        exit 1
    fi
    CLASSIFICATION=$(gc bd show "$PENDING_REWORK" --json | jq -r '.[0].metadata.classification // empty')
    REWORK_COMMIT_SHA=$(gc bd show "$PENDING_REWORK" --json | jq -r '.[0].metadata.commit_sha // empty')
    REWORK_COMMIT_SUBJECT=$(gc bd show "$PENDING_REWORK" --json | jq -r '.[0].metadata.commit_subject // empty')
    REWORK_FILES=$(gc bd show "$PENDING_REWORK" --json | jq -r '.[0].metadata.files_changed // "[]"')

    case "$CLASSIFICATION" in
        mechanical)
            # Rework polecat committed onto HEAD; continue the rebase.
            if ! git -c core.editor=true rebase --continue >/tmp/rebase-out-{{issue}}.txt 2>&1; then
                STUCK=1
            fi
            ENTRY=$(jq -nc \
                --arg sha "$REWORK_COMMIT_SHA" \
                --arg subj "$REWORK_COMMIT_SUBJECT" \
                --arg cls "$CLASSIFICATION" \
                --arg rework "$PENDING_REWORK" \
                --argjson files "$REWORK_FILES" \
                '{commit_sha:$sha, commit_subject:$subj, classification:$cls, resolution:"reworked", rework_bead:$rework, review_bead:null, judgment_summary:null, files_changed:$files}')
            LOG=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')
            LOG=$(printf '%s' "$LOG" | jq -c ". + [$ENTRY]")
            gc bd update {{issue}} --set-metadata conflict_resolutions="$LOG" --unset-metadata pending_rework
            ;;
        dropped-absorbed)
            # Worktree was left clean; skip the conflicted commit.
            if ! git -c core.editor=true rebase --skip >/tmp/rebase-out-{{issue}}.txt 2>&1; then
                STUCK=1
            fi
            ENTRY=$(jq -nc \
                --arg sha "$REWORK_COMMIT_SHA" \
                --arg subj "$REWORK_COMMIT_SUBJECT" \
                --arg cls "$CLASSIFICATION" \
                --arg rework "$PENDING_REWORK" \
                '{commit_sha:$sha, commit_subject:$subj, classification:$cls, resolution:"skipped", rework_bead:$rework, review_bead:null, judgment_summary:null, files_changed:[]}')
            LOG=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')
            LOG=$(printf '%s' "$LOG" | jq -c ". + [$ENTRY]")
            gc bd update {{issue}} --set-metadata conflict_resolutions="$LOG" --unset-metadata pending_rework
            ;;
        judgment-required)
            JUDGMENT=$(gc bd show "$PENDING_REWORK" --json | jq -r '.[0].metadata.judgment_summary // empty')
            if [ "$VERDICT_PATH" = "approve" ]; then
                # Review approved this commit; continue.
                if ! git -c core.editor=true rebase --continue >/tmp/rebase-out-{{issue}}.txt 2>&1; then
                    STUCK=1
                fi
                # PENDING_REVIEW was unset above; pull the review bead from
                # the existing conflict_resolutions partial (we passed it
                # through the approve-path metadata write).
                REVIEW_FOR_LOG=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.last_review_bead // ""')
                ENTRY=$(jq -nc \
                    --arg sha "$REWORK_COMMIT_SHA" \
                    --arg subj "$REWORK_COMMIT_SUBJECT" \
                    --arg cls "$CLASSIFICATION" \
                    --arg rework "$PENDING_REWORK" \
                    --arg review "$REVIEW_FOR_LOG" \
                    --arg judgment "$JUDGMENT" \
                    --argjson files "$REWORK_FILES" \
                    '{commit_sha:$sha, commit_subject:$subj, classification:$cls, resolution:"reworked-with-review", rework_bead:$rework, review_bead:$review, judgment_summary:$judgment, files_changed:$files}')
                LOG=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')
                LOG=$(printf '%s' "$LOG" | jq -c ". + [$ENTRY]")
                gc bd update {{issue}} --set-metadata conflict_resolutions="$LOG" --unset-metadata pending_rework --unset-metadata last_review_bead
            else
                # Need to dispatch the review polecat.
                DISPATCH_REVIEW=1
            fi
            ;;
        infeasible)
            INFEASIBLE_REASON=$(gc bd show "$PENDING_REWORK" --json | jq -r '.[0].metadata.infeasible_reason // "rework polecat reported infeasible"')
            ENTRY=$(jq -nc \
                --arg sha "$REWORK_COMMIT_SHA" \
                --arg subj "$REWORK_COMMIT_SUBJECT" \
                --arg cls "$CLASSIFICATION" \
                --arg rework "$PENDING_REWORK" \
                --arg reason "$INFEASIBLE_REASON" \
                '{commit_sha:$sha, commit_subject:$subj, classification:$cls, resolution:"escalated-to-keeper", rework_bead:$rework, review_bead:null, judgment_summary:null, files_changed:[], infeasible_reason:$reason}')
            LOG=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')
            LOG=$(printf '%s' "$LOG" | jq -c ". + [$ENTRY]")
            QUESTIONS=$(jq -nc \
                --arg sha "$REWORK_COMMIT_SHA" \
                --arg subj "$REWORK_COMMIT_SUBJECT" \
                --arg rework "$PENDING_REWORK" \
                --arg reason "$INFEASIBLE_REASON" \
                '[{commit_sha:$sha, commit_subject:$subj, rework_bead:$rework, question:("rework polecat reported infeasible: " + $reason + ". Operator must intervene — either drive the rework by hand in the worktree, or skip the commit via git rebase --skip, or git rebase --abort to roll back.")}]')
            gc bd update {{issue}} \
                --set-metadata conflict_resolutions="$LOG" \
                --set-metadata conflict_questions="$QUESTIONS" \
                --unset-metadata pending_rework \
                --unset-metadata rebase_in_progress \
                --status=open \
                --assignee="$REQUESTING_KEEPER" \
                --set-metadata gc.routed_to="$REQUESTING_KEEPER"
            gc session nudge "$REQUESTING_KEEPER" "rebase {{issue}}: rework infeasible on $REWORK_COMMIT_SHA — operator intervention needed"
            gc runtime drain-ack
            exit 0
            ;;
        *)
            echo "ERROR: pending_rework $PENDING_REWORK closed without metadata.classification" >&2
            STUCK=1
            ;;
    esac
fi
```

**1c. Build the sequence-editor script (for the fresh-rebase case).**

The script mutates the rebase todo list git generates: for every sha in
`metadata.commit_verdicts` whose verdict is `drop-supplanted`, rewrite
`pick <sha>` → `drop <sha>` in the todo file. The shas are passed in
via the exported `DROP_SHAS` environment variable so the heredoc body
can stay quoted (no escaping ambiguity).

```bash
DROP_SHAS=$(gc bd show {{issue}} --json | jq -r \
  '.[0].metadata.commit_verdicts // "[]" | fromjson
   | map(select(.verdict=="drop-supplanted") | .sha) | join(" ")')
export DROP_SHAS

cat > /tmp/seqedit-{{issue}}.sh <<'SEQ'
#!/bin/sh
todo=$1
for sha in $DROP_SHAS; do
  sed -i -E "s/^pick (${sha}[[:alnum:]]*) /drop \\1 /" "$todo"
done
SEQ
chmod +x /tmp/seqedit-{{issue}}.sh
```

If `DROP_SHAS` is empty (no `drop-supplanted` entries in the verdict
table), the sequence editor is a no-op and the rebase behaves like a
plain `git rebase {{upstream_remote}}/{{upstream_branch}}` with patch-id
auto-drops.

**1d. Start the rebase (only if not already mid-rebase).**

If we resumed from a rework-classification branch above (or if we just
rejected a rework), the rebase is already in progress. Otherwise, start
fresh.

```bash
if [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ] && [ "$STUCK" != "1" ]; then
    GIT_SEQUENCE_EDITOR=/tmp/seqedit-{{issue}}.sh \
      git rebase -i {{upstream_remote}}/{{upstream_branch}} \
      >/tmp/rebase-out-{{issue}}.txt 2>&1 || true
fi
```

`drop-merged-upstream` commits are auto-dropped by patch-id matching.
`drop-supplanted` commits are scripted to `drop` in the todo before
replay. `keep` commits replay onto upstream. Conflicts during replay do
NOT halt the chain — they are handled by the dispatch-rework-polecat
loop below.

**2. Dispatch rework polecat per conflicted kept commit.**

While the rebase is in progress (stopped on a conflict) and we haven't
already drained for a pending rework/review, capture the conflict
context, file a rework bead, sling the rework polecat, set the rebase
bead's drain state, and exit. The keeper re-pours us when the rework
completes.

Each polecat session dispatches AT MOST one rework polecat. A safety
bound (`MAX_DISPATCHES`) prevents runaway dispatch loops on pathological
repo states.

```bash
DISPATCHES=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.dispatch_count // "0"')
MAX_DISPATCHES=50

if { [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; } && [ "$STUCK" != "1" ]; then
    if [ "$DISPATCHES" -ge "$MAX_DISPATCHES" ]; then
        echo "ERROR: exceeded MAX_DISPATCHES=$MAX_DISPATCHES; treating as stuck" >&2
        STUCK=1
    fi
fi

if { [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; } \
        && [ "$STUCK" != "1" ] && [ "$DISPATCH_REVIEW" != "1" ]; then

    COMMIT_SHA=$(git rev-parse REBASE_HEAD 2>/dev/null \
        || cat .git/rebase-merge/stopped-sha 2>/dev/null \
        || cat .git/rebase-apply/original-commit 2>/dev/null \
        || echo "")
    if [ -z "$COMMIT_SHA" ]; then
        echo "ERROR: cannot identify in-progress commit; treating as stuck" >&2
        STUCK=1
    fi
fi

if { [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; } \
        && [ "$STUCK" != "1" ] && [ "$DISPATCH_REVIEW" != "1" ] \
        && [ -n "$COMMIT_SHA" ]; then

    COMMIT_SUBJECT=$(git log -1 --format='%s' "$COMMIT_SHA" 2>/dev/null || echo "(unknown)")
    COMMIT_BODY=$(git log -1 --format='%B' "$COMMIT_SHA" 2>/dev/null || echo "")
    CONFLICTED_FILES_JSON=$(git status --porcelain \
        | awk '$1 ~ /^(DD|AU|UD|UA|DU|AA|UU)$/ { print $2 }' \
        | jq -R . | jq -sc .)

    # Build context dump file in the worktree (.git is preserved across drain).
    CONTEXT_FILE="$(pwd)/.git/rework-context-${COMMIT_SHA}.md"
    {
        echo "# Rework context for commit $COMMIT_SHA"
        echo
        echo "## Conflicted kept commit"
        echo
        echo "Subject: $COMMIT_SUBJECT"
        echo "SHA: $COMMIT_SHA"
        echo
        echo "Full commit body:"
        echo
        echo '```'
        echo "$COMMIT_BODY"
        echo '```'
        echo
        echo "## Conflict status"
        echo
        echo '```'
        git status --porcelain
        echo '```'
        echo
        echo "## Conflicted files (raw content with conflict markers)"
        echo
        for f in $(printf '%s' "$CONFLICTED_FILES_JSON" | jq -r '.[]'); do
            echo "### $f"
            echo
            echo '```'
            cat "$f" 2>/dev/null || echo "(file unreadable)"
            echo '```'
            echo
        done
        echo "## Upstream's recent diffs touching the same files"
        echo
        for f in $(printf '%s' "$CONFLICTED_FILES_JSON" | jq -r '.[]'); do
            echo "### $f"
            echo
            echo '```'
            git log -p -5 {{upstream_remote}}/{{upstream_branch}} -- "$f" 2>/dev/null | head -500
            echo '```'
            echo
        done
        echo "## Goal-not-implementation framing"
        echo
        echo "Our fork commits represent goals or bugs we are trying to address,"
        echo "not hard and fast implementations. When upstream shifts the surrounding"
        echo "code, the commit will not apply cleanly — but the intention should"
        echo "apply cleanly with some cleanup. Look at the work this commit did"
        echo "holistically and rework it to apply on top of the new upstream."
        echo
        echo "Classify into one of: mechanical | dropped-absorbed | judgment-required | infeasible."
        echo "See mol-upstream-gc-rebase-rework formula's classify-and-rework step"
        echo "for the full classification rule."
    } > "$CONTEXT_FILE"

    if [ "$REDISPATCH_AFTER_REJECT" = "1" ]; then
        {
            echo
            echo "## PRIOR REVIEW REJECTED A PREVIOUS REWORK"
            echo
            echo "Prior rework bead: $REDISPATCH_PRIOR_REWORK"
            echo
            echo "Rejection reason:"
            echo "$REDISPATCH_REJECT_REASON"
            echo
            echo "Adjust your approach to address the rejection."
        } >> "$CONTEXT_FILE"
    fi

    SHORT_SHA=$(printf '%s' "$COMMIT_SHA" | cut -c1-12)
    REWORK_META=$(jq -n \
        --arg work_dir "$(pwd)" \
        --arg rebase_bead "{{issue}}" \
        --arg requesting_keeper "$REQUESTING_KEEPER" \
        --arg commit_sha "$COMMIT_SHA" \
        --arg commit_subject "$COMMIT_SUBJECT" \
        --argjson conflicted_files "$CONFLICTED_FILES_JSON" \
        --arg context_file "$CONTEXT_FILE" \
        '{work_dir:$work_dir, rebase_bead:$rebase_bead, requesting_keeper:$requesting_keeper, commit_sha:$commit_sha, commit_subject:$commit_subject, conflicted_files:$conflicted_files, context_file:$context_file}')

    REWORK_DESC="Rework the kept commit $COMMIT_SHA ($COMMIT_SUBJECT) onto post-upstream code. See metadata.context_file for the full conflict context, conflicted files, and upstream's recent diffs touching the same files. Classify your work into mechanical | dropped-absorbed | judgment-required | infeasible and self-report on metadata.classification before closing. The parent rebase polecat will route based on your classification."

    REWORK_BEAD=$(gc bd create \
        --title "rework $SHORT_SHA: $COMMIT_SUBJECT" \
        --type task \
        --priority 2 \
        --parent "{{issue}}" \
        --metadata "$REWORK_META" \
        --description "$REWORK_DESC" \
        --json | jq -r '.id')

    # Resolve the polecat pool from our own routing if available.
    POLECAT_POOL=$(gc bd show {{issue}} --json | jq -r '.[0].metadata."gc.routed_to" // empty' \
        | sed 's/[^/]*$/gc-toolkit.polecat/')
    [ -z "$POLECAT_POOL" ] && POLECAT_POOL="gascity/gc-toolkit.polecat"
    gc sling "$POLECAT_POOL" "$REWORK_BEAD" --on mol-upstream-gc-rebase-rework \
        --var rebase_bead="{{issue}}" \
        --var requesting_keeper="$REQUESTING_KEEPER"

    DISPATCHES=$((DISPATCHES + 1))
    gc bd update {{issue}} \
        --set-metadata rebase_in_progress=true \
        --set-metadata pending_rework="$REWORK_BEAD" \
        --set-metadata dispatch_count="$DISPATCHES" \
        --status=open \
        --assignee="$REQUESTING_KEEPER" \
        --set-metadata gc.routed_to="$REQUESTING_KEEPER"

    gc session nudge "$REQUESTING_KEEPER" "rebase {{issue}}: dispatched rework polecat on $REWORK_BEAD for $SHORT_SHA ($COMMIT_SUBJECT); re-pour when rework closes"

    gc runtime drain-ack
    exit 0
fi
```

**3. Dispatch review polecat (set by 1b when judgment-required).**

```bash
if [ "$DISPATCH_REVIEW" = "1" ] && [ "$STUCK" != "1" ]; then
    REVIEW_META=$(jq -n \
        --arg coordinator "$REQUESTING_KEEPER" \
        --arg work_dir "$(pwd)" \
        --arg rework_bead "$PENDING_REWORK" \
        --arg rebase_bead "{{issue}}" \
        --arg commit_sha "$REWORK_COMMIT_SHA" \
        --arg commit_subject "$REWORK_COMMIT_SUBJECT" \
        --arg judgment "$JUDGMENT" \
        '{coordinator:$coordinator, work_dir:$work_dir, rework_bead:$rework_bead, rebase_bead:$rebase_bead, commit_sha:$commit_sha, commit_subject:$commit_subject, judgment_summary:$judgment, review_id:("rebase-rework-" + $rebase_bead), review_phase:"rebase-rework", review_leg:"approve-or-reject"}')

    REVIEW_DESC="Review the rework polecat's judgment-required rework of commit $REWORK_COMMIT_SHA ($REWORK_COMMIT_SUBJECT). The rework polecat reported: $JUDGMENT

Read the rework commit at HEAD in the shared worktree (metadata.work_dir). Read the original kept commit's intent from rework bead $PENDING_REWORK's metadata.context_file. Read upstream's adjacent code.

Verdict: approve if the rework correctly ports the original intent onto the new upstream layer and the design call was reasonable. Reject if the rework misses the intent, makes a bad design call, or introduces regression risk.

Write your full review report to bead notes. Set metadata.verdict='approve' or metadata.verdict='reject'; on reject, also set metadata.reject_reason. Set metadata.rework_bead='$PENDING_REWORK' so the rebase polecat can correlate. Close the bead via mol-review-leg's notify-close step (which mails $REQUESTING_KEEPER)."

    REVIEW_BEAD=$(gc bd create \
        --title "review rework $REWORK_COMMIT_SHA: $REWORK_COMMIT_SUBJECT" \
        --type task \
        --priority 2 \
        --parent "{{issue}}" \
        --metadata "$REVIEW_META" \
        --description "$REVIEW_DESC" \
        --json | jq -r '.id')

    POLECAT_POOL=$(gc bd show {{issue}} --json | jq -r '.[0].metadata."gc.routed_to" // empty' \
        | sed 's/[^/]*$/gc-toolkit.polecat/')
    [ -z "$POLECAT_POOL" ] && POLECAT_POOL="gascity/gc-toolkit.polecat"
    gc sling "$POLECAT_POOL" "$REVIEW_BEAD" --on mol-review-leg

    DISPATCHES=$((DISPATCHES + 1))
    gc bd update {{issue}} \
        --set-metadata pending_review="$REVIEW_BEAD" \
        --set-metadata last_review_bead="$REVIEW_BEAD" \
        --set-metadata dispatch_count="$DISPATCHES" \
        --status=open \
        --assignee="$REQUESTING_KEEPER" \
        --set-metadata gc.routed_to="$REQUESTING_KEEPER"

    gc session nudge "$REQUESTING_KEEPER" "rebase {{issue}}: dispatched review polecat on $REVIEW_BEAD for judgment-required rework $PENDING_REWORK; re-pour when review closes"

    gc runtime drain-ack
    exit 0
fi
```

**4. Stuck handling — escalate via conflict_questions.**

If `STUCK=1`, escalate via `metadata.conflict_questions` so the keeper's
existing operator conversation flow handles it:

```bash
if [ "$STUCK" = "1" ]; then
    BACKUP_REF=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref')
    REBASE_OUT_TAIL=$(tail -50 /tmp/rebase-out-{{issue}}.txt 2>/dev/null || echo "(no rebase output)")
    QUESTIONS=$(jq -nc \
        --arg tail "$REBASE_OUT_TAIL" \
        --arg backup "$BACKUP_REF" \
        '[{commit_sha:"(unknown)", commit_subject:"(stuck)", question:("rebase polecat got stuck and could not advance. Backup ref: " + $backup + ". Operator intervention needed. Recent rebase output: " + $tail)}]')
    gc bd update {{issue}} \
        --set-metadata conflict_questions="$QUESTIONS" \
        --unset-metadata rebase_in_progress \
        --status=open \
        --assignee="$REQUESTING_KEEPER" \
        --set-metadata gc.routed_to="$REQUESTING_KEEPER"
    gc session nudge "$REQUESTING_KEEPER" "rebase {{issue}}: stuck — operator intervention needed (see metadata.conflict_questions)"
    gc runtime drain-ack
    exit 0
fi
```

**5. Rebase complete — sanity check the kept set.**

```bash
git log {{upstream_remote}}/{{upstream_branch}}..HEAD --oneline
```

The output must roughly match the `keep` rows from
`metadata.commit_verdicts` (rework commits replace conflicted keeps and
have the same intent). If anything obviously wrong is in the post-rebase
log, abort using the same pattern as the conflict case — bead handback
first (`--status=open`, `--assignee={{notify_recipient}}`,
`--set-metadata gc.routed_to={{notify_recipient}}`,
`--set-metadata aborted_at=rebase-mismatch`), then the best-effort mail.

**6. Clear rebase-in-progress flags:**

```bash
gc bd update {{issue}} \
    --unset-metadata rebase_in_progress \
    --unset-metadata pending_rework \
    --unset-metadata pending_review \
    --unset-metadata last_review_bead
```

**Exit criteria:** HEAD is rebased onto `{{upstream_remote}}/{{upstream_branch}}`;
the post-rebase commit log is consistent with the `keep` set (with
classification-driven substitutions for any conflicted keeps);
`metadata.rebase_in_progress` is unset; `metadata.conflict_resolutions`
records every resolution that fired this rebase."""

[[steps]]
id = "test"
title = "Run the test suite on the rebased branch"
needs = ["rebase"]
description = """
**Config: test_command = {{test_command}}**

```bash
{{test_command}}
```

If tests pass, close this step and proceed.

If tests fail, lock in the durable abort signal first, then mail (best-effort):
```bash
gc bd update {{issue}} \
  --set-metadata aborted_at=test \
  --status=open \
  --assignee="{{notify_recipient}}" \
  --set-metadata gc.routed_to="{{notify_recipient}}"

TEST_TAIL=$(tail -200 <test output file or capture>)
BACKUP_REF=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref')
WORKTREE=$(pwd)
VERDICTS=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.commit_verdicts')
RESOLUTIONS=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')

if ! gc mail send {{notify_recipient}} -s "gascity rebase: tests failed" -m "$(cat <<EOF
Rebase succeeded but {{test_command}} failed on the rebased branch.

Worktree: $WORKTREE
Backup ref: $BACKUP_REF
Bead: {{issue}}

Failure tail:
$TEST_TAIL

Verdicts (commit_verdicts):
$VERDICTS

Conflict resolutions applied this rebase:
$RESOLUTIONS

Next: investigate from the worktree. To restore the pre-rebase state:
  git reset --hard $BACKUP_REF
EOF
)"; then
    echo "WARN: mail send failed for {{issue}}; bead handback is the durable signal" >&2
fi
gc runtime drain-ack
exit 0
```

**Bead stays open** — the operator (or a follow-up polecat) resumes from
`metadata.work_dir`. The lifecycle handback (`--status=open`, reassign,
`gc.routed_to`) is what actually puts the bead back in the operator's
queue; without it the bead would strand on this drained session.

A test failure on the rebased branch often points at a rework polecat's
choice — read `metadata.conflict_resolutions` and inspect the rework
beads (especially `judgment-required` ones) to narrow down what changed."""

[[steps]]
id = "install"
title = "Rebuild and install gc from the rebased state"
needs = ["test"]
description = """
**Config: install_command = {{install_command}}**

```bash
{{install_command}}
```

If install passes, close this step and proceed.

If install fails: same pattern as the test failure — bead handback first,
mail second (best-effort) — with `metadata.aborted_at=install` and subject
`gascity rebase: install failed`:

```bash
gc bd update {{issue}} \
  --set-metadata aborted_at=install \
  --status=open \
  --assignee="{{notify_recipient}}" \
  --set-metadata gc.routed_to="{{notify_recipient}}"

INSTALL_TAIL=$(<install output, last 200 lines>)
BACKUP_REF=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref')
WORKTREE=$(pwd)

if ! gc mail send {{notify_recipient}} -s "gascity rebase: install failed" -m "$(cat <<EOF
Rebase and tests passed but {{install_command}} failed.

Worktree: $WORKTREE
Backup ref: $BACKUP_REF
Bead: {{issue}}

Failure tail:
$INSTALL_TAIL

Next: investigate from the worktree. To restore the pre-rebase state:
  git reset --hard $BACKUP_REF
EOF
)"; then
    echo "WARN: mail send failed for {{issue}}; bead handback is the durable signal" >&2
fi
gc runtime drain-ack
exit 0
```

**Bead stays open** — the operator drives recovery."""

[[steps]]
id = "push"
title = "Push the rebased branch to origin with --force-with-lease"
needs = ["install"]
description = """
**Config: origin_remote = {{origin_remote}}**
**Config: upstream_branch = {{upstream_branch}}**

```bash
git push {{origin_remote}} HEAD:{{upstream_branch}} --force-with-lease
```

If the push succeeds, close this step and proceed.

If `--force-with-lease` is rejected (someone else pushed to
`{{origin_remote}}/{{upstream_branch}}` after our `git fetch`):

**Do NOT retry. Do NOT use plain `--force`.**

Lock in the durable abort signal first, then mail the operator (best-effort):
```bash
gc bd update {{issue}} \
  --set-metadata aborted_at=push \
  --status=open \
  --assignee="{{notify_recipient}}" \
  --set-metadata gc.routed_to="{{notify_recipient}}"

BACKUP_REF=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref')
WORKTREE=$(pwd)
NEW_REMOTE=$(git rev-parse {{origin_remote}}/{{upstream_branch}})

if ! gc mail send {{notify_recipient}} -s "gascity rebase: push race" -m "$(cat <<EOF
git push --force-with-lease was rejected — {{origin_remote}}/{{upstream_branch}}
moved between our fetch and our push. Someone else pushed; we will not
overwrite their work.

Worktree: $WORKTREE
Backup ref: $BACKUP_REF
New remote tip: $NEW_REMOTE
Bead: {{issue}}

Next: review what landed remotely. If the new commits should be absorbed,
restart this rebase mol on a fresh bead.
EOF
)"; then
    echo "WARN: mail send failed for {{issue}}; bead handback is the durable signal" >&2
fi
gc runtime drain-ack
exit 0
```

**Exit criteria:** `{{origin_remote}}/{{upstream_branch}}` now points at the
rebased HEAD."""

[[steps]]
id = "notify-and-close"
title = "Mail the completion summary, append to bead notes, close bead"
needs = ["push"]
description = """
Compose the completion summary using the verdict table, the conflict
resolutions log, and the rebase outcome, send it as mail, append a
clean copy to bead notes, close the bead.

**1. Build the summary:**

Sections to include:
- **Dropped commits** — the `drop-merged-upstream` and `drop-supplanted`
  rows from `metadata.commit_verdicts`, each with sha, subject, verdict,
  rationale.
- **Conflict resolutions** — a compact rendering of
  `metadata.conflict_resolutions` (if non-empty). One line per resolution
  entry: `<short-sha> <classification> <resolution> rework=<bead>
  review=<bead-or-none>`. Lead with a one-line summary:
  "N conflicts resolved (M mechanical, K dropped-absorbed, J reworked-with-review)."
  If the log is empty, omit this section entirely.
- **Upstream commits absorbed** — `git log --oneline <pre-rebase-tip>..{{upstream_remote}}/{{upstream_branch}}`
  where `<pre-rebase-tip>` is the backup ref.
- **Test outcome** — pass (we got here) plus the test command name.
- **Install outcome** — pass.
- **Push outcome** — pushed `<new-sha>` to `{{origin_remote}}/{{upstream_branch}}`.
- **Backup ref** — name and pre-rebase tip sha, so the operator can roll
  back without paging this mol back in.

Build the conflict-resolutions rendering with jq:
```bash
RESOLUTIONS=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')
RES_COUNT=$(printf '%s' "$RESOLUTIONS" | jq 'length')
if [ "$RES_COUNT" -gt 0 ]; then
    MECH=$(printf '%s' "$RESOLUTIONS" | jq '[.[] | select(.classification=="mechanical")] | length')
    DROPPED=$(printf '%s' "$RESOLUTIONS" | jq '[.[] | select(.classification=="dropped-absorbed")] | length')
    JUDGED=$(printf '%s' "$RESOLUTIONS" | jq '[.[] | select(.classification=="judgment-required")] | length')
    RES_HEADLINE="$RES_COUNT conflict(s) resolved: $MECH mechanical, $DROPPED dropped-absorbed, $JUDGED reviewed-rework; full log on metadata.conflict_resolutions."
    RES_DETAIL=$(printf '%s' "$RESOLUTIONS" | jq -r '.[] | "  \\(.commit_sha[0:8]) classification=\\(.classification) resolution=\\(.resolution) rework=\\(.rework_bead) review=\\(.review_bead // "none")"')
else
    RES_HEADLINE=""
    RES_DETAIL=""
fi
```

**2. Mail the operator:**
```bash
gc mail send {{notify_recipient}} -s "gascity rebase: complete" -m "<summary>"
```

The mailed summary inlines `$RES_HEADLINE` and `$RES_DETAIL` when
non-empty so the operator can see at a glance whether any kept commits
required rework. The full `metadata.conflict_resolutions` JSON stays on
the bead for forensic review.

**3. Append the same summary to bead notes (markdown form):**
```bash
gc bd update {{issue}} --notes "<summary>"
```

The bead-notes version of the conflict-resolutions section can be a full
markdown table rather than the compact text rendering — it's the
durable forensic record the operator audits when they suspect a rework
was wrong.

**4. Close the bead:**
```bash
gc bd close {{issue}} --reason "Rebased {{origin_remote}}/{{upstream_branch}} onto {{upstream_remote}}/{{upstream_branch}}; pushed $(git rev-parse --short HEAD)"
```

**5. Drain and exit:**
```bash
gc runtime drain-ack
exit 0
```

**Exit criteria:** completion mail sent (including conflict-resolutions
headline if any reworks fired); bead notes carry the summary plus the
markdown table of resolutions; `metadata.conflict_resolutions` remains
on the bead as the JSON record; bead is closed; session has drained."""
