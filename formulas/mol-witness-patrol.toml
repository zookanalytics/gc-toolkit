description = """
Witness patrol loop. Poured as a root-only wisp on startup:

  gc bd mol wisp mol-witness-patrol --root-only --var binding_prefix='{{binding_prefix}}'
  gc bd update $WISP --assignee=$GC_AGENT

Each wisp is ONE iteration: check for work, patrol, pour the next
iteration. On crash, re-read the formula steps and determine where
you left off from context (bead state, mail state, last action).

Formula steps are NOT materialized as child beads. Read the step
descriptions below and work through them in order.

The loop mechanism: EVERY step is one leg of the same wisp. Never exit
the wisp from an intermediate step — either continue to the next step
or jump directly to `next-iteration` to pour and burn. Exiting without
burning leaks wisps (see #1884). The prompt only bootstraps the first
wisp.

## Witness Role

The witness is the rig's work-health monitor. It does NOT manage processes
(the controller handles start/stop/restart/zombie detection). The witness
monitors the WORK layer:

1. **Orphaned bead recovery** — beads assigned to agents that won't spawn
   (pool max changed, agent removed from config). This is the core job.
2. **Refinery queue health** — work beads assigned to refinery, staleness.
3. **Polecat health** — detect stuck polecats, file warrants for dog pool.
4. **Help mail** — triage HELP/escalation requests from polecats.
5. **Completed-workflow quiesce** — retire the dead step beads of finished
   mol-polecat-work molecules so the pool stops re-offering them (tk-p9ji9).

Gate checks and convoy/swarm completion are town-wide concerns handled by
the deacon, not the per-rig witness.

## Canonical Work Chain

```
worktree → (push) → branch → (merge) → target branch
```

Each transition moves the canonical location of the work. Once moved,
the previous location is disposable:
- After push: worktree disposable (branch is canonical)
- After merge: branch disposable (target is canonical)

The witness's core recovery job: when a bead is orphaned (agent won't
come back), ensure the work reaches the branch (push), then clean up
the worktree. This makes the work schedulable again.

## What the witness does NOT do

- Zombie detection (controller reconcile loop handles this)
- Process start/stop (controller handles this)
- Code implementation (polecats do this)
- Gate checks (deacon handles town-wide)
- Convoy/swarm completion (deacon handles cross-rig)
- Kill stuck agents directly (files warrant, dog pool runs shutdown dance)

Read each step's description before acting — Config values override defaults."""
formula = "mol-witness-patrol"
version = 12

[vars]
[vars.binding_prefix]
description = "Import binding prefix for gastown agent identities, including trailing dot when bound."
default = ""

[vars.event_timeout]
description = "Seconds to sleep before re-checking. Replaces former event-watch loop which hot-spun on cache-reconcile firehose."
default = "60"

[[steps]]
id = "check-inbox"
title = "Check mail"
description = """
**Check mail:**
```bash
gc mail inbox
```

Handle each message type:

**HELP / Blocked:**
Classify by keyword, then act based on severity:

| Category | Keywords | Severity | Action |
|----------|----------|----------|--------|
| Emergency | crash, data loss, corruption, security | Critical | Mail mayor immediately [HIGH] |
| Failed | failed, error, cannot, broken, exception | High | Investigate; mail mayor if unresolvable |
| Blocked | blocked, waiting, depends on, need access | Medium | Try to unblock (point to docs, suggest approach); escalate if you can't |
| Decision | should I, which approach, trade-off, design | Low | Answer if you can; escalate only if architectural |
| Lifecycle | done, finished, idle, restarting | Info | Acknowledge; no escalation needed |
| General help | help, stuck, confused, how do I | Low | Point to docs/suggest approach; escalate only if truly stuck |

For escalations:
```bash
gc mail send mayor/ -s "ESCALATION: <polecat> needs help [HIGH|MED|LOW]" -m "<category>: <details>"
```
Do NOT escalate routine blocks or lifecycle messages — handle them yourself.
Archive after handling.

**HANDOFF:**
Read predecessor context. Continue from where they left off.
Archive after absorbing context.

**Other / informational:**
Archive after reading.

**Hygiene principle**: Archive messages after they're fully processed.
Inbox should be near-empty after this step.

Close this step and continue to `recover-orphaned-beads` — do NOT exit
the wisp here. The `next-iteration` step is the only place that pours
the next wisp and burns this one."""

[[steps]]
id = "recover-orphaned-beads"
title = "Recover orphaned work beads"
needs = ["check-inbox"]
description = """
**This is the witness's core job.**

Find beads assigned to agents that will never process them, salvage any
unpublished work from the worktree, and return beads to the pool.

This happens when:
- Pool max was reduced (agents that won't spawn anymore)
- An agent was removed from config
- An agent crashed and the controller decided not to restart it (quarantine)

**Step 1: Find orphaned beads via session-ID liveness.**

List beads assigned to agents in YOUR rig:
```bash
gc bd list --status=in_progress --json --limit=0
gc bd list --status=open --json --limit=0
```

Filter for beads with an assignee (skip unassigned beads). This pass does not
solve the controller race where orphaned work may already have been released to
open/unassigned before witness observes it; that requires a separate
worktree-salvage scan keyed by `metadata.work_dir`. Bound Gastown polecat
assignees use the shape `<rig>/{{binding_prefix}}<polecat-suffix>`.

That same filter ALSO drops grounded **bead-hosts**. A bead-host grounds itself
by setting its work bead's `assignee` to its own session NAME (gc-bead-host.sh
`link`; tk-z130v.3), so the reconciler revives it across drains — which makes a
host bead read as assigned here, and its `drained`/`asleep` states already
classify as not-orphaned below. But a bead-host is NOT pool/ephemeral work: its
lifecycle is owned by the bead-host tooling (gc-bead-host.sh link/unlink,
gc-helm `takeaway --release`), never orphan-recovery-to-pool. Recognize it
structurally — its assignee IS its own host session,
`metadata.host_session_name == assignee` — and drop it in the SAME pass that
skips unassigned beads. This closes the dead-host edge too: a host whose session
went `archived`/`closed`/`absent` is NOT reopened into the pool; it re-grounds
on its next `gc-bead-host.sh up`, or is cleared by close/release. Fail-safe: the
filter can only DECLINE to orphan, never invent one. The markers let the
regression test extract and exercise this exact filter
(assets/scripts/host-bead-skip.test.sh):
```bash
# >>> host-bead-skip
# Keep only beads that are ASSIGNED and are NOT a grounded bead-host (a bead
# whose metadata.host_session_name equals its assignee). Reads the bead-list
# array on stdin, writes the surviving array on stdout — apply it to the
# combined in_progress + open listing before the per-bead liveness loop.
jq -c '[ .[]
         | select((.assignee // "") != "")
         | select((.metadata.host_session_name // "") != (.assignee // "")) ]'
# <<< host-bead-skip
```

Get the full session roster for liveness checks:
```bash
gc session list --state=all --json
gc bd list --type=session --label=gc:session --include-infra --include-gates --all --json --limit=0
```

For each bead with an assignee, check **session-ID liveness** — NOT
template pattern matching. Pool instances get new IDs on restart, so
matching against a template pattern (e.g., `worker-3` matches template
`worker`) gives false negatives: the old session ID is dead but the
witness skips it thinking "the pool will restart it." The pool creates
a NEW session with a different ID — the old one never comes back.

**Liveness check procedure:**

1. Build the assignee→state liveness map ONCE per cycle (before the
   per-bead loop), then resolve each bead's assignee against it. Resolve by
   exact identifier lookup FIRST, with exactly ONE narrow fallback: when the
   exact lookup misses, retry on the identity's last `/`-separated segment
   (the lookup snippet below implements it). Do not go further — no regex
   session-ID extraction, no fixed prefix list: rig prefixes are
   configuration-derived, and assignees may be a session bead ID, session
   name, alias, concrete agent name, or configured named identity.

   Two schema facts this recipe depends on (verified live, gc-3tn8g):
   - `gc session list --json` returns an OBJECT `{sessions:[...], ...}`, not
     a top-level array — iterate `.sessions[]`, never the top level (the
     top-level values include booleans, so `$x.id` on them errors).
   - Session fields are lowercase snake_case: `id / name / session_name /
     alias / agent_name / state / closed`. Key the map on `id`, `name`,
     `session_name`, `alias`, and `agent_name` — the exact identifier forms
     an assignee may take.

   Stream both JSON blobs through temp files, never `--argjson` on argv: on a
   busy city the session `command` fields are large and overflow ARG_MAX
   (`argument list too long: jq`). Build the map once:
   ```bash
   SESSIONS_FILE=$(mktemp); SESSION_BEADS_FILE=$(mktemp)
   gc session list --state=all --json > "$SESSIONS_FILE"
   gc bd list --type=session --label=gc:session --include-infra --include-gates --all --json --limit=0 > "$SESSION_BEADS_FILE"

   LIVENESS_MAP=$(jq -n --slurpfile sessions "$SESSIONS_FILE" --slurpfile session_beads "$SESSION_BEADS_FILE" '
     def add($m; $key; $state; $closed):
       if (($key // "") | length) == 0 then $m
       else $m + {($key): (if $closed then "closed" else ($state // "") end)}
       end;
     (reduce ($sessions[0].sessions // [])[] as $s ({};
         add(.; $s.id;         $s.state; ($s.closed // false))
       | add(.; $s.name;       $s.state; ($s.closed // false))
       | add(.; $s.session_name; $s.state; ($s.closed // false))
       | add(.; $s.alias;      $s.state; ($s.closed // false))
       | add(.; $s.agent_name; $s.state; ($s.closed // false))
     )) as $from_sessions
     | reduce ($session_beads[0] // [])[] as $b ($from_sessions;
         add(.; $b.metadata.configured_named_identity; $b.metadata.state; ($b.status == "closed")))')

   SESSION_COUNT=$(jq -r '(.sessions // []) | length' "$SESSIONS_FILE")
   MAP_COUNT=$(printf '%s' "$LIVENESS_MAP" | jq -r 'length')
   rm -f "$SESSIONS_FILE" "$SESSION_BEADS_FILE"
   ```

   **Fail safe — never orphan on an empty map.** If the map is empty while
   sessions exist, the schema has drifted again (the exact failure in
   gc-3tn8g). An empty map resolves every assignee to `absent` and would
   false-orphan live agents. ABORT recovery this cycle — do NOT classify any
   bead as orphaned — escalate, then continue to `check-refinery`:
   ```bash
   if [ "${MAP_COUNT:-0}" -eq 0 ] && [ "${SESSION_COUNT:-0}" -gt 0 ]; then
     echo "FAIL-SAFE: empty liveness map with $SESSION_COUNT live sessions — skipping orphan recovery (treat all assignees as live)."
     gc mail send mayor/ -s "WITNESS: orphan-recovery disabled — empty liveness map" -m "Built an empty assignee->state map from $SESSION_COUNT live sessions. gc session list --json schema likely drifted again (gc-3tn8g); skipping orphan recovery this cycle to avoid false-orphaning live agents. Re-check the recover-orphaned-beads liveness recipe."
     # Skip the rest of this step; proceed to check-refinery.
   fi
   ```

   Resolve each bead's assignee against the prebuilt map. An exact-match-only
   lookup false-orphans live sessions, because a bead's assignee and its
   session's registered identity routinely disagree in nothing but the
   `<rig>/` prefix — and both shapes occur live (tk-opfsi):

       bead assignee  gascity/gc-toolkit.gc-z0vi2  vs  alias  gc-toolkit.gc-z0vi2
       bead assignee  gc-toolkit.furiosa           vs  alias  gc-toolkit/gc-toolkit.furiosa

   So compare on the last path segment when — and only when — the exact
   lookup misses. The markers let the regression test extract and exercise
   this exact snippet (assets/scripts/liveness-lookup.test.sh).
   ```bash
   # >>> liveness-lookup
   # Exact lookup first: authoritative whenever the assignee is a literal map key.
   STATE=$(printf '%s' "$LIVENESS_MAP" | jq -r --arg a "$ASSIGNEE" '.[$a] // "absent"')
   # Identity-normalizing fallback. Stripping the prefix can make two sessions in
   # different cities collide on one bare identity (gc-toolkit/gc-toolkit.furiosa
   # and gascity/gc-toolkit.furiosa both bare to gc-toolkit.furiosa), so resolve a
   # collision toward LIFE: any matching session that is not closed/archived wins.
   # Only when EVERY candidate owner is dead does the fallback report a dead state.
   # The retry can therefore turn `absent` into a live state, but can never
   # manufacture an orphan — the fail-safe direction.
   if [ "$STATE" = "absent" ]; then
     STATE=$(printf '%s' "$LIVENESS_MAP" | jq -r --arg a "$ASSIGNEE" '
       def bare: sub("^.*/"; "");
       [ to_entries[] | select((.key | bare) == ($a | bare)) | .value ] as $matches
       | if ($matches | length) == 0 then "absent"
         else ([ $matches[] | select(. != "closed" and . != "archived") ] | first) // $matches[0]
         end')
   fi
   # <<< liveness-lookup
   ```

2. An `absent` lookup (assignee not in the map) is orphaned only for
   pool/ephemeral work identities. If the assignee is a refinery, witness, or
   other configured infrastructure identity, skip it instead of recovering it.

3. Classify:
   - `active` or `awake` → **not orphaned** (may be stuck —
     `check-polecat-health` handles that separately)
   - `creating`, `asleep`, `drained`, `suspended`, `draining`, or
     `quarantined` → **not orphaned** (controller or operator state still owns
     the session)
   - `archived`, `closed`, or `absent` after BOTH the exact lookup and the
     normalizing retry → **orphaned bead** for pool/ephemeral work — the owning
     session is gone and will never come back, regardless of whether the pool
     template still exists. Never classify on the exact lookup alone: a
     rig-qualified assignee whose session registered the bare alias resolves
     `absent` there while its owner is active (tk-opfsi).

**Important**: Beads assigned to the refinery, witness, or other
infrastructure agents (not pool instances) should be skipped — those
agents have persistent identity and the controller manages their
lifecycle directly.

**Step 2: For each orphaned bead, salvage work from the worktree.**

The canonical work chain: `worktree → (push) → branch → (merge) → target`.
Our job is to ensure work reaches the branch so it's schedulable.

Read the bead metadata to find the worktree and branch:
```bash
META=$(gc bd show <bead> --json | jq '.[0].metadata')
# gc-toolkit local delta: polecat formula records the per-bead worktree in
# metadata.work_dir (not metadata.worktree). Base v10 reads .worktree, which
# is empty for every gc-toolkit polecat handoff; we read .work_dir to match
# what mol-polecat-work.workspace-setup actually writes.
WORKTREE=$(echo "$META" | jq -r '.work_dir // empty')
BRANCH=$(echo "$META" | jq -r '.branch // empty')

# HUSK GUARD (gc-7v0lx / gc-5v01w): a husk work_dir — the git worktree was
# removed but the directory survives (typically only .gc/ left) — still lets
# `cd "$WORKTREE"` succeed, but every subsequent git command then walks UP to
# the nearest enclosing repo: the TOWN repo at /home/zook/loomington. So
# `git add -A && git commit && git push origin HEAD` would capture and publish
# the operator's uncommitted town-repo WIP to origin/main. Before ANY salvage
# git write, assert work_dir is its OWN git worktree root; if git resolves it
# to a parent/town repo, refuse salvage.
# The markers let the regression test extract and exercise this exact snippet
# (assets/scripts/husk-guard.test.sh).
# >>> husk-guard
WORKTREE_SAFE=0
if [ -n "$WORKTREE" ] && [ -d "$WORKTREE" ]; then
  EXPECTED_ROOT=$(cd "$WORKTREE" && pwd -P)
  ACTUAL_ROOT=$(git -C "$WORKTREE" rev-parse --show-toplevel 2>/dev/null)
  if [ -n "$ACTUAL_ROOT" ] && [ "$ACTUAL_ROOT" = "$EXPECTED_ROOT" ]; then
    WORKTREE_SAFE=1
  else
    echo "witness: REFUSING salvage for <bead> — work_dir $WORKTREE is a husk (git toplevel='${ACTUAL_ROOT:-<none>}' != worktree root '$EXPECTED_ROOT'); skipping add/commit/push to avoid town-repo contamination." >&2
  fi
fi
# <<< husk-guard
```

**Husk work_dir → refuse salvage, treat as Case E.**

`WORKTREE_SAFE=1` means `$WORKTREE` is its own git worktree root and salvage
git writes are safe. `WORKTREE_SAFE=0` means the directory is absent, or it is
a **husk** whose git commands resolve to an enclosing repo. When it is `0`:

- **Skip Cases B, C, and D entirely** — they `cd "$WORKTREE"` and run
  `git add -A` / `git commit` / `git push`, which from a husk would commit and
  publish the town repo's working tree. There is nothing salvageable in a husk;
  the worktree git data is already gone.
- Handle the bead as **Case E** (nothing to salvage): escalate, then fall
  through to Step 3 for cleanup / return-to-pool. Step 3's own `git` calls run
  from the rig root, not `$WORKTREE`, so they stay safe.

Case A is unaffected: it queries `origin` from the rig root and never touches
`$WORKTREE`. Case B's `git ls-remote` must still be gated, because from a husk
it would resolve `origin` from the **town** repo and answer for the wrong
remote — reporting the branch missing and falling through to Case C's writes.

Escalate the refusal (work_dir was recorded but is unusable — worth a look):
```bash
gc mail send mayor/ -s "SALVAGE_REFUSED: <bead> husk work_dir" -m "Bead <bead> recorded work_dir=$WORKTREE, but it is not its own git worktree root.
git toplevel: ${ACTUAL_ROOT:-<none>}
Expected root: $EXPECTED_ROOT
Observation: worktree git data is gone (husk). Salvage add/commit/push was REFUSED — running it would have committed and pushed the enclosing (town) repo's working tree to origin/main.
Action: treated as Case E (nothing to salvage); bead returned to pool.
Branch: ${BRANCH:-none}"
```

Check the bead and worktree state, then act:

**Case A: Branch exists on origin (work already published).**
Worktree is disposable — canonical work is on the branch.
```bash
git ls-remote --heads origin $BRANCH  # Verify branch exists on remote
```
If branch exists on origin → skip to Step 3 (cleanup).

**Case B: Worktree exists, branch pushed but not on origin yet.**
Branch is recorded in metadata but polecat may have crashed before push.
Requires `WORKTREE_SAFE=1` — a husk resolves `origin` from the town repo.
```bash
if [ "$WORKTREE_SAFE" != "1" ]; then
  echo "husk work_dir — Case B does not apply (see HUSK GUARD); handle as Case E." >&2
else
  cd "$WORKTREE"
  git ls-remote --heads origin $BRANCH
fi
```
If branch IS on origin → skip to Step 3.
If branch is NOT on origin → fall through to Case C.

**Case C: Worktree exists with unpushed commits.**
Work is committed locally but never pushed. Branch is not yet canonical.
Requires `WORKTREE_SAFE=1` — this case performs git WRITES.
```bash
if [ "$WORKTREE_SAFE" != "1" ]; then
  echo "husk work_dir — REFUSING Case C salvage writes (see HUSK GUARD); handle as Case E." >&2
else
  cd "$WORKTREE"
  BRANCH=$(git branch --show-current)
  git log origin/main..HEAD --oneline  # Shows unpushed commits
fi
```
Commit any remaining uncommitted/untracked work first (safeguard) — still
only when `WORKTREE_SAFE=1`, since `git add -A` from a husk stages the town
repo's working tree:
```bash
if [ "$WORKTREE_SAFE" = "1" ]; then
  cd "$WORKTREE"
  git status --porcelain
  # If any output:
  git add -A
  git commit -m "witness: salvage uncommitted work (<bead>)"
fi
```
Publish the work to make branch canonical:
```bash
if [ "$WORKTREE_SAFE" = "1" ]; then
  cd "$WORKTREE"
  git push origin HEAD
  gc bd update <bead> --set-metadata branch=$BRANCH
fi
```
Skip to Step 3 (cleanup).

**Case D: Worktree exists with ONLY uncommitted/untracked changes (no commits).**
Same resolution as Case C. All work is useful work — never discard.
Requires `WORKTREE_SAFE=1` — this case performs git WRITES.
```bash
if [ "$WORKTREE_SAFE" != "1" ]; then
  echo "husk work_dir — REFUSING Case D salvage writes (see HUSK GUARD); handle as Case E." >&2
else
  cd "$WORKTREE"
  git add -A
  git commit -m "witness: salvage work from orphaned agent (<bead>)"
  BRANCH=$(git branch --show-current)
  git push origin HEAD
  gc bd update <bead> --set-metadata branch=$BRANCH
fi
```
Skip to Step 3 (cleanup).

**Case E: Nothing salvageable.** Either no worktree exists
(`metadata.work_dir` missing or directory gone) and no branch is on origin,
or the HUSK GUARD refused (`WORKTREE_SAFE=0`) because `$WORKTREE` is a husk
whose git commands resolve to an enclosing repo.

Nothing to salvage — a husk's git data is already gone, and no `git add -A` /
`commit` / `push` may run against it. The bead goes back to pool and a new
polecat starts fresh.

**Step 3: Verify work on main before resetting.**

Before resetting the bead to pool, check if the branch was already merged
to main (polecat finished, pushed, but crashed before closing the bead):
```bash
git log main --oneline | grep -q "$BRANCH"
# Or check if branch commits are reachable from main:
git merge-base --is-ancestor origin/$BRANCH origin/main
```

If the work is already on main:
- **Close the bead** (work is done, don't re-dispatch):
```bash
gc bd close <bead>
gc mail send mayor/ -s "ORPHAN_CLOSED: <bead> already merged" \
  -m "Branch $BRANCH already on main. Closed instead of resetting."
```
- Clean up worktree and skip to Step 4.

If the work is NOT on main, proceed with reset:

**Step 3b: Clean up worktree and return bead to pool.**

Once the branch is canonical (on origin), the worktree is disposable:
```bash
# Delete worktree if it exists
cd <rig-root>
git worktree remove <worktree-path> --force 2>/dev/null
rm -rf <worktree-path> 2>/dev/null  # Fallback
git worktree prune
```

Close any orphaned workflow subtree, then return the bead to pool:
```bash
gc workflow delete-source <bead> --apply && gc workflow reopen-source <bead>
```

**Step 4: Assess and notify.**

Always log each recovery as an event. Mail the mayor only when the
recovery is unexpected or concerning — use your judgment:

| Situation | Action |
|-----------|--------|
| Pool resize / config change removed agent | Log only. Routine. |
| Agent crashed mid-work, branch already on origin | Log + nudge mayor. Low urgency. |
| Work salvaged from worktree (data was at risk) | Log + mail mayor. Work was nearly lost. |
| Same bead recovered before (check `metadata.recovered`) | Log + mail mayor. Possible crash loop. |

When you do mail:
```bash
gc mail send mayor/ -s "ORPHAN_RECOVERED: <bead>" \
  -m "Bead <bead> was assigned to <agent> which is no longer active.
Recovery: <what was done — branch pushed / metadata set / work salvaged / nothing to salvage>
Branch: <branch name or 'none'>
Status: Reset to open pool for re-dispatch.
Concern: <why this one warrants attention>"
```

Mark recovered beads so spawn storm detection can track patterns:
```bash
gc bd update <bead> --set-metadata recovered=true
```

**Exit criteria:** All orphaned beads recovered, worktrees cleaned.
Or no orphans found. Continue to `check-refinery` — do NOT exit the
wisp here. The `next-iteration` step is the only place that pours the
next wisp and burns this one."""

[[steps]]
id = "check-refinery"
title = "Check refinery queue health"
needs = ["recover-orphaned-beads"]
description = """
Ensure the refinery is processing work and the queue is healthy.

**Step 1: Check work beads assigned to refinery:**
```bash
gc bd list --assignee=<rig>/{{binding_prefix}}refinery --status=open --json
```

These are work beads with `metadata.branch` and `metadata.target` that
polecats have submitted for merging. Look for:

- **Stale beads**: Assigned to refinery but old `UpdatedAt`. The refinery
  may be stuck or the bead may have been missed.
- **Queue depth**: Many beads waiting may indicate the refinery is
  overwhelmed or down.
- **Empty queue**: No work assigned — refinery is idle, which is fine.

**Step 2: Assess refinery wisp freshness:**

Check when the refinery last completed a patrol cycle by looking at
recent burned wisps. If the refinery has work assigned but its last
wisp is stale, the refinery may be stuck.

**Step 3: Nudge if needed:**
```bash
gc session nudge <rig>/{{binding_prefix}}refinery "Work beads waiting for merge. Please check queue."
```

**Step 4: Escalate if needed:**
```bash
gc mail send mayor/ -s "QUEUE_HEALTH: <summary>" \
  -m "Work bead IDs: <ids>
Observation: <what you found>
Recommendation: <what should happen>"
```

**Exit criteria:** Queue health assessed; nudge sent or escalation
filed if needed. Continue to `quiesce-completed-workflows` — do NOT exit
the wisp here. The `next-iteration` step is the only place that pours the
next wisp and burns this one."""

[[steps]]
id = "quiesce-completed-workflows"
title = "Quiesce completed workflows"
needs = ["check-refinery"]
description = """
Retire the dead step beads of `mol-polecat-work` molecules whose inline
execution has already finished, so the pool stops re-offering them (tk-p9ji9).

**The failure this prevents.** mol-polecat-work materializes 7 step beads, but
the polecat runs them INLINE in one session and no step closes its own bead.
The graph is chained, so while `load-context` stays open it is the ONLY ready
step — and it still carries `gc.routed_to=<rig>/{{binding_prefix}}polecat`.
Open + ready + routed is exactly the pool's offer predicate, so every idle
polecat gets handed the same dead step, forever. Each one burns a wisp to
re-derive "already done, nothing to do" and drain. The molecule cannot finalize
itself either: under close-on-land its anchor stays OPEN until the refinery
lands the PR, so the churn runs for the whole human-approval wait — measured at
~1 wisp / 4-5 min, i.e. ~200 wisps overnight on a single anchor.

This step is the containment the witness previously performed BY HAND, molecule
by molecule (ten of them by 2026-07-22), now automated.

**Two re-offer shapes, two different levers.** Clearing `gc.routed_to` fixes
only the first — verified live: the pool work query returns open, UNASSIGNED,
routed, ready beads only, so an assigned step never rides the pool path.

| Shape | State | Lever |
|---|---|---|
| unassigned | assignee empty + `gc.routed_to` set | clear `gc.routed_to` |
| assigned | assignee=`<polecat session>` + `gc.session_affinity=require` | clear `gc.routed_to` **and** the assignee |

For the assigned shape the bead is already invisible to the pool; it is handed
back on the ASSIGNED-work path, which is keyed on the assignee. Clearing only
`gc.routed_to` there is a no-op — that is why the by-hand sweeps kept leaving a
residual of sessions still holding their in_progress step.

**DANGER — never "fix" this by closing the step bead.** Closing `load-context`
unblocks `workspace-setup` and walks the next polecat forward onto a branch that
is ALREADY green-gated and PR'd; any push there moves the head, stales the
anchor's `check.<gate>=green@<oid>` marker, and BLOCKS the open PR from merging.
The script has no close path at all, and its regression test asserts that.
Clearing the routing is the safe lever; closing is not.

Quiescing is containment, not finalization — the molecule is left stranded but
quiet. Finalizing the step graph at submit-and-exit time is the durable upstream
fix (gascity core / gastown formula) and is deliberately out of scope here.

```bash
# Resolve the pack scripts the same way mol-refinery-patrol does: from agent-env
# paths, so the idle loop runs the CURRENT script even when a worktree copy lags.
SCRIPTS_DIR=""
for cand in "${GC_RIG_ROOT:-}/assets/scripts" \
            "$(git rev-parse --show-toplevel 2>/dev/null)/assets/scripts" \
            "${GC_CITY_PATH:-}/rigs/gc-toolkit/assets/scripts"; do
  if [ -x "$cand/quiesce-completed-workflows.sh" ]; then SCRIPTS_DIR="$cand"; break; fi
done
# Best-effort, like every other patrol pass: a failed pass is retried next cycle
# and must never abort the wisp. The -x guard means a rig that has not synced
# this script simply keeps the old by-hand behavior.
if [ -n "$SCRIPTS_DIR" ]; then
  "$SCRIPTS_DIR/quiesce-completed-workflows.sh" \
    || echo "quiesce-completed-workflows: pass failed (non-fatal); retries next cycle" >&2
fi
```

Run it with `--dry-run` first if you want to see the selection without writing.

**What it touches, and what it must not.** For each molecule it resolves the
anchor the way the formula itself does (root -> `gc.input_convoy_id` -> the
convoy's single tracked member) and acts only when that anchor is DONE:
`merge_result` of `pre_open_gate`, `pull_request`, or `merged`, or the anchor is
closed. It never writes to the anchor, never rewrites `status`, and never
touches the `workflow-finalize` step — that one keeps its control-dispatcher
route because it is the molecule's only escape path. An anchor it cannot resolve
is SKIPPED, deliberately: quiescing a live molecule would strip the assignee off
steps a running polecat still has to claim, draining it mid-implementation. An
un-quiesced husk only wastes wisps, which is much the cheaper failure.

Regression test: `assets/scripts/quiesce-completed-workflows.test.sh` (hermetic,
stubs `gc`; covers both shapes, the single-update atomicity, the no-close rule,
the finalize-route exemption, fail-closed, and idempotence).

**Exit criteria:** Completed-workflow husks quiesced, or none found. Continue to
`check-polecat-health` — do NOT exit the wisp here. The `next-iteration` step is
the only place that pours the next wisp and burns this one."""

[[steps]]
id = "check-polecat-health"
title = "Check polecat work progress"
needs = ["quiesce-completed-workflows"]
description = """
Detect polecats that are alive but not making progress on their work.

The controller detects dead agents and restarts them. But a polecat can
be alive and stuck — infinite loop, blocked on something, or just not
progressing. The controller can't detect this; it's a work-layer judgment.

**Step 1: Find active polecat work beads:**
```bash
gc bd list --status=in_progress --json --limit=0
```
Filter for beads assigned to polecat-pattern agents in YOUR rig.

**Step 2: For each, assess progress:**

Check the work bead's `UpdatedAt` timestamp and the polecat's molecule
wisp freshness. Consider:

- **Recently updated** → making progress, skip
- **Stale but agent is in a long tool call** → might be fine, use judgment
- **Very stale, no wisp progress** → likely stuck

There are no hardcoded thresholds. Consider the nature of the work, the
time elapsed, and whether the agent shows any signs of activity. This is
judgment work — exactly why an LLM does it, not Go code.

**Step 3: For stuck polecats, file a warrant:**

Do NOT kill the agent directly. File a warrant bead and let the dog pool
handle the shutdown dance (multi-stage interrogation with due process):

```bash
gc bd create --type=task \
  --title="Stuck: <agent>" \
  --metadata '{"target":"<session-name>","reason":"No progress on <bead> for <duration>","requester":"witness","gc.routed_to":"{{binding_prefix}}dog"}' \
  --label=warrant
```

The dog pool picks up the warrant and runs `mol-shutdown-dance`, which
gives the polecat 3 chances to prove it's alive before killing it.

**Step 4: Log assessment:**

Note which polecats were checked and their status for observability.
Don't escalate to mayor for individual stuck polecats — the warrant
system handles it. Only escalate if you see a pattern (many stuck
polecats, systemic issue).

**Exit criteria:** All active polecat work beads assessed. Warrants
filed for stuck agents. Or no stuck polecats found. Continue to
`next-iteration` — do NOT exit the wisp here. The `next-iteration` step
is the only place that pours the next wisp and burns this one."""

[[steps]]
id = "next-iteration"
title = "Pour next iteration and loop"
needs = ["check-polecat-health"]
description = """
**Config: event_timeout = {{event_timeout}}**

End of patrol cycle. Pour the next iteration, then wait or exit.

**1. Pour next iteration BEFORE burning:**
```bash
NEXT=$(gc bd mol wisp mol-witness-patrol --root-only --var binding_prefix='{{binding_prefix}}' --json | jq -r '.new_epic_id')
gc bd update "$NEXT" --assignee=$GC_AGENT
```

**2. Wait before next cycle:**
```bash
sleep {{event_timeout}}
```

Previous implementation watched `gc events --type=bead.updated` for fast wake-up, but cache-reconcile fires that event constantly, turning the watch into a tight loop with no useful backoff. Fixed sleep gives predictable idle cost.

**3. Burn this wisp:**
```bash
gc bd mol burn <this-wisp-id> --force
```

The new wisp is ready. Re-read formula steps to start
the next patrol cycle.

**Exit criteria:** Next wisp poured, this wisp burned."""
