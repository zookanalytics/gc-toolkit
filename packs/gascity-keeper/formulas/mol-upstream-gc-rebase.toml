description = """
Rebase the gascity rig's `origin/main` onto `upstream/main`, drop already-
landed-or-supplanted local commits, run tests, install, push the working
branch (`rebase/{{issue}}`) to origin, and hand off to refinery for the
force-push to `{{upstream_branch}}`.

Extends `mol-polecat-base` for the standard polecat lifecycle entry points
(load-context, workspace-setup) but uses its own gating steps in place of
the implement / self-review pair — the work isn't a feature implementation,
it's a controlled rebase with a verdict-keeping survey.

**Force-push ownership (v7+):** The terminal force-push that lands the
rebased history onto `{{upstream_branch}}` is performed by the
rig-scoped refinery via the `gascity-keeper` sub-pack's
`refinery-rebase-handling` overlay, not by this polecat. The polecat
pushes its rebased commits to the polecat-owned ref
`refs/heads/rebase/{{issue}}` and reassigns the bead to refinery; the
refinery overlay detects the rebase bead (via `metadata.molecule_id`
matching `mol-upstream-gc-rebase*`, with `metadata.backup_ref` as a
fallback signal), runs preflight against the rebased branch, performs
the safe force-push to `{{upstream_branch}}` (see
`refinery-rebase-handling` for the exact lease form), and closes
the bead. This keeps the absolute "polecats never force-push to
`main`" rule intact while authorising the legitimate rebase tail in
one auditable place (refinery + rig-scoped overlay).

## Variables

| Variable | Default | Description |
|----------|---------|-------------|
| upstream_remote | upstream | Git remote name pointing at gastownhall/gascity |
| origin_remote | origin | Git remote name pointing at the city's fork |
| upstream_branch | main | Branch to rebase onto and push back to |
| check_command | make check | Post-rebase quality gate (fmt-check + lint + vet + test in gascity) |
| install_command | make install | Local rebuild of `gc` into `$INSTALL_DIR` |
| notify_recipient | human | Mail target on completion / abort |
| requesting_keeper | (empty) | Keeper address for the install/push abort handbacks; falls back to notify_recipient if unset |

## Conflict handling: one fresh iteration per conflict (check loop)

Our fork commits represent goals/intents, not literal implementations.
When `git rebase` halts on a kept commit because upstream shifted the
surrounding code, the *intent* still applies even though the diff does
not — so a conflict is not a failure, it is the next unit of work.

The `rebase` step is a **check loop** (`[steps.check]`, formulas v2
§3.1). The orchestrator runs the step, runs an exit-condition script when
the iteration closes, and while that script fails it appends another
iteration. Each iteration is its own bead with its own agent session, so
every conflict is met with fresh context. The step materializes as:

| Bead | Kind | Role |
|------|------|------|
| `<wf>.rebase.spec` | `spec` | the serialized step definition (stable prompt) |
| `<wf>.rebase.iteration.N` | (work) | resume the worktree, advance the rebase, run the gate |
| `<wf>.rebase` | `ralph` | control bead; blocks on the live iteration, holds loop state |

`assets/scripts/rebase-check.sh` is the exit condition. It passes only
when the rebase is finished, the worktree is clean, HEAD sits on top of
the upstream tip recorded in `metadata.rebase_onto_sha`, and
`metadata.check_passed_sha` equals the live HEAD. Anything else fails and
the next iteration starts. Exhausting `max_attempts` closes the control
bead with `gc.outcome = fail` and leaves `install` / `push` blocked.

Prior iterations remain as durable history — retries append, they never
reopen. `metadata.conflict_resolutions` still accumulates one audit entry
per resolved conflict.

**Iterations must be pool-routed.** The runtime recycles the previous
iteration's worker session before appending the next one, but only when
the attempt target is a pool (`beadUsesMetadataPoolRouteWithConfig` in
`internal/dispatch/control.go`, called from `internal/dispatch/retry.go`).
Sling this formula at a pool, never at a named agent: a named target
skips the recycle, iteration N+1 lands in the session that ran iteration
N with iteration N still in its context window, and the fresh-context
property this design exists for is lost. The step declares no `assignee`
— which `[steps.check]` forbids anyway.

**This replaces the v11 rework-polecat dispatch.** v11 hand-rolled the
same loop out of bead-filing, metadata flags, and re-pour: capture the
conflict, file a rework bead, sling a rework polecat under
`mol-upstream-gc-rebase-rework`, set `metadata.rebase_in_progress` +
`metadata.pending_rework`, hand the bead back to the keeper and drain,
then read the classification on re-entry. Every known defect in this area
was a defect in that mechanism rather than in rebasing — re-pour was a
fallback that could not resume a paused rebase and burned ~12 steps, a
handback had to clear the assignee or the bead went invisible to
`scale_check`, and an open rework required a drain before re-pour. The
loop state now lives in the control bead and the exit condition is a
script, so none of those states exist. `mol-upstream-gc-rebase-rework` is
kept for manual dispatch, but this formula no longer slings it.

The v6 upstream-wins/`--ours` mechanism (tk-gzat2) that silently dropped
local hunks remains gone: no silent drops, no auto-resolution.

## Failure modes

| Step | Failure handling |
|------|------------------|
| survey | LLM judgment can be wrong; record verdicts on the bead and proceed — the rebase step's patch-id check is the safety net for `drop-merged-upstream` |
| rebase | A conflict is the next iteration, not a failure. The step's own exit condition (`rebase-check.sh`) is the safety net for "we accepted a resolution that broke the kept set": it will not pass until `{{check_command}}` is green at the live HEAD, so a bad resolution simply fails the gate and buys another iteration. `metadata.backup_ref` keeps any state recoverable. Exhausting `max_attempts` closes the control bead `gc.outcome=fail`, which is the escalation signal — the keeper sweeps it alongside `aborted_at` and `conflict_questions`. |
| install | Keeper handback (`aborted_at=install`, reassign to `requesting_keeper`, tail in notes) + keeper nudge first; mail secondary. Bead stays open. |
| push | Push of `HEAD:rebase/{{issue}}` is fast-forward on the polecat-owned ref — failures here are auth/network/ref-protection, NOT a race against `{{upstream_branch}}`. Keeper handback (`aborted_at=push`, reassign to `requesting_keeper`, context in notes) + keeper nudge first; mail secondary. Race-loss against `{{upstream_branch}}` is detected and escalated by refinery via the overlay's `--force-with-lease` lease, not by this step. |

The post-rebase **abort** paths (install, push) — and the
workspace-setup backup-ref refusal — share the same keeper-routed shape: reassign the bead to the requesting
keeper (`requesting_keeper`, falling back to `notify_recipient` only when
no keeper was stamped), record the failure tail in the bead **notes**
(durable even if mail fails), set `aborted_at`, and **nudge the keeper**,
all **before** any mail. Mail to `notify_recipient` is a SECONDARY backstop
only — never the primary operator signal. The keeper's prime sweep matches
`aborted_at` beads assigned to it, so a human-needing abort surfaces on the
next operator engagement with the keeper regardless of whether mail
arrived. We do not assign the operator's mail alias as the bead owner: the
keeper is the durable holder and the operator's contact point (the keeper
is the single upstream front-door; see gastownhall/gascity#2082 alignment).

The rebase step no longer hands back mid-loop. v11's rework-dispatch
handback (`metadata.rebase_in_progress=true` + `metadata.pending_rework` +
reassignment to the keeper, worktree parked mid-rebase awaiting a re-pour)
is gone: the loop keeps the worktree and resumes itself, so there is
nothing for the keeper to re-pour. Those two metadata keys are no longer
written by this formula.

A conflict the iteration genuinely cannot resolve uses the existing
`metadata.conflict_questions` shape — the iteration records the question,
leaves the rebase where it is, and does NOT fake a resolution. The loop
then exhausts its budget and the control bead closes `gc.outcome=fail`.
The keeper's operator conversation handles `conflict_questions` as
before; `gc.outcome=fail` on the control bead is the peer signal that the
loop stopped trying."""
formula = "mol-upstream-gc-rebase"
extends = ["mol-polecat-base"]
version = 12

# The `rebase` step uses [steps.check], a graph-only construct, so the v2
# contract is declared explicitly (formulas v2 §5). `mol-polecat-base` already
# requires the same range; the constraint sets must overlap or resolution fails
# with formula.compiler_requirement_conflict.
[requires]
formula_compiler = ">=2.0.0"

[vars]
[vars.upstream_remote]
description = "Git remote name pointing at the upstream gascity repository"
default = "upstream"

[vars.origin_remote]
description = "Git remote name pointing at the city's fork"
default = "origin"

[vars.upstream_branch]
description = "Branch to rebase onto and push back to"
default = "main"

[vars.check_command]
description = "Post-rebase quality gate command. The default `make check` in gascity is `fmt-check lint vet test` — running the full Go pipeline on the rebased tip. The wider gate is the authoritative safety net for the kept set, since conflict resolutions are committed by `git rebase --continue` and the gascity pre-commit hook (which covers the same surfaces) does not run on them. Operators can override (e.g., `--var check_command='make test'` to scope down) but the default is intentionally the full gate."
default = "make check"

[vars.install_command]
description = "Command that rebuilds and installs the gc binary locally"
default = "make install"

[vars.notify_recipient]
description = "Mail target for completion and abort notifications"
default = "human"

[vars.requesting_keeper]
description = "Keeper agent address (e.g., gascity/gascity-keeper.keeper) for the rework-dispatch handback. Optional; the rebase step falls back to notify_recipient if unset, but a keeper-aware operator should stamp metadata.requesting_keeper at dispatch so the cooperative-handback path lands cleanly."
default = ""

[[steps]]
id = "workspace-setup"
title = "Set up gascity worktree, fetch upstream, write safety backup ref"
needs = ["load-context"]
description = """
Establish a clean worktree on the gascity rig at `{{origin_remote}}/{{upstream_branch}}`,
fetch the upstream remote, and write a backup ref so the rebase is recoverable.

**1. Locate the gascity rig:**
The keeper dispatches this mol from the gascity rig's bead store. The rig
checkout is at `$GC_RIG_ROOT` (when running rig-scoped) or you can resolve
via `gc rig list --json` from the city root (top-level `.rigs[]` array
with `.name` and `.path` keys).

**2. Reuse or create the worktree:**

Check `metadata.work_dir` first:
```bash
WORKTREE=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.work_dir // empty')
```

If it points to an existing directory, `cd` there and skip to step 3.

Otherwise, create one at a rig-level path under the city runtime tree.
The path must NOT be derived from `$(pwd)` (the polecat's worktree root)
because the polecat alias is encoded in that path — a re-pour to any
other pool polecat would then fail to resume from `metadata.work_dir`.
Anchoring to `$GC_CITY_PATH/.gc/worktrees/gascity/rebase-<bead>` keeps
the worktree alongside the existing per-rig agent worktrees (polecats,
refinery) and is polecat-alias-independent, so any pool polecat can
resume from `metadata.work_dir`. The directory name is a single segment
(`rebase-<bead>`, not `rebase/<bead>`) so the two-level walkers in
gascity's `WorktreeCheck` and `NestedWorktreePruneCheck` discover and
prune it:
```bash
RIG_ROOT=$(gc rig list --json | jq -r '.rigs[] | select(.name=="gascity") | .path')
: "${GC_CITY_PATH:?GC_CITY_PATH must be set; refusing to derive worktree path from /}"
WORKTREE_PATH="$GC_CITY_PATH/.gc/worktrees/gascity/rebase-{{issue}}"
mkdir -p "$(dirname "$WORKTREE_PATH")"
git -C "$RIG_ROOT" fetch --prune {{origin_remote}}
git -C "$RIG_ROOT" worktree prune
if git -C "$RIG_ROOT" rev-parse --verify "refs/heads/rebase/{{issue}}" >/dev/null 2>&1; then
    # Reattach an existing branch (survived a reaped worktree) to the
    # new path. `worktree prune` above drops stale `.git/worktrees/<name>`
    # admin entries so this `add` does not collide with the dead claim.
    git -C "$RIG_ROOT" worktree add "$WORKTREE_PATH" "rebase/{{issue}}"
else
    # Fresh start: create the branch from the upstream tip.
    git -C "$RIG_ROOT" worktree add "$WORKTREE_PATH" -b "rebase/{{issue}}" "{{origin_remote}}/{{upstream_branch}}"
fi
cd "$WORKTREE_PATH"
gc bd update {{issue}} --set-metadata work_dir="$WORKTREE_PATH" --set-metadata branch="rebase/{{issue}}"
```

The local working branch (`rebase/{{issue}}`) lets us rebase without touching
`{{upstream_branch}}` at all. The polecat's push step writes only to
`refs/heads/rebase/{{issue}}` on `{{origin_remote}}` (a fast-forward push
on the polecat-owned ref); refinery's `refinery-rebase-handling` overlay
performs the `--force-with-lease` that lands the history onto
`{{upstream_branch}}`. The bead's `metadata.branch` records the polecat
working branch; `metadata.target = {{upstream_branch}}` (stamped at
hand-off) records the destination refinery will land it to.

**3. Fetch the upstream remote:**
```bash
git fetch {{upstream_remote}} --prune
```

**4. Write (or reuse) the safety backup ref:**

The backup ref must always point at the pre-rebase tip of
`{{origin_remote}}/{{upstream_branch}}`. On a fresh run, mint one. On a
resume after a mid-rebase crash (worktree exists, HEAD has already moved
off the upstream tip) we MUST NOT mint a new ref — it would point at the
post-rebase HEAD and silently destroy the rollback target.

```bash
EXISTING_BACKUP=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref // empty')

if [ -n "$EXISTING_BACKUP" ] && \
        git rev-parse --verify "${EXISTING_BACKUP}^{commit}" >/dev/null 2>&1; then
    BACKUP_REF="$EXISTING_BACKUP"
    echo "Reusing existing backup ref: $BACKUP_REF -> $(git rev-parse --short "$BACKUP_REF")"
else
    PRE_REBASE_TIP=$(git rev-parse --verify "{{origin_remote}}/{{upstream_branch}}")
    HEAD_SHA=$(git rev-parse HEAD)
    if [ "$HEAD_SHA" != "$PRE_REBASE_TIP" ]; then
        echo "ERROR: HEAD ($HEAD_SHA) does not match {{origin_remote}}/{{upstream_branch}}" >&2
        echo "       tip ($PRE_REBASE_TIP). Refusing to mint a new backup_ref —" >&2
        echo "       a new ref here would point at post-rebase state." >&2
        echo "       Recover the pre-rebase tip into HEAD, or set metadata.backup_ref" >&2
        echo "       by hand if you know the prior rollback target." >&2
        # Route the abort THROUGH the keeper: reassign to the requesting
        # keeper (fall back to notify_recipient only when no keeper was
        # stamped — the non-keeper manual-dispatch case), and nudge it.
        # The keeper's prime sweep matches metadata.aborted_at, so the
        # abort surfaces on the next operator engagement; the nudge is the
        # timely signal. We do NOT assign the operator's mail alias as the
        # bead owner — the keeper is the durable holder + operator contact.
        REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper // empty')
        [ -z "$REQUESTING_KEEPER" ] && REQUESTING_KEEPER="{{notify_recipient}}"
        gc bd update {{issue}} \
            --set-metadata aborted_at=workspace-setup \
            --status=open \
            --assignee="$REQUESTING_KEEPER" \
            --notes "Refused to mint backup_ref: HEAD ($HEAD_SHA) does not match {{origin_remote}}/{{upstream_branch}} ($PRE_REBASE_TIP). Resume requires manual recovery."
        gc session nudge "$REQUESTING_KEEPER" "rebase {{issue}}: aborted at workspace-setup (backup_ref mint refused) — operator engagement needed (metadata.aborted_at=workspace-setup)" || true
        gc runtime drain-ack
        exit 1
    fi
    BACKUP_TS=$(date -u +%Y%m%dT%H%M%SZ)
    BACKUP_REF="refs/backups/main-pre-rebase-$BACKUP_TS"
    git update-ref "$BACKUP_REF" "$PRE_REBASE_TIP"
    gc bd update {{issue}} \
        --set-metadata backup_ref="$BACKUP_REF" \
        --set-metadata pre_rebase_tip="$PRE_REBASE_TIP"
fi
```

The backup ref points at the pre-rebase tip of `{{origin_remote}}/{{upstream_branch}}`.
If the rebase has to be unwound, `git reset --hard $BACKUP_REF` restores the
pre-rebase state, and the ref is included in the operator's completion mail.
`metadata.pre_rebase_tip` records the same sha for cross-check, so a future
operator can verify the backup ref hasn't been silently overwritten.

**Exit criteria:** worktree exists at `metadata.work_dir`; HEAD matches the
pre-rebase tip of `{{origin_remote}}/{{upstream_branch}}` on a fresh run (or
the backup ref already validates on a resume); `metadata.backup_ref` is
recorded; `{{upstream_remote}}` has been fetched."""

# The next three steps are OVERRIDES, not filler. `mol-polecat-base` defines
# real `preflight-tests`, `implement`, and `self-review` steps, and `extends`
# merges a parent step in unless the child replaces it by ID (`mergeSteps` in
# internal/formula/parser.go — there is no mechanism to drop an inherited step).
# Deleting these stubs therefore does not remove three steps; it resurrects the
# base's generic feature-implementation steps and runs them against the gascity
# rebase worktree. They stay until this formula stops extending the base.

[[steps]]
id = "preflight-tests"
title = "Skip — rebase variant uses its own gates"
needs = ["workspace-setup"]
description = """
Neutralizes `mol-polecat-base`'s preflight step. This formula replaces the
standard polecat preflight/implement/self-review sequence with
`survey → rebase → install → push → notify-and-close`.

There is no preflight to run on `{{upstream_branch}}` for this variant —
the rebase step's patch-id checks, plus the quality gate the rebase check
loop will not pass without, cover what preflight would have caught.

Close this step and proceed."""

[[steps]]
id = "implement"
title = "Skip — replaced by survey + rebase steps"
needs = ["preflight-tests"]
description = """
Neutralizes `mol-polecat-base`'s implement step. The implementation work
for this formula lives in the `survey` and `rebase` steps below.

Close this step and proceed."""

[[steps]]
id = "self-review"
title = "Skip — replaced by the rebase check loop + install"
needs = ["implement"]
description = """
Neutralizes `mol-polecat-base`'s self-review step. The post-rebase
verification work for this formula lives inside the `rebase` check loop
(which will not exit until `{{check_command}}` is green at the rebased
HEAD) and in the `install` step below.

Close this step and proceed."""

[[steps]]
id = "survey"
title = "Classify each divergent commit as drop-merged-upstream / drop-supplanted / keep"
needs = ["self-review"]
description = """
Build a verdict table for every commit on `{{origin_remote}}/{{upstream_branch}}`
that is not on `{{upstream_remote}}/{{upstream_branch}}`. The verdicts feed
the rebase step (drop-supplanted commits get rewritten away; drop-merged-upstream
commits are dropped automatically by patch-id matching).

**Skip this step on resume** if `metadata.commit_verdicts` is already set.
The verdicts don't change mid-rebase; re-running the survey would burn
context for no gain.

```bash
if [ "$(gc bd show {{issue}} --json | jq -r '.[0].metadata.commit_verdicts // empty')" != "" ]; then
    echo "commit_verdicts already set; skipping survey on resume."
else
```

**1. Compute the divergent set:**
```bash
git range-diff {{upstream_remote}}/{{upstream_branch}}...{{origin_remote}}/{{upstream_branch}}
git log --oneline {{upstream_remote}}/{{upstream_branch}}..{{origin_remote}}/{{upstream_branch}}
```

`range-diff` shows whether each origin commit has a patch-id match upstream
(`=`), a fuzzy match (`~`), or no match (`>`). Use this as input to the
verdicts but don't blindly trust it — read each commit.

**2. Classify each origin commit:**

For each commit (oldest → newest), pick exactly one verdict:

- **drop-merged-upstream** — Patch-id-equal (or trivially-equal) to a commit
  on `{{upstream_remote}}/{{upstream_branch}}`. The rebase will drop it
  automatically.
- **drop-supplanted** — Upstream solves the same problem differently
  (different patch-id; same root cause). LLM judgment: read the upstream
  log around `{{upstream_remote}}/{{upstream_branch}}` for adjacent fixes.
  This commit must be rewritten out via `git rebase -i` in the next step.
- **keep** — Local-only patch with no upstream equivalent. The rebase
  carries it forward.

**3. Persist the verdicts (markdown to bead notes, JSON to metadata):**

Markdown table for `gc bd update --notes`:
```
| sha | subject | verdict | rationale |
|-----|---------|---------|-----------|
| abc1234 | <subject> | drop-merged-upstream | matches upstream <upstream-sha> by patch-id |
| def5678 | <subject> | drop-supplanted | superseded by upstream <upstream-sha> (different approach) |
| ...     | ...     | keep | local-only fix, no upstream equivalent |
```

JSON for `metadata.commit_verdicts` (one entry per origin commit):
```json
[
  {"sha": "abc1234", "subject": "...", "verdict": "drop-merged-upstream", "rationale": "..."},
  {"sha": "def5678", "subject": "...", "verdict": "drop-supplanted", "rationale": "...", "upstream_ref": "..."},
  {"sha": "ghi9abc", "subject": "...", "verdict": "keep", "rationale": "..."}
]
```

Write both:
```bash
gc bd update {{issue}} --notes "<markdown table here>"
gc bd update {{issue}} --set-metadata commit_verdicts='<json string>'
fi  # end of resume-skip guard
```

**Exit criteria:** every divergent commit has a verdict on the bead; the
`metadata.commit_verdicts` JSON is parseable and the markdown table is
readable in the bead notes."""

[[steps]]
id = "rebase"
title = "Rebase onto upstream, one conflict per iteration, until the gate is green"
needs = ["survey"]
description = """
**Config: check_command = {{check_command}}**

You are **one iteration of a check loop**. Read this whole step before you
touch anything.

You may be iteration 1 starting a fresh rebase, or iteration N resuming a
rebase that halted on a conflict, or the iteration that only has to get the
quality gate green. Nothing from a previous iteration is in your context —
that is the point of the design, not an accident. Determine where you are
from the worktree and the bead, never from memory or assumption.

When you close your bead the orchestrator runs the step's exit condition
(`assets/scripts/rebase-check.sh`). It passes only when all of these hold:

- no rebase is in progress in the worktree,
- the worktree is clean,
- HEAD sits on top of `metadata.rebase_onto_sha`,
- `metadata.check_passed_sha` equals the live HEAD.

If it fails, the orchestrator appends the next iteration with a fresh
session. You do not need to finish everything in one turn; you do need to
leave the worktree and the bead in a truthful state.

**1. Enter the worktree.**

All work happens in the gascity rebase worktree that `workspace-setup`
recorded. Never work in the rig checkout.

```bash
WORKTREE=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.work_dir // empty')
[ -n "$WORKTREE" ] || { echo "ERROR: no metadata.work_dir on {{issue}}" >&2; exit 1; }
cd "$WORKTREE" || exit 1
```

**2. Determine which state you are in.**

```bash
if [ -d "$(git rev-parse --git-path rebase-merge)" ] || [ -d "$(git rev-parse --git-path rebase-apply)" ]; then
    STATE=mid-rebase
elif [ -z "$(gc bd show {{issue}} --json | jq -r '.[0].metadata.rebase_onto_sha // empty')" ]; then
    STATE=fresh
else
    STATE=rebased
fi
echo "iteration state: $STATE"
```

**3. STATE=fresh — start the rebase.**

Fetch upstream and pin the tip you are rebasing onto. Pin it exactly once:
the exit condition requires HEAD to sit on top of
`metadata.rebase_onto_sha`, so a later re-fetch that moved the tip would
make an already-started rebase impossible to pass. On any resume, do NOT
re-fetch and do NOT re-stamp.

```bash
git fetch {{upstream_remote}} {{upstream_branch}}
ONTO=$(git rev-parse {{upstream_remote}}/{{upstream_branch}})
gc bd update {{issue}} --set-metadata rebase_onto_sha="$ONTO"
```

Build the sequence-editor script. It mutates the todo list git generates:
for every sha in `metadata.commit_verdicts` whose verdict is
`drop-supplanted`, rewrite `pick <sha>` to `drop <sha>`. The shas are
passed via the exported `DROP_SHAS` variable so the heredoc body can stay
quoted (no escaping ambiguity).

```bash
DROP_SHAS=$(gc bd show {{issue}} --json | jq -r \\
  '.[0].metadata.commit_verdicts // "[]" | fromjson
   | map(select(.verdict=="drop-supplanted") | .sha) | join(" ")')
export DROP_SHAS

cat > /tmp/seqedit-{{issue}}.sh <<'SEQ'
#!/bin/sh
# git rebase -i writes ABBREVIATED hashes in the todo (e.g. "pick 7cf82bef0 # ...").
# DROP_SHAS holds FULL 40-char shas from metadata.commit_verdicts. Match the todo's
# (possibly abbreviated) hash as a PREFIX of a full drop sha; rewrite pick -> drop.
todo=$1
awk -v drops="$DROP_SHAS" '
  BEGIN { n = split(drops, d, " ") }
  /^pick / {
    h = $2
    for (i = 1; i <= n; i++) {
      if (substr(d[i], 1, length(h)) == h) { sub(/^pick/, "drop"); break }
    }
  }
  { print }
' "$todo" > "$todo.tmp" && mv "$todo.tmp" "$todo"
SEQ
chmod +x /tmp/seqedit-{{issue}}.sh

GIT_SEQUENCE_EDITOR=/tmp/seqedit-{{issue}}.sh \\
  git rebase -i "$ONTO" >/tmp/rebase-out-{{issue}}.txt 2>&1 || true
```

If `DROP_SHAS` is empty the sequence editor is a no-op and this behaves
like a plain `git rebase {{upstream_remote}}/{{upstream_branch}}` with
patch-id auto-drops. `drop-merged-upstream` commits are dropped
automatically by patch-id matching; `keep` commits replay onto upstream.

A conflict here is expected and is not a failure. Fall through to step 4.

**4. STATE=mid-rebase — resolve the conflict in front of you.**

This is the core of the loop and the reason each iteration gets a fresh
session.

Our fork commits represent goals or bugs we are trying to address, not
hard-and-fast implementations. When upstream shifts the surrounding code
the commit will not apply cleanly — but the *intention* usually still
applies with some cleanup. Read the conflicted commit holistically and
rework its intent onto the new upstream layer.

```bash
COMMIT_SHA=$(git rev-parse REBASE_HEAD 2>/dev/null || echo "")
git log -1 --format='%s%n%n%b' "$COMMIT_SHA"   # what this commit was FOR
git status --porcelain                          # what is conflicted
git log -p -5 {{upstream_remote}}/{{upstream_branch}} -- <conflicted file>
```

Judge each conflicted commit as one of the four standard classifications
(the same vocabulary the `rebase-conventions` fragment defines):

- **mechanical** — the intent ports over directly; resolve the markers,
  keep the commit.
- **dropped-absorbed** — upstream already provides the behavior, so the
  commit's reason-for-existing is gone. `git rebase --skip` it, and drop
  the WHOLE commit — do not preserve bundled extras.
- **judgment-required** — the intent applies but the shape must change.
  Make the call yourself and record your reasoning in the audit entry
  below; there is no review polecat to route it to.
- **infeasible** — you cannot port it without guessing. Do NOT invent a
  resolution and do NOT skip it to make the loop pass; see step 6.

Resolve, stage, and continue:

```bash
git add <resolved files>
git -c core.editor=true rebase --continue
```

Keep going while you are making real progress in this turn. Resolving
several conflicts in one iteration is good — the loop is a safety net for
when context runs short or a conflict needs a fresh pair of eyes, not a
quota of one conflict per session. Stop when the rebase finishes, or when
you would be guessing.

Append one audit entry per conflict you resolve:

```bash
ENTRY=$(jq -nc --arg sha "$COMMIT_SHA" --arg subj "<subject>" \\
  --arg cls "<mechanical|dropped-absorbed|judgment-required>" \\
  --arg res "<what you did and why>" \\
  '{commit_sha:$sha, commit_subject:$subj, classification:$cls, resolution:$res}')
LOG=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')
LOG=$(printf '%s' "$LOG" | jq -c ". + [$ENTRY]")
gc bd update {{issue}} --set-metadata conflict_resolutions="$LOG"
```

**5. STATE=rebased — get the quality gate green.**

Sanity-check the kept set first: the log below should roughly match the
`keep` rows in `metadata.commit_verdicts`, allowing for reworked commits
that carry the same intent.

```bash
git log {{upstream_remote}}/{{upstream_branch}}..HEAD --oneline
```

Then run the gate. `{{check_command}}` is the authoritative safety net for
the kept set: conflict resolutions land without the gascity pre-commit
hook, so this is what covers fmt-check, lint, vet, and test.

```bash
{{check_command}}
```

- **Green** — stamp the HEAD it passed at. The exit condition compares this
  to the live HEAD, so stamp it *after* your last commit, never before:
  ```bash
  gc bd update {{issue}} --set-metadata check_passed_sha="$(git rev-parse HEAD)"
  ```
- **Red** — fixing it is your job, not an abort. A gate failure often points
  at a resolution an earlier iteration made; read
  `metadata.conflict_resolutions` to find the likely culprit. Fix it, commit,
  re-run the gate, and re-stamp. If you run out of context first, just close
  your bead — the next iteration picks it up from here.

The stamp is bound to a sha, so any commit you make after stamping
invalidates it and the loop correctly re-gates.

**6. If you are genuinely stuck.**

Record the question and leave the rebase where it is. Do not fabricate a
resolution, do not `git rebase --skip` a commit you did not judge absorbed,
and do not `git rebase --abort` — the abort would discard the work every
prior iteration did.

```bash
QUESTIONS=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_questions // "[]"')
ENTRY=$(jq -nc --arg sha "$COMMIT_SHA" --arg subj "<subject>" \\
  --arg q "<what you need decided, and what you already ruled out>" \\
  '{commit_sha:$sha, commit_subject:$subj, question:$q}')
gc bd update {{issue}} \\
  --set-metadata conflict_questions="$(printf '%s' "$QUESTIONS" | jq -c ". + [$ENTRY]")"
```

The loop will then exhaust `max_attempts` and the control bead closes with
`gc.outcome=fail`, which is the escalation signal the keeper sweeps.
`metadata.backup_ref` still restores the pre-rebase state if an operator
decides to unwind: `git reset --hard $(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref')`.

**7. Close your iteration bead.**

Closing your bead is what runs the exit condition. Do NOT drain and park,
do NOT reassign the bead to the keeper, and do NOT re-pour anything — those
were the v11 mechanisms and they no longer exist here.

```bash
gc bd close <your-iteration-bead-id> --reason "rebase iteration complete"
```

Close it by **explicit id**. A pool-claimed polecat often has `GC_BEAD_ID`
unset, so a guarded `gc bd close "$GC_BEAD_ID"` silently no-ops and the loop
stalls with the control bead blocked on a live iteration forever.

**Exit criteria (for the step, not for you):** the rebase is finished, the
worktree is clean, HEAD sits on top of `metadata.rebase_onto_sha`, and
`metadata.check_passed_sha` equals HEAD. Any iteration that leaves the
worktree closer to that state has done its job."""

[steps.check]
# Total iterations including the first. Each iteration can resolve several
# conflicts, so this bounds pathological churn rather than conflict count; the
# v11 hand-rolled loop used MAX_DISPATCHES=50 for the same purpose, one
# dispatch per conflict. Exhaustion closes the control bead gc.outcome=fail.
max_attempts = 25

[steps.check.check]
mode = "exec"
path = "../assets/scripts/rebase-check.sh"
# The script only reads bead metadata and git state — it verifies the gate, it
# does not run it (see the header of rebase-check.sh for why). 2m is slack for
# a loaded Dolt, not a budget for `make check`.
timeout = "2m"

[[steps]]
id = "install"
title = "Rebuild and install gc from the rebased state"
needs = ["rebase"]
description = """
**Config: install_command = {{install_command}}**

**Resume-skip on an unchanged HEAD (trust-and-skip).** Same HEAD-keyed
guard as the check step, keyed to `metadata.install_passed_sha` — trust a
prior install on this exact rebased tree; any HEAD change re-runs it:
```bash
HEAD_SHA=$(git rev-parse HEAD)
if [ "$(gc bd show {{issue}} --json | jq -r '.[0].metadata.install_passed_sha // empty')" = "$HEAD_SHA" ]; then
    echo "install already passed at this HEAD ($HEAD_SHA); trust-and-skip"
    # Already installed from this exact tree — skip the rest of this step and proceed to push.
else
    {{install_command}}
fi
```

If install passes, stamp the HEAD sha so a later resume on this same tree
trusts the pass, then close this step and proceed:
```bash
gc bd update {{issue}} --set-metadata install_passed_sha="$(git rev-parse HEAD)"
```

If install fails: same keeper-routed pattern as the check failure —
durable handback to the keeper first (reassign + failure tail in bead
notes), nudge the keeper, then best-effort mail to the operator as a
secondary backstop — with `metadata.aborted_at=install` and subject
`gascity rebase: install failed`:

```bash
INSTALL_TAIL=$(<install output, last 200 lines>)
BACKUP_REF=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref')
WORKTREE=$(pwd)

REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper // empty')
[ -z "$REQUESTING_KEEPER" ] && REQUESTING_KEEPER="{{notify_recipient}}"

gc bd update {{issue}} \
  --set-metadata aborted_at=install \
  --status=open \
  --assignee="$REQUESTING_KEEPER" \
  --notes "$(cat <<EOF
Rebase and tests passed but {{install_command}} FAILED (aborted_at=install).

Worktree: $WORKTREE
Backup ref: $BACKUP_REF

Failure tail:
$INSTALL_TAIL

To restore the pre-rebase state: git reset --hard $BACKUP_REF
EOF
)"

gc session nudge "$REQUESTING_KEEPER" "rebase {{issue}}: install failed — operator engagement needed (metadata.aborted_at=install; failure tail in bead notes)" || true

# Secondary backstop ONLY: best-effort mail to the operator.
if ! gc mail send {{notify_recipient}} -s "gascity rebase: install failed" -m "$(cat <<EOF
Rebase and tests passed but {{install_command}} failed.

Worktree: $WORKTREE
Backup ref: $BACKUP_REF
Bead: {{issue}}

Failure tail:
$INSTALL_TAIL

Next: investigate from the worktree. To restore the pre-rebase state:
  git reset --hard $BACKUP_REF
EOF
)"; then
    echo "WARN: mail send failed for {{issue}}; the keeper handback (assignee + aborted_at + notes + nudge) is the durable signal" >&2
fi
gc runtime drain-ack
exit 0
```

**Bead stays open and lands on the keeper's hook** — the keeper surfaces
it to the operator, who drives recovery from `metadata.work_dir`."""

[[steps]]
id = "push"
title = "Push the rebased branch to origin (polecat-owned ref, no force on main)"
needs = ["install"]
description = """
**Config: origin_remote = {{origin_remote}}**
**Config: upstream_branch = {{upstream_branch}}**

The polecat pushes its rebased history to its own ref
(`rebase/{{issue}}`) — NOT to `{{upstream_branch}}`. The force-push
that lands the rebased history onto `{{upstream_branch}}` is owned by
the rig-scoped refinery via the `gascity-keeper` sub-pack's
`refinery-rebase-handling` overlay. Splitting the push step preserves
the absolute "polecats never force-push to main" rule for every
polecat path, while keeping the legitimate force-push in one
auditable place (refinery).

```bash
git push {{origin_remote}} HEAD:rebase/{{issue}}
```

This is a fast-forward push to the polecat's own branch, so no
`--force` and no `--force-with-lease` are needed or appropriate.

If the push fails for an unexpected reason (auth, network, ref
protection on `refs/heads/rebase/*`), do NOT retry blindly. Route the
abort THROUGH the keeper — durable handback first (reassign + context in
bead notes), nudge the keeper, then best-effort mail to the operator as a
secondary backstop:

```bash
BACKUP_REF=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.backup_ref')
WORKTREE=$(pwd)

REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper // empty')
[ -z "$REQUESTING_KEEPER" ] && REQUESTING_KEEPER="{{notify_recipient}}"

gc bd update {{issue}} \
  --set-metadata aborted_at=push \
  --status=open \
  --assignee="$REQUESTING_KEEPER" \
  --notes "$(cat <<EOF
git push {{origin_remote}} HEAD:rebase/{{issue}} FAILED (aborted_at=push).
The rebased history is intact in the worktree; the refinery force-push to
{{upstream_branch}} has NOT fired yet.

Worktree: $WORKTREE
Backup ref: $BACKUP_REF

Next: investigate the push failure (auth, network, ref protection on
refs/heads/rebase/*). Once the push lands, refinery handles the rest.
EOF
)"

gc session nudge "$REQUESTING_KEEPER" "rebase {{issue}}: push to rebase ref failed — operator engagement needed (metadata.aborted_at=push; context in bead notes)" || true

# Secondary backstop ONLY: best-effort mail to the operator.
if ! gc mail send {{notify_recipient}} -s "gascity rebase: push to rebase ref failed" -m "$(cat <<EOF
git push {{origin_remote}} HEAD:rebase/{{issue}} failed. The polecat
pushes its working branch only; the force-push that lands the rebase
onto {{upstream_branch}} is owned by the refinery overlay and has NOT
fired yet.

Worktree: $WORKTREE
Backup ref: $BACKUP_REF
Bead: {{issue}}

Next: investigate the push failure (auth, network, ref protection on
refs/heads/rebase/*). The rebased history is intact in the worktree;
once the push lands, refinery handles the rest.
EOF
)"; then
    echo "WARN: mail send failed for {{issue}}; the keeper handback (assignee + aborted_at + notes + nudge) is the durable signal" >&2
fi
gc runtime drain-ack
exit 0
```

**Race-loss against `{{upstream_branch}}` is no longer this step's
concern.** If `{{origin_remote}}/{{upstream_branch}}` moves between
our fetch and refinery's force-push, the refinery overlay detects it
by comparing the current `{{origin_remote}}/{{upstream_branch}}` tip
to `metadata.pre_rebase_tip` (and pinning the
`--force-with-lease=<branch>:<sha>` expected value to the same SHA)
and escalates to mayor — see `refinery-rebase-handling` in the
`gascity-keeper` sub-pack. We do NOT block on that race here; we
hand off and exit.

**Exit criteria:** `{{origin_remote}}/refs/heads/rebase/{{issue}}`
points at the rebased HEAD; the polecat's working branch is pushed
and ready for refinery to land."""

[[steps]]
id = "notify-and-handoff"
title = "Mail the completion summary, append to bead notes, hand off to refinery"
needs = ["push"]
description = """
Compose the completion summary using the verdict table, the conflict
resolutions log, and the rebase outcome, send it as mail, append a
clean copy to bead notes, then reassign the bead to refinery for the
force-push to `{{upstream_branch}}`. **Do NOT close the bead** — only
the refinery closes after the force-push lands (see the polecat
contract: polecats never close their own work bead, and rebase polecats
follow the same rule now that refinery owns the terminal landing).

**1. Build the summary:**

Sections to include:
- **Dropped commits** — the `drop-merged-upstream` and `drop-supplanted`
  rows from `metadata.commit_verdicts`, each with sha, subject, verdict,
  rationale.
- **Conflict resolutions** — a compact rendering of
  `metadata.conflict_resolutions` (if non-empty). One line per resolution
  entry: `<short-sha> <classification> <resolution>`. Lead with a
  one-line summary:
  "N conflicts resolved (M mechanical, K dropped-absorbed, J judgment-required)."
  If the log is empty, omit this section entirely.
- **Upstream commits absorbed** — `git log --oneline <pre-rebase-tip>..{{upstream_remote}}/{{upstream_branch}}`
  where `<pre-rebase-tip>` is the backup ref.
- **Check outcome** — pass (we got here) plus the check command name (default `make check` = fmt-check + lint + vet + test).
- **Install outcome** — pass.
- **Push outcome** — pushed `<new-sha>` to `{{origin_remote}}/{{upstream_branch}}`.
- **Backup ref** — name and pre-rebase tip sha, so the operator can roll
  back without paging this mol back in.

Build the conflict-resolutions rendering with jq:
```bash
RESOLUTIONS=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.conflict_resolutions // "[]"')
RES_COUNT=$(printf '%s' "$RESOLUTIONS" | jq 'length')
if [ "$RES_COUNT" -gt 0 ]; then
    MECH=$(printf '%s' "$RESOLUTIONS" | jq '[.[] | select(.classification=="mechanical")] | length')
    DROPPED=$(printf '%s' "$RESOLUTIONS" | jq '[.[] | select(.classification=="dropped-absorbed")] | length')
    JUDGED=$(printf '%s' "$RESOLUTIONS" | jq '[.[] | select(.classification=="judgment-required")] | length')
    RES_HEADLINE="$RES_COUNT conflict(s) resolved: $MECH mechanical, $DROPPED dropped-absorbed, $JUDGED judgment-required; full log on metadata.conflict_resolutions."
    RES_DETAIL=$(printf '%s' "$RESOLUTIONS" | jq -r '.[] | "  \\(.commit_sha[0:8]) classification=\\(.classification) resolution=\\(.resolution)"')
else
    RES_HEADLINE=""
    RES_DETAIL=""
fi
```

**2. Mail the operator:**
```bash
gc mail send {{notify_recipient}} -s "gascity rebase: ready for refinery handoff" -m "<summary>"
```

The summary describes the rebase outcome (drops, conflicts,
resolutions, check, install) and notes that refinery will perform the
force-push to `{{upstream_branch}}` next. The mailed summary inlines
`$RES_HEADLINE` and `$RES_DETAIL` when non-empty so the operator can
see at a glance whether any kept commits required rework. The full
`metadata.conflict_resolutions` JSON stays on the bead for forensic
review.

**3. Append the same summary to bead notes (markdown form):**
```bash
gc bd update {{issue}} --notes "<summary>"
```

The bead-notes version of the conflict-resolutions section can be a full
markdown table rather than the compact text rendering — it's the
durable forensic record the operator audits when they suspect a rework
was wrong.

**4. Hand off the bead to refinery for the force-push to `{{upstream_branch}}`:**

The refinery overlay shipped by the `gascity-keeper` sub-pack
(`refinery-rebase-handling` fragment) recognises rebase beads via
`metadata.molecule_id` and `metadata.backup_ref`, runs preflight
against the rebased branch, performs the safe force-push to
`{{upstream_branch}}` (see `refinery-rebase-handling` for the exact
lease form), and closes the bead. Race loss against
`{{upstream_branch}}` escalates to mayor from the refinery side — it
is no longer this polecat's problem.

```bash
# Make sure the metadata refinery reads matches what we pushed.
# branch was set in workspace-setup; refresh in case it drifted.
gc bd update {{issue}} \
  --set-metadata branch=rebase/{{issue}} \
  --set-metadata target={{upstream_branch}}

# Reassign to the rig-scoped refinery. ${GC_RIG:+$GC_RIG/} produces
# "<rig>/" when running under a rig session, or empty in HQ-only
# cities. The binding-qualified name is `gc-toolkit.refinery` — the
# refinery comes from gc-toolkit's import into gascity, so its
# qualified name carries the `gc-toolkit.` prefix (matching the same
# form `mol-polecat-work` uses: `${GC_RIG:+$GC_RIG/}gc-toolkit.refinery`).
REFINERY_TARGET="${GC_RIG:+$GC_RIG/}gc-toolkit.refinery"
gc bd update {{issue}} --status=open --assignee="$REFINERY_TARGET"

# Wake/nudge are best-effort — refinery's event watcher will catch the
# assignment regardless, but the explicit prompt shortens the latency.
gc session wake "$REFINERY_TARGET" || true
gc session nudge "$REFINERY_TARGET" "Rebase bead {{issue}} ready: force-push rebase/{{issue}} onto {{upstream_branch}}." || true
```

**5. Drain and exit:**
```bash
gc runtime drain-ack
exit 0
```

**Exit criteria:** completion mail sent (including conflict-resolutions
headline if any reworks fired); bead notes carry the summary plus the
markdown table of resolutions; `metadata.conflict_resolutions` remains
on the bead as the JSON record; bead is reassigned to refinery with
`metadata.branch=rebase/{{issue}}` and `metadata.target={{upstream_branch}}`;
session has drained. The bead stays OPEN — refinery closes it after
the force-push lands."""
