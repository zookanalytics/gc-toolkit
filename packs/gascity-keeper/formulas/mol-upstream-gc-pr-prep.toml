description = """
Prepare an upstream pull request from one or more local-fork commits. An
ordered batch is cherry-picked onto a single branch and lands as one combined
PR draft; N=1 is the original single-commit behavior. Mechanical work through
`push-branch`, then a `prepare-pr-handoff` step that drafts the PR title/body
(and an optional issue draft), then a `handback-to-keeper` step that re-routes
the bead to the requesting keeper for the conversational tail.

PR creation itself is operator-gated and currently blocked at the city level —
this mol stops at branch push + draft-on-bead. The keeper (or operator) decides
when and whether to run the assembled `gh pr create` command.

Extends `mol-polecat-base` for load-context but replaces the implement /
self-review chain with the cherry-pick / scrub / test / push / draft / handback
sequence below.

## Variables

| Variable | Required | Description |
|----------|----------|-------------|
| commit_sha | yes (set by keeper as `metadata.commit_sha`) | ordered, whitespace-separated list of one-or-more local commits to extract (old→new; N=1 = single-commit) |
| branch_name | no (set by keeper as `metadata.branch_name`) | explicit PR branch name; empty → `upstream-pr/<short-sha>` (N=1) or `upstream-pr/<issue>` (batch) |
| upstream_remote | no (default `upstream`) | upstream remote name |
| origin_remote | no (default `origin`) | origin remote name |
| upstream_branch | no (default `main`) | branch this PR will target |
| test_command | no (default `make test`) | post-cherry-pick test command |
| requesting_keeper | yes (set by keeper as `metadata.requesting_keeper`) | who to hand back to |

## Failure modes

| Step | Failure handling |
|------|------------------|
| cherry-pick | A conflict on any commit halts the chain; records which `conflict_sha`; resets the branch to the upstream base (no partial branch stranded); mails keeper + operator; hands the bead back to the keeper |
| scrub-commit-message | No-op marker — the scrub is applied per-commit inside the cherry-pick loop; this step persists the combined `scrub_diff` covering every commit |
| test | Failure mails keeper + operator; bead stays open (operator decides whether to investigate or abandon) |
| push-branch | If origin already has the branch and rejects, retry with `--force-with-lease`; if that also rejects, treat as race |
| prepare-pr-handoff | LLM judgment — record `issue_advice` even when no |
| handback-to-keeper | Reassign + nudge; the keeper's prime sweeps for `metadata.suggested_pr_title` |"""
formula = "mol-upstream-gc-pr-prep"
extends = ["mol-polecat-base"]
version = 3

[vars]
[vars.commit_sha]
description = "Whitespace-separated, ORDERED list of one-or-more local commits on origin/main to extract for upstream submission. Apply order is topological — old→new, as the commits sit on origin/main. A single SHA (N=1) is the original single-commit behavior."
required = true

[vars.branch_name]
description = "Explicit name for the assembled PR branch. Empty (default): a single SHA yields upstream-pr/<short-sha> (today's behavior), multiple SHAs yield upstream-pr/<issue> (stable + unique). Set: used verbatim, e.g. upstream-pr/test-env-isolation."
default = ""

[vars.upstream_remote]
description = "Git remote name pointing at the upstream gascity repository"
default = "upstream"

[vars.origin_remote]
description = "Git remote name pointing at the city's fork"
default = "origin"

[vars.upstream_branch]
description = "Branch the eventual upstream PR will target"
default = "main"

[vars.test_command]
description = "Test command run after cherry-pick + scrub"
default = "make test"

[vars.requesting_keeper]
description = "Keeper agent address (e.g., gascity/gascity-keeper.keeper) the bead returns to after prep"
required = true

[[steps]]
id = "workspace-setup"
title = "Set up gascity worktree branched off upstream"
needs = ["load-context"]
description = """
Branch off `{{upstream_remote}}/{{upstream_branch}}` (NOT `{{origin_remote}}`)
so the PR's commit history is upstream-relative. The keeper has stamped
`metadata.commit_sha` (an ordered, whitespace-separated list of one-or-more
SHAs, old→new as they sit on origin/main) and `metadata.requesting_keeper` on
this bead, plus an optional `metadata.branch_name`.

**1. Read the inputs:**
```bash
COMMIT_SHA=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.commit_sha')
REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper')
BRANCH_NAME=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.branch_name // empty')
```

`COMMIT_SHA` holds the whole ordered batch (one SHA for the N=1 case). If
`COMMIT_SHA` or `REQUESTING_KEEPER` is empty, the keeper failed to stamp
metadata — escalate to the operator with subject `pr-prep: missing metadata`
and exit. Do not invent defaults. `BRANCH_NAME` is optional and may be empty.

**2. Reuse or create the worktree:**

Check `metadata.work_dir` first:
```bash
WORKTREE=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.work_dir // empty')
```

If it exists, `cd` there and skip to step 3.

Otherwise create one branched off upstream:
```bash
RIG_ROOT=$(gc rig list --json | jq -r '.rigs[] | select(.name=="gascity") | .path')

# Split the ordered SHA list into positional params so we can count it (N)
# and grab the first commit. Intentional whitespace word-splitting.
# shellcheck disable=SC2086
set -- $COMMIT_SHA
N=$#

# Branch-naming rule:
#   branch_name set       → use it verbatim
#   empty + single SHA    → upstream-pr/<short-sha>   (today's behavior)
#   empty + multiple SHAs → upstream-pr/{{issue}}     (stable + unique)
if [ -n "$BRANCH_NAME" ]; then
  BRANCH="$BRANCH_NAME"
elif [ "$N" -eq 1 ]; then
  SHORT_SHA=$(git -C "$RIG_ROOT" rev-parse --short "$1")
  BRANCH="upstream-pr/$SHORT_SHA"
else
  BRANCH="upstream-pr/{{issue}}"
fi
WORKTREE_PATH="$(pwd)/worktrees/{{issue}}"

git -C "$RIG_ROOT" fetch --prune {{upstream_remote}}
git -C "$RIG_ROOT" worktree add "$WORKTREE_PATH" -b "$BRANCH" "{{upstream_remote}}/{{upstream_branch}}"
cd "$WORKTREE_PATH"
gc bd update {{issue}} \
  --set-metadata work_dir="$WORKTREE_PATH" \
  --set-metadata branch="$BRANCH"
```

If the branch name collides with an existing worktree branch (rare — repeated
single-commit PRs from the same short-sha, or a hand-picked `branch_name`
reused), append `-{{issue}}` to disambiguate. The empty-`branch_name` batch
default (`upstream-pr/{{issue}}`) is already unique per bead.

**Exit criteria:** worktree at `$WORKTREE_PATH`; branch computed per the rule
above — `upstream-pr/<short-sha>` for a single commit, `upstream-pr/{{issue}}`
for an un-named batch, or the explicit `branch_name` — based on
`{{upstream_remote}}/{{upstream_branch}}`; both recorded on the bead."""

[[steps]]
id = "preflight-tests"
title = "Skip — pr-prep variant uses its own gates"
needs = ["workspace-setup"]
description = """
This formula's gating happens in `cherry-pick` (conflict check), `test`
(post-scrub test), and `push-branch`. There is nothing useful to preflight
on a fresh branch off `{{upstream_remote}}/{{upstream_branch}}`.

Close this step and proceed."""

[[steps]]
id = "implement"
title = "Skip — replaced by cherry-pick + scrub-commit-message steps"
needs = ["preflight-tests"]
description = """
The implementation work for this formula lives in `cherry-pick` and
`scrub-commit-message` below. Close this step and proceed."""

[[steps]]
id = "self-review"
title = "Skip — replaced by test + prepare-pr-handoff steps"
needs = ["implement"]
description = """
The post-implementation verification for this formula is the `test` step,
and the diff-review duty is taken on by `prepare-pr-handoff` (which has to
read the commit anyway to draft the title and body). Close this step and
proceed."""

[[steps]]
id = "cherry-pick"
title = "Cherry-pick the ordered batch onto upstream, scrubbing each commit"
needs = ["self-review"]
description = """
Apply the ordered batch of one-or-more commits onto the upstream-based branch,
in order (old→new), and scrub each commit's message *while it is HEAD* (amending
a non-HEAD commit afterward is fiddly, so the scrub is folded into this loop
instead of living in its own step). N=1 is exactly the original single-commit
path: one cherry-pick, one scrub.

```bash
COMMIT_SHA=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.commit_sha')

# Fresh combined-scrub log. The (now no-op) scrub-commit-message step reads
# this back and persists it as metadata.scrub_diff for the keeper.
SCRUB_LOG=/tmp/scrub-all-{{issue}}.txt
: > "$SCRUB_LOG"

# Intentional whitespace word-splitting over the ordered SHA list.
# shellcheck disable=SC2086
for SHA in $COMMIT_SHA; do
  if ! git cherry-pick "$SHA"; then
    # --- Conflict on THIS commit: capture which, reset, hand back. ---
    git status --short > /tmp/cherry-pick-conflict-{{issue}}.txt
    git cherry-pick --abort
    # Reset the branch back to the upstream base so no partial batch strands.
    git reset --hard "{{upstream_remote}}/{{upstream_branch}}"

    REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper')
    gc mail send "$REQUESTING_KEEPER" -s "pr-prep: cherry-pick conflict for {{issue}}" -m "$(cat <<EOF
Cherry-pick of $SHA onto {{upstream_remote}}/{{upstream_branch}} conflicted.

Bead: {{issue}}
Worktree: $(pwd)
Batch: $COMMIT_SHA
Conflicting commit: $SHA
Conflicts:
$(cat /tmp/cherry-pick-conflict-{{issue}}.txt)

Commit $SHA of the batch conflicts on current upstream — drop it from the
batch or split it. Likely cause: the commit depends on local-only context
that doesn't exist upstream. The branch was reset to the upstream base; no
partial batch was left behind.
EOF
)"
    gc mail send human -s "pr-prep: cherry-pick conflict for {{issue}}" -m "(see keeper mail)"

    gc bd update {{issue}} \
      --set-metadata aborted_at=cherry-pick \
      --set-metadata conflict_sha="$SHA" \
      --status=open \
      --assignee="$REQUESTING_KEEPER" \
      --set-metadata gc.routed_to="$REQUESTING_KEEPER"
    gc runtime drain-ack
    exit 0
  fi

  # --- Scrub THIS commit's message while it is HEAD (see pattern list below). ---
  git log -1 --format='%B' > /tmp/scrub-before-{{issue}}.txt
  # ...inspect; if a rewrite is needed: git commit --amend -m "<scrubbed message>"...
  {
    echo "=== $SHA ==="
    echo "BEFORE:"
    cat /tmp/scrub-before-{{issue}}.txt
    echo
    echo "AFTER:"
    git log -1 --format='%B'
    echo
  } >> "$SCRUB_LOG"
done
```

If every commit applies cleanly, close this step and proceed.

**Scrub each commit (LLM judgment, not blind regex).** Run this against the
message of the commit you just picked, while it is HEAD. Rewrite anything that
would leak city-internal context to the upstream repo, protecting the
operator's fork-internal taxonomy (bead IDs, agent handles, rig names) from
upstream history. Scan for these patterns:

- Bead-ID-shaped tokens — `lx-…`, `gc-…`, `tk-…`, `sl-…` (lowercase prefix
  followed by short slug). Borderline cases: a token like `gc-init` could
  be a real upstream symbol; consider context.
- Rig names visible in the commit — any `gc rig list` entries (the
  importing city's rig names). The conventional `gc-toolkit` rig
  name may appear; the city's specific names won't be enumerated
  here, so resolve them per-install.
- City references — any tokens that match the city's name (run `gc
  city status` or check `site.toml`), plus generic phrases like
  "this city" or "our city".
- Internal handle names — `mechanik`, `mayor`, `deacon`, `polecat`, `witness`,
  `refinery`, `boot`, `concierge`, `consult-host`, `keeper`. (These are
  city-architecture concepts; they don't belong in upstream PR descriptions.)

If anything matches, rewrite to remove or generalize, then `git commit --amend`:
- Drop the line entirely if it's something like `Tracking: tk-abc123`.
- Replace internal handles with neutral wording — e.g. "the city's keeper
  agent" → "tooling".
- Generalize rig names — `gc-toolkit pack` → "downstream pack".

If nothing matches, leave the message untouched — the before/after entry in
the scrub log will simply be identical. Either way, append one `=== <sha> ===`
before/after block per commit to `/tmp/scrub-all-{{issue}}.txt` (the loop above
does this) so the scrub-commit-message step can persist the full rewrite set.

**Conflict handback (inside the loop).** When any commit conflicts: capture the
conflict tail, `git cherry-pick --abort`, **reset the branch to
`{{upstream_remote}}/{{upstream_branch}}` so no partial batch strands**, set
`metadata.aborted_at=cherry-pick` and `metadata.conflict_sha=<sha>`, mail the
keeper + operator naming the offending commit, hand the bead back to the
keeper, and exit. The keeper's prime sweep notices `metadata.aborted_at` /
`metadata.conflict_sha` and surfaces "commit <X> of the batch conflicts on
current upstream — drop it from the batch or split it." The operator can then
resume from `metadata.work_dir` after editing the batch.

**Bead stays open and assigned to the keeper** on the conflict path — without
the lifecycle handback the bead would strand on this drained session.

**Exit criteria:** HEAD carries every commit of the batch in order, each with a
scrubbed message; working tree is clean; `/tmp/scrub-all-{{issue}}.txt` holds a
before/after block per commit."""

[[steps]]
id = "scrub-commit-message"
title = "Persist the combined scrub diff (scrub applied per-commit in cherry-pick)"
needs = ["cherry-pick"]
description = """
Scrubbing of city-internal references now happens per-commit *inside* the
`cherry-pick` loop, while each commit is HEAD (amending a non-HEAD commit
afterward is fiddly). This step no longer rewrites anything — it is a no-op
marker that persists the COMBINED before/after record the loop accumulated, so
the keeper can surface the full rewrite set across every commit in the batch
(a single block for the N=1 case).

The cherry-pick loop wrote a `=== <sha> ===` before/after block per commit to
`/tmp/scrub-all-{{issue}}.txt`. Persist it verbatim:

```bash
SCRUB_LOG=/tmp/scrub-all-{{issue}}.txt
if [ -s "$SCRUB_LOG" ]; then
  gc bd update {{issue}} --set-metadata scrub_diff="$(cat "$SCRUB_LOG")"
else
  # The log should never be empty after a successful cherry-pick step; if it
  # is, the loop was skipped — record that rather than silently passing.
  gc bd update {{issue}} --set-metadata scrub_diff="(no scrub log found — cherry-pick loop did not run?)"
fi
```

The keeper surfaces this diff during the handback conversation so the operator
can object if a scrub overreached on any commit.

**Exit criteria:** `metadata.scrub_diff` records a before/after block for every
commit in the batch (a single block for N=1)."""

[[steps]]
id = "test"
title = "Run the test suite on the cherry-picked branch"
needs = ["scrub-commit-message"]
description = """
**Config: test_command = {{test_command}}**

```bash
{{test_command}}
```

If tests pass, close this step and proceed.

If tests fail:
```bash
TEST_TAIL=$(<test output, last 200 lines>)
REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper')

gc mail send "$REQUESTING_KEEPER" -s "pr-prep: tests failed for {{issue}}" -m "$(cat <<EOF
Cherry-pick succeeded but {{test_command}} failed on the rebased branch.

Bead: {{issue}}
Worktree: $(pwd)

Failure tail:
$TEST_TAIL
EOF
)"
gc mail send human -s "pr-prep: tests failed for {{issue}}" -m "(see keeper mail)"

gc bd update {{issue}} \
  --set-metadata aborted_at=test \
  --status=open \
  --assignee="$REQUESTING_KEEPER" \
  --set-metadata gc.routed_to="$REQUESTING_KEEPER"
gc runtime drain-ack
exit 0
```

**Bead stays open and assigned to the keeper** — the lifecycle handback
puts the bead back where the keeper's prime sweep will see it. The
operator may decide the failure means the commit isn't viable upstream
as-is, or may pursue a fix."""

[[steps]]
id = "push-branch"
title = "Push the prepped branch to origin"
needs = ["test"]
description = """
**Config: origin_remote = {{origin_remote}}**

Push the computed branch — `metadata.branch`, whatever the workspace-setup
rule produced (`upstream-pr/<short-sha>` for a single commit, an explicit
`branch_name`, or `upstream-pr/{{issue}}` for an un-named batch) — to
`{{origin_remote}}` so upstream's PR can target it later. This is a feature
branch push, not a push to `{{upstream_branch}}`. `git branch --show-current`
resolves whichever name was computed; no short-sha assumption.

```bash
BRANCH=$(git branch --show-current)
git push {{origin_remote}} HEAD
```

Record the branch URL on the bead for the keeper conversation:
```bash
ORIGIN_URL=$(git remote get-url {{origin_remote}})
# Convert git@github.com:owner/repo.git → https://github.com/owner/repo
HTTPS_URL=$(printf '%s' "$ORIGIN_URL" | \
  sed -E 's#^git@github.com:([^/]+)/([^.]+)(\\.git)?$#https://github.com/\\1/\\2#' | \
  sed -E 's#\\.git$##')
BRANCH_URL="$HTTPS_URL/tree/$BRANCH"
gc bd update {{issue}} --set-metadata branch_url="$BRANCH_URL"
```

If the push fails because the branch already exists on `{{origin_remote}}`
(rare — repeated pr-prep runs for the same commit), retry with
`--force-with-lease`. Do NOT use plain `--force`. If `--force-with-lease`
is also rejected, mail the keeper and operator with subject
`pr-prep: branch race for {{issue}}` and abort with the lifecycle handback:

```bash
REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper')

gc mail send "$REQUESTING_KEEPER" -s "pr-prep: branch race for {{issue}}" -m "$(cat <<EOF
git push --force-with-lease was rejected on $(git branch --show-current).
Someone else pushed to that branch on {{origin_remote}}.

Bead: {{issue}}
Worktree: $(pwd)

Next: review what landed remotely. If the new commits should supersede
this prep, abandon this bead; otherwise restart pr-prep on a fresh bead.
EOF
)"
gc mail send human -s "pr-prep: branch race for {{issue}}" -m "(see keeper mail)"

gc bd update {{issue}} \
  --set-metadata aborted_at=push-branch \
  --status=open \
  --assignee="$REQUESTING_KEEPER" \
  --set-metadata gc.routed_to="$REQUESTING_KEEPER"
gc runtime drain-ack
exit 0
```

**Bead stays open and assigned to the keeper** — same handback pattern
as the other abort paths.

**Exit criteria:** branch is on `{{origin_remote}}`; `metadata.branch_url`
records the GitHub URL."""

[[steps]]
id = "prepare-pr-handoff"
title = "Draft PR title/body, optional issue, and gh commands"
needs = ["push-branch"]
description = """
LLM judgment work: read the cherry-picked commit, draft a PR title/body,
decide whether an upstream issue would help, draft commands. Persist all
artifacts to bead metadata so the keeper can surface them in the handback
conversation.

**1. Read the commits (the whole batch, oldest→newest):**
```bash
git log --reverse --format='%H%n%s%n%b%n--' {{upstream_remote}}/{{upstream_branch}}..HEAD
git diff --stat {{upstream_remote}}/{{upstream_branch}}..HEAD
```
For N=1 this lists the single commit; for a batch it lists every commit in
apply order (old→new).

**2. Draft the PR title — the batch theme:**

For a single commit (N=1): the cleaned commit subject — today's behavior. If
the subject is already shaped like a good upstream title, use it as-is. If it
reads city-internally (survived scrub but still has tone), rewrite to be
neutral — imperative verb + scope (e.g., "Fix race in cache reconcile").

For a batch (N>1): synthesize a title that names the *theme* of the whole set,
NOT any single commit's subject — e.g. "Isolate tests from host GC_*/DOLT_*
environment".

Persist:
```bash
gc bd update {{issue}} --set-metadata suggested_pr_title="<title>"
```

**3. Draft the PR body — rationale + per-commit bullets:**

For a single commit (N=1), keep today's shape — the commit speaks for itself,
so omit the per-commit list:
```
<commit body>

## Why this PR

<one-paragraph stub the keeper iterates on with the operator — set the
 stage: what the commit fixes/adds, why it's worth landing upstream, any
 caveats or trade-offs the operator should call out>
```

For a batch (N>1), lead with a short rationale, then a per-commit bullet list
(each commit's subject + one line of what/why), then the same editable stub:
```
<short rationale: what this PR changes overall and why the set is worth
 landing upstream>

## Commits

- <commit 1 subject> — <one line: what it does / why>
- <commit 2 subject> — <one line: what it does / why>
- …

## Why this PR

<one-paragraph stub the keeper iterates on with the operator — caveats,
 trade-offs, anything the operator should call out>
```

The "## Why this PR" stub is intentionally short and editable in both cases —
the operator and keeper finalize it together. Don't oversell; flag unknowns.

Persist:
```bash
gc bd update {{issue}} --set-metadata suggested_pr_body="<body>"
```

**4. Decide on a companion issue and always set every issue field:**

An upstream issue helps when:
- The change is RFC-shaped (asking upstream's opinion before code review)
- The behavioural decision is worth surfacing publicly (e.g., "should we
  drop X, alternative is Y")
- The fix touches a known-contentious area (commit history, agent
  prompt-template format, schema).

An issue is **not** worth filing for:
- Pure bug fixes with a clear repro (the PR is the artifact)
- Refactors that are obviously equivalent
- Doc fixes

Decide `ISSUE_DECISION=yes` or `ISSUE_DECISION=no` and an explanatory
`ISSUE_REASON`. **Then write all four issue-related metadata keys** —
`issue_advice`, `suggested_issue_title`, `suggested_issue_body`, and
later `gh_issue_command`. For the no-issue case, store empty strings;
the keeper template treats empty values as "no issue surfaced" and
skips the issue block. The contract is "always set, possibly empty",
so the keeper never has to special-case missing keys.

```bash
ISSUE_DECISION=yes   # or "no"
ISSUE_REASON="<one-line rationale>"

if [ "$ISSUE_DECISION" = "yes" ]; then
  ISSUE_TITLE="<drafted title>"
  ISSUE_BODY="<drafted body>"
else
  ISSUE_TITLE=""
  ISSUE_BODY=""
fi

gc bd update {{issue}} \
  --set-metadata issue_advice="${ISSUE_DECISION}: ${ISSUE_REASON}" \
  --set-metadata suggested_issue_title="$ISSUE_TITLE" \
  --set-metadata suggested_issue_body="$ISSUE_BODY"
```

**5. Build the ready-to-paste gh commands with concrete values:**

Note: PR/issue creation is currently blocked at the city level. These
commands are stored on the bead so the operator can paste them outside
the agent harness once the policy unblocks.

The stored command must be ready to paste — no `<fork-owner>` or
`<branch>` placeholders left in the string. Resolve everything from the
worktree state: fork-owner from `git remote get-url {{origin_remote}}`,
branch from `git branch --show-current` (matches `metadata.branch`),
title and body from the metadata you just persisted. Use `printf %q` to
shell-escape the title and body so multi-line bodies and quote
characters round-trip safely on paste.

```bash
ORIGIN_URL=$(git remote get-url {{origin_remote}})
# Pull the owner segment out of either git@github.com:owner/repo(.git)
# or https://github.com/owner/repo(.git)
FORK_OWNER=$(printf '%s' "$ORIGIN_URL" | \
  sed -E 's#^git@github.com:([^/]+)/.*#\\1#; t; s#^https?://github.com/([^/]+)/.*#\\1#')
BRANCH=$(git branch --show-current)
PR_TITLE=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.suggested_pr_title')
PR_BODY=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.suggested_pr_body')

PR_CMD=$(printf 'gh pr create --repo gastownhall/gascity --base %s --head %s:%s --title %q --body %q' \
  "{{upstream_branch}}" "$FORK_OWNER" "$BRANCH" "$PR_TITLE" "$PR_BODY")

if [ "$ISSUE_DECISION" = "yes" ]; then
  ISSUE_CMD=$(printf 'gh issue create --repo gastownhall/gascity --title %q --body %q' \
    "$ISSUE_TITLE" "$ISSUE_BODY")
else
  ISSUE_CMD=""
fi

gc bd update {{issue}} \
  --set-metadata gh_pr_command="$PR_CMD" \
  --set-metadata gh_issue_command="$ISSUE_CMD"
```

**Exit criteria:** `metadata` carries every promised key with concrete
values: `branch_url`, `suggested_pr_title`, `suggested_pr_body`,
`suggested_issue_title`, `suggested_issue_body`, `issue_advice`,
`gh_pr_command`, `gh_issue_command`. Issue fields are empty strings
when no issue is recommended; `gh_pr_command` contains a fully
resolved command (no placeholders)."""

[[steps]]
id = "handback-to-keeper"
title = "Reassign the bead to the keeper, nudge, mail backstop"
needs = ["prepare-pr-handoff"]
description = """
Mirror the polecat→refinery handoff contract, but the destination is the
requesting keeper, not the rig refinery. The bead stays **open** — the
keeper closes it after the title/body conversation with the operator.

**1. Reassign and re-route:**
```bash
REQUESTING_KEEPER=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.requesting_keeper')
gc bd update {{issue}} \
  --status=open \
  --assignee="$REQUESTING_KEEPER" \
  --set-metadata gc.routed_to="$REQUESTING_KEEPER"
```

**2. Nudge the keeper (ephemeral signal):**
```bash
gc session nudge "$REQUESTING_KEEPER" "PR prep ready: {{issue}}"
```

**3. Mail the operator a backstop note:**

The keeper might be a fresh-spawn agent that wasn't running when this mol
finished. The mail is a durable record so the operator can revisit even
if they didn't notice the keeper's notification.

```bash
BRANCH_URL=$(gc bd show {{issue}} --json | jq -r '.[0].metadata.branch_url')
gc mail send human -s "pr-prep ready: {{issue}}" -m "$(cat <<EOF
PR prep is complete for {{issue}}. Branch pushed: $BRANCH_URL.

The keeper ($REQUESTING_KEEPER) has been re-assigned the bead and
nudged. When you're ready to refine the PR title / body, engage the
keeper — it'll surface the drafts and the gh commands for review.

If the keeper isn't running, just spawn it: gc session new $REQUESTING_KEEPER.
EOF
)"
```

**4. Drain and exit:**
```bash
gc runtime drain-ack
exit 0
```

**Exit criteria:** bead is open and assigned to the keeper; nudge sent;
operator has a mailed pointer; session has drained."""
