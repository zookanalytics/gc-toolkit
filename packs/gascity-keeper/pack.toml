# gascity-keeper — opt-in sub-pack for the gascity rig.
#
# Bundles the keeper agent (operator front-end for upstream sync /
# rebase / PR-prep workflows), its supporting formulas (the
# `mol-upstream-gc-*` family), and the rebase-handling doctrine that
# refinery and polecat in a fork-bearing rig need.
#
# Imports nothing on its own. The patches below target agents that
# the importing rig pulled in via gc-toolkit (refinery, polecat),
# so this pack only composes correctly when loaded alongside the
# gc-toolkit core pack.
#
# Imported only by the gascity rig — the rig that maintains the
# `zookanalytics/gascity ← gastownhall/gascity` fork. Other rigs
# that import gc-toolkit (gc-toolkit itself, signal-loom) do NOT
# pick this up.

[pack]
name = "gascity-keeper"
schema = 2

# The sub-pack ships the keeper, its `mol-upstream-gc-*` formulas, and
# the gascity-rig-specific fragments (rebase-conventions,
# polecat-patterns, refinery-rebase-handling). It does NOT carry
# `[[patches.agent]]` blocks: sub-pack patches can only target agents
# the sub-pack itself imports, and importing gastown here would
# duplicate gastown's agents under the `gascity-keeper` binding (so the
# gc-toolkit-patched refinery / polecat get shadowed by bare gastown
# copies). The right home for the fragment-injection patches is the
# importing city/rig — the importing city's `city.toml` carries
# `[[rigs.patches]]` blocks for the gascity rig alongside
# `[rigs.imports.gascity-keeper]`.

# For the broader gc-toolkit install context (importing gc-toolkit,
# `[[rigs.overrides]]`, verification with `gc doctor`), see
# `docs/install.md` in the gc-toolkit repo root.

# Example wiring (in the importing city's `city.toml`):
#
#   [[rigs]]
#   name = "<rig-name>"  # the rig that should run the keeper
#
#   [rigs.imports.gc-toolkit]
#   source = "<path-to-your-gc-toolkit-checkout>"
#
#   [rigs.imports.gascity-keeper]
#   source = "<path-to-your-gc-toolkit-checkout>/packs/gascity-keeper"
#
#   [[rigs.patches]]
#   agent = "refinery"
#   inject_fragments_append = ["rebase-conventions", "refinery-rebase-handling"]
#
#   [[rigs.patches]]
#   agent = "polecat"
#   inject_fragments_append = ["rebase-conventions", "polecat-patterns"]
#
# The `[[rigs.patches]]` blocks are nested inside the `[[rigs]]`
# block (TOML scoping), so they apply to that one rig only.
# After editing city.toml, run `gc config show` to confirm the
# keeper resolves as `<rig-name>/gascity-keeper.keeper` and the
# fragments compose into the rig's refinery and polecat.

# Materialise the keeper on demand in whichever rig imports this pack.
# The agent ships as bare `keeper` inside the sub-pack; the binding
# qualifier comes from the import (e.g., `gascity-keeper.keeper`),
# and the rig prefix from the importing rig (`gascity/gascity-keeper.keeper`).
[[named_session]]
template = "keeper"
scope = "rig"
mode = "on_demand"
