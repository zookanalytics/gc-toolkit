# gc-toolkit — primary pack for the loomington city.
#
# Defines the city's agent roster and operational formulas.
# Starts minimal (mayor, mechanik, dog) — mechanik designs and
# implements additional agents (witness, refinery, polecat) as needed.

[pack]
name = "gc-toolkit"
schema = 2

[[named_session]]
template = "mechanik"
scope = "city"
mode = "always"
