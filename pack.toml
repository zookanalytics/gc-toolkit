# gc-toolkit — primary pack for the loomington city.
#
# Vendored gastown roster (mayor, deacon, boot, witness, refinery, polecat) at
# gascity@669586546a 2026-05-05 (Lane C — see
# docs/research/pack-architecture/spike-gc-toolkit-as-primary-pack.md).
# Native gc-toolkit agents (mechanik, architect, concierge, consult-host,
# polecat-codex). Per-agent provenance in agents/<name>/PROVENANCE.md.
#
# Dog is intentionally NOT vendored: the gc binary auto-includes the
# maintenance pack (cmd/gc/embed_builtin_packs.go:builtinPackIncludes), which
# ships dog as a city-local agent. Vendoring our own would collide on
# bare-name uniqueness in the V2 validator. We accept maintenance.dog
# defaults pending an upstream fix.

[pack]
name = "gc-toolkit"
schema = 2

[global]
session_live = [
    "{{.ConfigDir}}/assets/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
    "{{.ConfigDir}}/assets/scripts/tmux-keybindings.sh {{.ConfigDir}}",
    "{{.ConfigDir}}/assets/scripts/tmux-bindings.sh {{.ConfigDir}}",
]

[[named_session]]
template = "mechanik"
scope = "city"
mode = "always"

[[named_session]]
template = "mayor"
scope = "city"
mode = "always"

[[named_session]]
template = "deacon"
scope = "city"
mode = "always"

[[named_session]]
template = "boot"
scope = "city"
mode = "always"

[[named_session]]
template = "witness"
scope = "rig"
mode = "always"

[[named_session]]
template = "refinery"
scope = "rig"
mode = "on_demand"
