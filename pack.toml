# gc-toolkit — primary pack for a Gas Town city.
#
# Lane B (2026-05-11): gc-toolkit imports the gastown pack wholesale and
# layers per-agent patches. See
# specs/tk-0t1ip/pack-patch-timing-analysis.md for the
# safety verdict and prerequisites; the prereqs (city-level
# [imports.gastown] removed, [rigs.imports.gastown] removed) were
# captured during Lane C cutover and remain in effect.
#
# Native gc-toolkit agents (mechanik, polecat-codex,
# _polecat-gemini, plus the *-thread
# variants) ship under agents/. Gastown roster (boot, deacon, mayor,
# polecat, refinery, witness) is imported and divergences are
# expressed as bare-name [[patches.agent]] — pure fragment-append
# overlays on top of base prompts. Each gc-toolkit-specific doctrine
# (heartbeat-no-consent-ui, layered-startup-discovery-{deacon,refinery},
# convoy-integration-branch-mayor, polecat-convoys, polecat-non-impl-done,
# operator-next-step-trailing) lives in template-fragments/ and is named
# explicitly in inject_fragments_append below; the base prompt template is
# reused verbatim from gastown. No whole-file prompt mirrors.
#
# Opt-in sub-packs ship under packs/<name>/ and are imported by
# specific rigs (not by gc-toolkit's importers). The first sub-pack
# is `packs/gascity-keeper/` — the keeper agent + the
# mol-upstream-gc-* formula family + the refinery rebase-handling
# overlay, all of which are gascity-fork-specific and should not be
# loaded into rigs that don't carry a fork. See
# `packs/gascity-keeper/pack.toml` for the import wiring that the
# gascity rig adds in city.toml.
#
# Dog is intentionally NOT vendored: the imported gastown pack owns the
# dog pool (gastown/agents/dog/; gastown pack.toml: "This pack owns its
# dog pool") and ships dog as a city-scoped agent, so gc-toolkit needs no
# roster entry of its own.

[pack]
name = "gc-toolkit"
schema = 2

[imports.gastown]
# gastown composes from the public gascity-packs registry, resolved from
# the user-global pack cache (the running binary pre-seeds that cache with
# its embedded gastown PackFS at this pin). The per-city
# .gc/system/packs/gastown tree was retired upstream — builtin packs are
# no longer materialized into the city; see cmd/gc/embed_builtin_packs.go.
source = "https://github.com/gastownhall/gascity-packs/tree/main/gastown"
version = "sha:4212acb7046c11f6f633df73307006493185233a"

[global]
# Ordering is load-bearing. Gastown's tmux-theme.sh runs first (from
# the imported pack) and sets the full status-bar theme, including a
# status-right that points at gastown's status-line.sh. Our overrides
# below run AFTER (see gascity/internal/config/pack.go:1450 — "Collect
# globals: included globals first, then this pack's own"; iterated
# in order at runtime/tmux/adapter.go:824). The override script
# rewrites status-right to point at gc-toolkit-status-line.sh, which
# adds the composable title and indicator slots while preserving
# gastown's tier theming and `%H:%M` time slot.
session_live = [
    "{{.ConfigDir}}/assets/scripts/tmux-bindings.sh {{.ConfigDir}}",
    "{{.ConfigDir}}/assets/scripts/tmux-status-line-override.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
]

[[patches.agent]]
name = "deacon"
inject_fragments_append = [
    "canonical-self-rename",
    "heartbeat-no-consent-ui",
    "layered-startup-discovery-deacon",
]

[[patches.agent]]
name = "mayor"
inject_fragments_append = [
    "canonical-self-rename",
    "convoy-integration-branch-mayor",
    "operator-next-step-trailing",
]

[[patches.agent]]
name = "polecat"
inject_fragments_append = ["polecat-convoys", "polecat-non-impl-done"]

[[patches.agent]]
name = "refinery"
inject_fragments_append = [
    "layered-startup-discovery-refinery",
]

[[patches.agent]]
name = "witness"
inject_fragments_append = [
    "heartbeat-no-consent-ui",
]

[[named_session]]
template = "mechanik"
scope = "city"
mode = "always"
