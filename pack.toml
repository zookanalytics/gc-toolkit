# gc-toolkit — primary pack for a Gas Town city.
#
# Lane B (2026-05-11): gc-toolkit imports the gastown pack wholesale and
# layers per-agent patches. See
# specs/tk-0t1ip/pack-patch-timing-analysis.md for the
# safety verdict and prerequisites; the prereqs (city-level
# [imports.gastown] removed, [rigs.imports.gastown] removed) were
# captured during Lane C cutover and remain in effect.
#
# Native gc-toolkit agents (architect, concierge, consult-host,
# mechanik, polecat-codex, _polecat-gemini, plus the *-thread
# variants) ship under agents/. Gastown roster (boot, deacon, mayor,
# polecat, refinery, witness) is imported and divergences are
# expressed as bare-name [[patches.agent]] — prompts in patches/,
# plus a polecat-convoys template-fragment for the additive
# integration-branch section.
#
# Opt-in sub-packs ship under packs/<name>/ and are imported by
# specific rigs (not by gc-toolkit's importers). The first sub-pack
# is `packs/gascity-keeper/` — the keeper agent + the
# mol-upstream-gc-* formula family + the refinery rebase-handling
# overlay, all of which are gascity-fork-specific and should not be
# loaded into rigs that don't carry a fork. See
# `packs/gascity-keeper/pack.toml` for the import wiring that the
# gascity rig adds in city.toml.
#
# Dog is intentionally NOT vendored: the gc binary auto-includes the
# maintenance pack (cmd/gc/embed_builtin_packs.go:builtinPackIncludes),
# which ships dog as a city-local agent. Gastown's import of
# maintenance is deduplicated against that auto-include by pack name.

[pack]
name = "gc-toolkit"
schema = 2

[imports.gastown]
# City-root-relative (`//` prefix) so the import works from any path
# the rig is checked out at — under `rigs/gc-toolkit/` in production
# or under `.gc/worktrees/` during polecat work. The materialized
# gastown copy is refreshed on every `gc` start from the embedded
# gastown PackFS (see `cmd/gc/embed_builtin_packs.go`).
source = "//.gc/system/packs/gastown"

[global]
# Ordering is load-bearing. Gastown's tmux-theme.sh runs first (from
# the imported pack) and sets the full status-bar theme, including a
# status-right that points at gastown's status-line.sh. Our overrides
# below run AFTER (see gascity/internal/config/pack.go:1450 — "Collect
# globals: included globals first, then this pack's own"; iterated
# in order at runtime/tmux/adapter.go:824). The override script
# rewrites status-right to point at gc-toolkit-status-line.sh, which
# adds the composable title and indicator slots while preserving
# gastown's tier theming and `%H:%M` time slot.
session_live = [
    "{{.ConfigDir}}/assets/scripts/tmux-bindings.sh {{.ConfigDir}}",
    "{{.ConfigDir}}/assets/scripts/tmux-status-line-override.sh {{.Session}} {{.Agent}} {{.ConfigDir}}",
]

[[patches.agent]]
name = "boot"
prompt_template = "patches/boot-prompt.template.md"

[[patches.agent]]
name = "deacon"
prompt_template = "patches/deacon-prompt.template.md"
inject_fragments_append = ["canonical-self-rename"]

[[patches.agent]]
name = "mayor"
prompt_template = "patches/mayor-prompt.template.md"
inject_fragments_append = ["canonical-self-rename"]

[[patches.agent]]
name = "polecat"
inject_fragments_append = ["polecat-convoys", "polecat-non-impl-done"]

[[patches.agent]]
name = "refinery"
prompt_template = "patches/refinery-prompt.template.md"

[[patches.agent]]
name = "witness"
prompt_template = "patches/witness-prompt.template.md"

[[named_session]]
template = "mechanik"
scope = "city"
mode = "always"
