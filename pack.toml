# gc-toolkit — a Gas City pack extending gastown.
#
# Provides custom agents (mechanik, and more to come) and planning-pipeline
# formulas inspired by but distinct from gastown's mol-idea-to-plan. Leans on
# gastown for the common crew (mayor, deacon, polecat, refinery, witness,
# boot, dog) and adds structural/planning roles on top.
#
# Usage in city.toml:
#   [workspace]
#   includes = [
#       "https://github.com/gastownhall/gastown/tree/main",
#       "https://github.com/zookanalytics/gc-toolkit/tree/main",
#   ]
#
#   [[named_session]]
#   template = "mechanik"

[pack]
name = "gc-toolkit"
schema = 1

[formulas]
dir = "formulas"

# ── MECHANIK — Structural engineer. One per city. ─────────────────────
# Owns formulas, agent configs, dispatch patterns, quality gates, and the
# overall shape of how the city operates. Analyzes patterns and designs
# improvements rather than grinding beads.
[[agent]]
name = "mechanik"
scope = "city"
wake_mode = "fresh"
work_dir = ".gc/agents/mechanik"
prompt_template = "prompts/mechanik.md.tmpl"
nudge = "Check mail and hook status, then act accordingly."
idle_timeout = "1h"

[[named_session]]
template = "mechanik"
scope = "city"
