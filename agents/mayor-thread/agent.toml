scope = "city"
wake_mode = "resume"
idle_timeout = "8h"
min_active_sessions = 0

# Cross-reference: render the canonical mayor's prompt template under
# this agent's identity. Path is pack-root-relative —
# compose.adjustFragmentPath translates it to city-root-relative before
# render. Template variables (.AgentName, .RigName, .WorkDir) bind to the
# thread's identity, not the canonical's, because PromptContext is
# built per-agent at render time (cmd/gc/template_resolve.go).
prompt_template = "agents/mayor/prompt.template.md"

# Append the generic thread-role fragment. RoleName (below) drives the
# parameterization so the same fragment serves mayor-thread / mechanik-thread
# / future <role>-thread variants without duplication.
append_fragments = ["thread-role"]

# Each instance gets its own worktree, separate from canonical mayor's
# .gc/agents/mayor home. AgentBase parameterizes by per-instance name
# (e.g., mayor-thread-1), so concurrent threads do not stomp each other.
#
# City-scoped agents have empty .Rig/.RigRoot (those derive from agent
# dir/rig assignment, which city-scoped pack agents lack). Use literal
# "gc-toolkit" in the path and {{.ConfigDir}} (pack source) as the git
# repo root passed to worktree-setup.sh.
work_dir = ".gc/worktrees/gc-toolkit/mayor-thread/{{.AgentBase}}"
pre_start = ["{{.ConfigDir}}/assets/scripts/worktree-setup.sh {{.ConfigDir}} {{.WorkDir}} {{.AgentBase}} --sync"]

nudge = "Operator nudge — return to the focus thread. Routed mail and routed work go to the canonical mayor; check mail (gc mail inbox) only if the operator left a direct message."

# Never-matching predicates: threads are operator-spawned only.
# work_query returns empty JSON so the reconciler never claims work or
# auto-spawns to satisfy demand. sling_query exits non-zero so
# `gc sling gc-toolkit.mayor-thread <bead>` surfaces an
# explicit error instead of silently routing.
work_query = "printf '[]'"
sling_query = "echo 'mayor-thread is operator-spawned only; not a sling target' >&2; exit 1"

# RoleName drives the generic thread-role fragment. Substituted into the
# fragment as {{ .RoleName }} via PromptContext.Env -> template data.
[env]
RoleName = "mayor"
