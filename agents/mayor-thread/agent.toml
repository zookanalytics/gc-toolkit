scope = "city"
wake_mode = "resume"
idle_timeout = "8h"
min_active_sessions = 0

# Cross-reference: render the canonical mayor's prompt under this
# agent's identity. tk-kdu2v5 retired the whole-file
# patches/mayor-prompt.template.md overlay — the canonical mayor is now
# the imported gastown mayor with bare-name [[patches.agent]]
# fragment-appends and no prompt_template override, letting the base
# prompt apply verbatim. So point the thread at the same base prompt the
# canonical renders from, and append the mayor dispatch doctrine
# (convoy-integration-branch-mayor) so both surfaces stay in lockstep.
# (canonical-self-rename is intentionally not appended: it is
# canonical-identity title hygiene, threads manage their title via the
# session-title skill, and the pre-tk-kdu2v5 overlay never carried it.)
# The "<pack>//<subpath>" form resolves against the imported gastown
# pack's cache dir, same form as polecat-codex. Template variables
# (.AgentName, .RigName, .WorkDir) bind to the thread's identity, not the
# canonical's, because PromptContext is built per-agent at render time
# (cmd/gc/template_resolve.go).
prompt_template = "gastown//agents/mayor/prompt.template.md"

# Append the mayor dispatch doctrine (lockstep with the canonical) plus
# the generic thread-role fragment. RoleName (below) drives the
# parameterization so the same fragment serves mayor-thread / mechanik-thread
# / future <role>-thread variants without duplication.
append_fragments = ["convoy-integration-branch-mayor", "thread-role", "operator-next-step-trailing"]

# Plain scratch directory, same shape as the canonical mayor's
# .gc/agents/mayor home. AgentBase parameterizes by per-instance name
# (e.g., mayor-thread-1), so concurrent threads have independent
# scratch dirs. Threads are routers, not doers — any git operation
# targets a rig via `git -C rigs/<rig>` (or `cd rigs/<rig> && …`),
# matching the canonical mayor's pattern.
work_dir = ".gc/agents/mayor-thread/{{.AgentBase}}"

nudge = "Operator nudge — return to the focus thread. Routed mail and routed work go to the canonical mayor; check mail (gc mail inbox) only if the operator left a direct message."

# Never-matching predicates: threads are operator-spawned only.
# work_query returns empty JSON so the reconciler never claims work or
# auto-spawns to satisfy demand. sling_query exits non-zero so
# `gc sling gc-toolkit.mayor-thread <bead>` surfaces an
# explicit error instead of silently routing.
work_query = "printf '[]'"
sling_query = "echo 'mayor-thread is operator-spawned only; not a sling target' >&2; exit 1"

# RoleName drives the generic thread-role fragment. Substituted into the
# fragment as {{ .RoleName }} via PromptContext.Env -> template data.
[env]
RoleName = "mayor"
