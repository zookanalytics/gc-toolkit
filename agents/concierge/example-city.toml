# Example wiring — consuming city runs concierge as a city agent.
#
# Drop these stanzas into your city's pack.toml (or city.toml) after
# importing gc-toolkit. Adjust the overseer alias to match whatever
# target you use for mail/nudge to the human.

[[named_session]]
template = "concierge"
scope = "city"
mode = "always"

# Optional — per-city override of idle timeout or wake mode, if the
# pack default (2h fresh) doesn't suit this city:
#
# [[patches.agent]]
# name = "concierge"
# idle_timeout = "4h"

# Overseer alias — wire the push channel to whoever the human reads.
# Concierge uses `gc mail send <overseer-alias>` and
# `gc session nudge <overseer-alias>` for push-on-create notifications.
# In the first version there's one overseer alias per city; multi-human
# addressing is out of scope.

# v2 session-per-consult — register the consult-host template as
# city-scoped, on-demand spawning (no `mode = "always"`). Concierge
# spawns one per resolution engagement; its prompt carries the spawn
# command + the path to the tmux switch helper (resolved at session
# start via `{{ .ConfigDir }}`). The consuming city does not invoke
# the helper directly — only concierge does.
#
# See docs/design/consult-session-v2-impl.md for the full protocol.

[[named_session]]
template = "consult-host"
scope = "city"

# Optional — cap concurrent consult-host sessions. The agent's default
# is min=0, max=10, which suits most cities; adjust if your overseer
# juggles many consults in parallel or to throttle resource use.
#
# [[patches.agent]]
# name = "consult-host"
# max_active_sessions = 5

# Mayor ↔ concierge bidirectional awareness — append the
# `mayor-concierge-redirect` fragment to gastown's mayor prompt so it
# redirects consult-style questions ("what's pending my feedback?",
# "what consults are open?") to concierge instead of answering from its
# own queue. The fragment is shipped by gc-toolkit at
# `template-fragments/mayor-concierge-redirect.template.md`. Gastown's
# mayor prompt is `.template.md`, so `append_fragments` auto-appends.
# Drop this stanza when you adopt concierge in your city.
#
# Per §5.7 of `docs/design/consult-surfacing.md`.

[[patches.agent]]
name = "gastown.mayor"
append_fragments = ["mayor-concierge-redirect"]
